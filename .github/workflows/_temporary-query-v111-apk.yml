name: Temporary Query DraBornGarage v1.1.1 APK

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-query-v111-apk.yml

permissions:
  contents: write
  actions: read

jobs:
  query:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Record latest Release APK run
        shell: bash
        run: |
          mkdir -p docs
          gh run list --repo "$GITHUB_REPOSITORY" --workflow release-apk.yml --event workflow_dispatch --branch main --limit 5 --json databaseId,status,conclusion,headSha,createdAt,updatedAt,url > docs/V111_APK_RUN_QUERY.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/V111_APK_RUN_QUERY.json
          git commit -m 'ci: record v1.1.1 Release APK run status'
          git pull --rebase origin main
          git push origin HEAD:main
