      setPushStatus('registered');
      setPushError(null);
      return true;
    } catch (error) {
      setPushStatus('error');
      setPushError(\`${stage}: \${notificationErrorMessage(error, 'Bilinmeyen hata')}\`);
      return false;
    }
  }, [session?.user]);

