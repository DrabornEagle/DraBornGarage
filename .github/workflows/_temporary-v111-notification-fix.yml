name: Temporary DraBornGarage v1.1.1 Notification Fix

on:
  push:
    branches: [fix/v1.1.1-notification-permission-sounds]
    paths:
      - .github/workflows/_temporary-v111-notification-fix.yml

permissions:
  contents: write

concurrency:
  group: draborngarage-v111-notification-fix
  cancel-in-progress: true

jobs:
  patch-test-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      CI: "true"
      EXPO_NO_TELEMETRY: "1"
      EXPO_NO_GIT_STATUS: "1"
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL || 'https://xpdiwyxnnrmyvpcqwuyb.supabase.co' }}
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_cu71JQGPiRusMw_YeZzUbg_6r9r13TG' }}
      EXPO_PUBLIC_NATIVE_PUSH_ENABLED: "true"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/v1.1.1-notification-permission-sounds

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply v1.1.1 source and migration fixes
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');

          function writeJson(path, value) {
            fs.writeFileSync(path, JSON.stringify(value, null, 2) + '\n');
          }
          function replaceSection(text, start, end, replacement, file) {
            const startIndex = text.indexOf(start);
            const endIndex = text.indexOf(end, startIndex + start.length);
            if (startIndex < 0 || endIndex < 0) throw new Error(`${file}: bölüm işaretçisi bulunamadı`);
            return text.slice(0, startIndex) + replacement + text.slice(endIndex);
          }
          function replaceRequired(text, from, to, file) {
            if (!text.includes(from)) throw new Error(`${file}: beklenen metin bulunamadı: ${from}`);
            return text.replace(from, to);
          }

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = '1.1.1';
          writeJson('package.json', pkg);

          const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
          lock.version = '1.1.1';
          lock.packages[''].version = '1.1.1';
          writeJson('package-lock.json', lock);

          const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
          app.expo.version = '1.1.1';
          app.expo.android.versionCode = 1;
          const notificationPlugin = app.expo.plugins.find((item) => Array.isArray(item) && item[0] === 'expo-notifications');
          if (!notificationPlugin) throw new Error('expo-notifications plugin bulunamadı');
          notificationPlugin[1].defaultChannel = 'draborngarage-system-default-v6';
          writeJson('app.json', app);

          fs.writeFileSync('src/notifications/notificationPermissions.ts', `import AsyncStorage from '@react-native-async-storage/async-storage';
