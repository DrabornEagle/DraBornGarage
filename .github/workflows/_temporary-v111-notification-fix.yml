      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Expo Doctor
        run: npx expo-doctor

      - name: TypeScript
        run: npm run typecheck

      - name: Android JavaScript bundle
        run: npm run test:bundle

      - name: Verify v1.1.1 notification contract
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs=require('fs');
          const app=require('./app.json').expo;
          const pkg=require('./package.json');
          const lock=require('./package-lock.json');
          if(app.version!=='1.1.1'||pkg.version!=='1.1.1'||lock.version!=='1.1.1') throw new Error('v1.1.1 sürüm eşleşmesi bozuk');
          if(app.android.versionCode!==1) throw new Error('Android versionCode 1 kalmalı');
          if(app.plugins.find(x=>Array.isArray(x)&&x[0]==='expo-notifications')?.[1]?.defaultChannel!=='draborngarage-system-default-v6') throw new Error('v6 varsayılan kanal eksik');
          const permissions=fs.readFileSync('src/notifications/notificationPermissions.ts','utf8');
          if(permissions.includes('deleteNotificationChannelAsync(id).catch')) throw new Error('Güvensiz .catch çağrısı kaldı');
          if(!permissions.includes("typeof api.setNotificationChannelAsync !== 'function'")) throw new Error('Native yöntem koruması eksik');
          const migration=fs.readFileSync('supabase/migrations/20260716193000_v1_1_1_notification_permission_sound_fix.sql','utf8');
          for(const sound of ['system_loud','garage_chime','garage_pulse','garage_alert','garage_bell','garage_siren','garage_turbo','garage_metal','garage_digital','garage_retro','silent']) if(!migration.includes(sound)) throw new Error(`Migration sesi eksik: ${sound}`);
          NODE

      - name: Commit fixes and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/_temporary-v111-notification-fix.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app.json package.json package-lock.json README.md docs/PROJECT_HANDOFF_V0.8.2.md src/notifications/NotificationContextV101.tsx src/notifications/NotificationCenterScreen.tsx src/notifications/notificationPermissions.ts supabase/migrations/20260716193000_v1_1_1_notification_permission_sound_fix.sql supabase/rollbacks/rollback_v1_1_1_to_v1_1_0.sql
          git commit -m "fix: repair notification permission and sound selection in v1.1.1"
          git push origin HEAD:fix/v1.1.1-notification-permission-sounds
