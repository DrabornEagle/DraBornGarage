name: Apply v0.9.3 Ready Payment Patch

on:
  push:
    branches: ["feature/v0.9.3-ready-iban-shield-version"]
    paths:
      - .github/workflows/apply-v093-ready-payment.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/v0.9.3-ready-iban-shield-version
          fetch-depth: 0

      - name: Apply source patch
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str, count: int = 1):
              p = Path(path)
              text = p.read_text()
              if old not in text:
                  raise SystemExit(f"Pattern not found in {path}: {old[:120]!r}")
              p.write_text(text.replace(old, new, count))

          replace('package.json', '"version": "0.9.2"', '"version": "0.9.3"')
          replace('package-lock.json', '"version": "0.9.2"', '"version": "0.9.3"', 2)
          replace('app.json', '"version": "0.9.2"', '"version": "0.9.3"')
          replace('app.json', '"buildNumber": "11"', '"buildNumber": "12"')
          replace('app.json', '"versionCode": 11', '"versionCode": 12')

          replace(
              'src/privacy/PrivacyCenter.tsx',
              '<Ionicons name="shield-checkmark" size={21} color={colors.green} />',
              '<Ionicons name="shield-checkmark" size={29} color={colors.green} />',
          )
          replace(
              'src/privacy/PrivacyCenter.tsx',
              '<Ionicons name="shield-checkmark" size={25} color={colors.green} />',
              '<Ionicons name="shield-checkmark" size={30} color={colors.green} />',
          )
          replace(
              'src/privacy/PrivacyCenter.tsx',
              "floatingButton: { position: 'absolute', zIndex: 80, top: 50, right: 14, width: 43, height: 43, borderRadius: 15, borderWidth: 1, alignItems: 'center', justifyContent: 'center', shadowOpacity: 0.28, shadowRadius: 10, elevation: 10 },",
              "floatingButton: { position: 'absolute', zIndex: 80, top: 46, right: 13, width: 58, height: 58, borderRadius: 20, borderWidth: 1.5, alignItems: 'center', justifyContent: 'center', shadowOpacity: 0.4, shadowRadius: 15, shadowOffset: { width: 0, height: 7 }, elevation: 16 },",
          )
          replace(
              'src/privacy/PrivacyCenter.tsx',
              "headerIcon: { width: 48, height: 48, borderRadius: 16, alignItems: 'center', justifyContent: 'center' },",
              "headerIcon: { width: 56, height: 56, borderRadius: 19, alignItems: 'center', justifyContent: 'center' },",
          )

          replace(
              'src/screens/SettingsScreen.tsx',
              "import { GlassCard } from '../components/GlassCard';",
              "import { GlassCard } from '../components/GlassCard';\nimport { ReadyPaymentSettings } from '../components/ReadyPaymentSettings';",
          )
          replace(
              'src/screens/SettingsScreen.tsx',
              "type SettingsSection = 'themes' | 'demo' | 'business' | 'security' | 'app';",
              "type SettingsSection = 'themes' | 'demo' | 'business' | 'payment' | 'security' | 'app';",
          )
          replace(
              'src/screens/SettingsScreen.tsx',
              "  const isOwner = isAdmin || membership?.role === 'owner' || membership?.role === 'owner_mechanic';",
              "  const isOwner = isAdmin || membership?.role === 'owner' || membership?.role === 'owner_mechanic';\n  const canConfigureReadyPayment = membership?.role === 'mechanic' || membership?.role === 'owner_mechanic';",
          )
          replace(
              'src/screens/SettingsScreen.tsx',
              "    </SettingsAccordion>\n\n    <SettingsAccordion title=\"Gizlilik ve Yayın Güvenliği\"",
              "    </SettingsAccordion>\n\n    {canConfigureReadyPayment && <SettingsAccordion title=\"Motor Hazır IBAN\" subtitle=\"Müşteriye gösterilecek Usta ödeme bilgisi\" icon=\"card\" accent={colors.green} open={openSection === 'payment'} onToggle={() => toggleSection('payment')}>\n      <ReadyPaymentSettings />\n    </SettingsAccordion>}\n\n    <SettingsAccordion title=\"Gizlilik ve Yayın Güvenliği\"",
          )
          replace(
              'src/screens/SettingsScreen.tsx',
              '<SettingsAccordion title="Uygulama" subtitle="v0.9.1 • Ses, push ve ödeme odağı" icon="information-circle" accent={colors.green} open={openSection === \'app\'} onToggle={() => toggleSection(\'app\')}>',
              '<SettingsAccordion title="Uygulama" subtitle="v0.9.3 • Motor Hazır IBAN ve görsel düzeltmeler" icon="information-circle" accent={colors.green} open={openSection === \'app\'} onToggle={() => toggleSection(\'app\')}>',
          )
          replace(
              'src/screens/SettingsScreen.tsx',
              '<GlassCard style={styles.info}><Info icon="layers" label="Sürüm" value="v0.9.1 • Takvim, Sesli Bildirim ve Ödeme Odağı" /><Info icon="shield-checkmark" label="Gizlilik" value="Uygulama içi politika + hesap silme talebi" /><Info icon="key" label="Şifre güvenliği" value="10 karakter + karmaşıklık + yaygın şifre engeli" /><Info icon="archive" label="Bu sürüm öncesi yedek" value="backup/v0.9.0-before-v0.9.1-20260714" /><Info icon="refresh" label="Geri alma" value="Kod ve veritabanıyla v0.9.0" /><Info icon="phone-portrait" label="Test yöntemi" value="Expo Go + Android bundle + pilot checklist" /><Info icon="storefront" label="Mağaza durumu" value="Kapalı test metinleri ve veri güvenliği hazır" /></GlassCard>',
              '<GlassCard style={styles.info}><Info icon="layers" label="Sürüm" value="v0.9.3 • Motor Hazır IBAN ve Görsel Düzeltmeler" /><Info icon="shield-checkmark" label="Gizlilik" value="Uygulama içi politika + hesap silme talebi" /><Info icon="key" label="Şifre güvenliği" value="10 karakter + karmaşıklık + yaygın şifre engeli" /><Info icon="archive" label="Bu sürüm öncesi yedek" value="backup/v0.9.2-before-v0.9.3-20260714" /><Info icon="refresh" label="Geri alma" value="Kod ve veritabanıyla v0.9.2" /><Info icon="phone-portrait" label="Test yöntemi" value="Expo Go + Android bundle + pilot checklist" /><Info icon="storefront" label="Mağaza durumu" value="Auto & Vehicles • finansal hizmet değildir" /></GlassCard>',
          )

          replace(
              'src/customer/CustomerServicesScreen.tsx',
              "import { CustomerReceivableCard } from './CustomerReceivableCard';",
              "import { CustomerReadyPaymentCard } from './CustomerReadyPaymentCard';\nimport { CustomerReceivableCard } from './CustomerReceivableCard';",
          )
          replace(
              'src/customer/CustomerServicesScreen.tsx',
              "    const { data, error } = await supabase.rpc('customer_get_service_detail', { p_work_order_id: orderId });\n    if (error) return Alert.alert('Servis detayı alınamadı', error.message);\n    setDetail(data as CustomerServiceDetail);",
              "    const [serviceResult, paymentResult] = await Promise.all([\n      supabase.rpc('customer_get_service_detail', { p_work_order_id: orderId }),\n      supabase.rpc('customer_get_ready_payment_details', { p_work_order_id: orderId }),\n    ]);\n    if (serviceResult.error) return Alert.alert('Servis detayı alınamadı', serviceResult.error.message);\n    setDetail({ ...(serviceResult.data as CustomerServiceDetail), ready_payment: paymentResult.error ? null : paymentResult.data } as CustomerServiceDetail);",
          )
          replace(
              'src/customer/CustomerServicesScreen.tsx',
              '    <CustomerReceivableCard detail={detail as any} />',
              '    <CustomerReadyPaymentCard status={detail.status} payment={(detail as any).ready_payment} />\n\n    <CustomerReceivableCard detail={detail as any} />',
          )

          replace('src/notifications/NotificationCenterScreen.tsx', 'v0.9.1 • SESLİ BİLDİRİM MERKEZİ', 'v0.9.3 • SESLİ BİLDİRİM MERKEZİ')
          replace('src/screens/AppointmentsScreen.tsx', 'v0.9.1 TAKVİM', 'v0.9.3 TAKVİM')
          replace("src/notifications/NotificationContext.tsx", "Constants.expoConfig?.version || '0.9.1'", "Constants.expoConfig?.version || '0.9.3'")

          replace('README.md', '**v0.9.1 — Takvim, Bildirim Sesi, Push ve Ödeme Odağı**', '**v0.9.3 — Motor Hazır IBAN ve Görsel Düzeltmeler**')
          replace(
              'README.md',
              'v0.9.1; v0.9.0 gizlilik ve pilot altyapısına modern Takvim/Müsaitlik kartları, seçilebilir özel bildirim sesleri, native kapalı uygulama push hazırlığı ve işletme ödemesinden doğrudan Admin onay kartına yönlendirme ekler.',
              'v0.9.3; güncel sürüm etiketlerini eşitler, Gizlilik ve Hesap kalkanını büyütür ve Motor Hazır durumunda müşteriye yalnız görüntüleme amaçlı Usta IBAN bilgisini gösterir. Uygulama ödeme işlemez, para tutmaz veya banka hesabına bağlanmaz.',
          )
          replace('README.md', '## v0.9.1 ile tamamlananlar', '## v0.9.3 ile tamamlananlar')
          PY

      - name: Commit patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json app.json README.md src
          git commit -m "feat(v0.9.3): add ready IBAN and refresh UI version"
          git push origin HEAD:feature/v0.9.3-ready-iban-shield-version
