name: Apply v0.9.4 UI Patch

on:
  push:
    branches:
      - feature/v0.9.4-customer-payment-confirmation
    paths:
      - scripts/apply-v094-ui-patch.mjs
      - .github/workflows/apply-v094-ui-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: feature/v0.9.4-customer-payment-confirmation
          fetch-depth: 0
      - name: Apply patch
        run: node scripts/apply-v094-ui-patch.mjs
      - name: Commit patch
        run: |
          git config user.name "DrabornEagle CI"
          git config user.email "actions@users.noreply.github.com"
          git add src/screens/SettingsScreen.tsx src/customer/CustomerServicesScreen.tsx src/screens/ReceivablesScreen.tsx package.json package-lock.json app.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "DraBornGarage v0.9.4: IBAN ödeme bildirimi UI bağlantıları"
            git push origin HEAD:feature/v0.9.4-customer-payment-confirmation
          fi
