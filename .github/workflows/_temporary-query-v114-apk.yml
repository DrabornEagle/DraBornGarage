name: Temporary Query DraBornGarage v1.1.4 APK

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-query-v114-apk.yml

permissions:
  contents: write
  actions: read

jobs:
  query:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Record latest Release APK run
        shell: bash
        run: |
          set -euo pipefail
          gh run list --repo "$GITHUB_REPOSITORY" --workflow release-apk.yml --limit 8 --json databaseId,event,status,conclusion,headSha,createdAt,updatedAt,url > docs/APK_RUN_QUERY_V114.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/APK_RUN_QUERY_V114.json
          git commit -m 'build: record v1.1.4 Release APK run'
          git pull --rebase origin main
          git push origin HEAD:main
