name: DraBornGarage v0.8.5 Implementation

on:
  push:
    branches:
      - feature/v0.8.5-staff-access-role-panels
    paths:
      - scripts/apply_v085_ui.mjs
      - .github/workflows/v085-implementation.yml

permissions:
  contents: write

jobs:
  implement-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/v0.8.5-staff-access-role-panels
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Generate v0.8.5 source
        run: node scripts/apply_v085_ui.mjs

      - name: Verify bicycle icon names are gone
        run: |
          if grep -Rni --include='*.ts' --include='*.tsx' 'bicycle' src; then
            echo 'Bicycle icon reference remains.'
            exit 1
          fi

      - name: Persist generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: complete v0.8.5 staff access and role panels" || true
          git pull --rebase origin feature/v0.8.5-staff-access-role-panels
          git push origin HEAD:feature/v0.8.5-staff-access-role-panels

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript validation
        run: npm run typecheck

      - name: Android JavaScript bundle validation
        run: |
          rm -rf dist
          npm run test:bundle
          rm -rf dist
