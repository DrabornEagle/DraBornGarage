name: DraBornGarage v1.0.1 Expo Sync

on:
  push:
    branches: ["feature/v1.0.1-expo-fixes"]

permissions:
  contents: write

jobs:
  synchronize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout v1.0.1 branch
        uses: actions/checkout@v4
        with:
          ref: feature/v1.0.1-expo-fixes
          fetch-depth: 0

      - name: Synchronize v1.0.1 source and metadata
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import json
          import math
          import struct
          import wave

          def replace(path_name, old, new, required=True):
              path = Path(path_name)
              text = path.read_text()
              if old in text:
                  path.write_text(text.replace(old, new))
              elif required and new not in text:
                  raise SystemExit(f'Replacement source not found in {path_name}: {old[:90]}')

          # Use the v1.0.1 notification provider everywhere.
          for path in [Path('App.tsx'), *Path('src').rglob('*.tsx')]:
              text = path.read_text()
              text = text.replace("./NotificationContext'", "./NotificationContextV101'")
              text = text.replace("../notifications/NotificationContext'", "../notifications/NotificationContextV101'")
              text = text.replace("./src/notifications/NotificationContext'", "./src/notifications/NotificationContextV101'")
              path.write_text(text)

          replace('src/AppShell.tsx', "import { CustomersScreen } from './screens/CustomersScreen';", "import { CustomerMemoryScreen as CustomersScreen } from './screens/CustomerMemoryScreen';")

          # Staff shell safe-area: Android three-button navigation must never cover the tab bar.
          replace('src/AppRoot.tsx', "import { ActivityIndicator, StyleSheet, Text, View } from 'react-native';", "import { ActivityIndicator, StyleSheet, Text, View } from 'react-native';\nimport { SafeAreaView } from 'react-native-safe-area-context';")
          replace('src/AppRoot.tsx', "  if (isAdmin) return <AppShell />;\n  if (workshop && membership) return <AppShell />;", "  if (isAdmin) return <SafeAreaView style={styles.shell} edges={['bottom']}><AppShell /></SafeAreaView>;\n  if (workshop && membership) return <SafeAreaView style={styles.shell} edges={['bottom']}><AppShell /></SafeAreaView>;")
          replace('src/AppRoot.tsx', "const styles = StyleSheet.create({ loading:", "const styles = StyleSheet.create({ shell: { flex: 1 }, loading:")

          # Simple password wording.
          replace('src/screens/AuthScreen.tsx', "'Eksik veya güvensiz bilgi'", "'Eksik bilgi'")
          replace('src/screens/AuthScreen.tsx', "'Güçlü şifre oluştur'", "'En az 6 karakter'")
          replace('src/screens/AuthScreen.tsx', "{PASSWORD_POLICY_SUMMARY} Yaygın ve sızdırılmış şifreler reddedilir.", "{PASSWORD_POLICY_SUMMARY}")
          replace('src/screens/AuthScreen.tsx', 'GARAGE OS • v0.9.0 PİLOT VE PLAY UYUMU', 'GARAGE OS • v1.0.1 EXPO TEST')

          # Visible v1.0.1 labels.
          replace('src/notifications/NotificationCenterScreen.tsx', 'v1.0.0 RC • SESLİ BİLDİRİM MERKEZİ', 'v1.0.1 RC • GÜÇLÜ BİLDİRİM MERKEZİ')
          replace('src/screens/SettingsScreen.tsx', 'v1.0.0 RC • İlk Release APK test süreci', 'v1.0.1 RC • Expo düzeltme testleri')
          replace('src/screens/SettingsScreen.tsx', 'v1.0.0 RC • Release APK Adayı', 'v1.0.1 RC • Expo Test Adayı')
          replace('src/screens/SettingsScreen.tsx', '10 karakter + karmaşıklık + yaygın şifre engeli', 'En az 6 karakter • basit kayıt şifresi')
          replace('src/screens/SettingsScreen.tsx', 'GitHub Release APK + fiziksel cihaz testleri', 'Expo Go + GitHub kalite testleri')
          replace('src/screens/SettingsScreen.tsx', 'APK testinde • AAB henüz yayınlanmadı', 'Expo testinde • sonraki adım Test APK')

          # Customer history note author relation and types.
          replace('src/screens/CustomerMemoryScreen.tsx', "  author_name?: string | null;", "  author?: { full_name?: string | null } | null;")
          replace('src/screens/CustomerMemoryScreen.tsx', "select('id,work_order_id,category,visibility,note,author_name,created_at')", "select('id,work_order_id,category,visibility,note,author:profiles!work_order_notes_author_id_fkey(full_name),created_at')")
          replace('src/screens/CustomerMemoryScreen.tsx', "item.author_name || 'Usta'", "item.author?.full_name || 'Usta'")

          # Keep the motorcycle's current odometer in sync whenever it returns.
          replace('src/screens/NewWorkOrderScreen.tsx', "    if (priceType === 'fixed' && priceComplete) {", "    if (motorcycleId && odometer) {\n      const { error } = await supabase.from('motorcycles').update({ odometer: Number(odometer) }).eq('id', motorcycleId);\n      if (error) {\n        setSaving(false);\n        return Alert.alert('Servis açıldı fakat motor kilometresi güncellenemedi', error.message);\n      }\n    }\n\n    if (priceType === 'fixed' && priceComplete) {")

          # Extend the shared motorcycle model.
          replace('src/types.ts', "  odometer?: number | null;\n}", "  odometer?: number | null;\n  staff_note?: string | null;\n  next_service_note?: string | null;\n  next_service_due_km?: number | null;\n  next_service_due_date?: string | null;\n}", required=False)

          package = json.loads(Path('package.json').read_text())
          package['version'] = '1.0.1'
          Path('package.json').write_text(json.dumps(package, ensure_ascii=False, indent=2) + '\n')

          lock = json.loads(Path('package-lock.json').read_text())
          lock['version'] = '1.0.1'
          lock['packages']['']['version'] = '1.0.1'
          Path('package-lock.json').write_text(json.dumps(lock, ensure_ascii=False, indent=2) + '\n')

          app = json.loads(Path('app.json').read_text())
          expo = app['expo']
          expo['version'] = '1.0.1'
          expo['android']['versionCode'] = 18
          expo['ios']['buildNumber'] = '18'
          expo['androidNavigationBar'] = {
              'backgroundColor': '#00000000',
              'barStyle': 'light-content',
              'contrastEnforced': False,
          }
          for plugin in expo.get('plugins', []):
              if isinstance(plugin, list) and plugin and plugin[0] == 'expo-notifications':
                  plugin[1]['defaultChannel'] = 'draborngarage-chime-v2'
          Path('app.json').write_text(json.dumps(app, ensure_ascii=False, indent=2) + '\n')

          # Release workflow will be ready for the later v1.0.1 APK, but is not triggered by this feature branch.
          release_path = Path('.github/workflows/release-apk.yml')
          release = release_path.read_text()
          release = release.replace("branches: [main, \"feature/v1.0-release-apk\"]", "branches: [main]")
          release = release.replace("'1.0.0'", "'1.0.1'")
          release = release.replace('1.0.0', '1.0.1')
          release = release.replace('versionCode !== 17', 'versionCode !== 18')
          release = release.replace("buildNumber !== '17'", "buildNumber !== '18'")
          release = release.replace('versionCode: **17**', 'versionCode: **18**')
          release_path.write_text(release)

          replace('docs/TERMUX_INSTALL.md', 'DraBornGarage v1.0.0 RC', 'DraBornGarage v1.0.1 RC')
          replace('docs/TERMUX_INSTALL.md', 'EXPECTED_VERSION="1.0.0"', 'EXPECTED_VERSION="1.0.1"')
          replace('docs/V1.0_RELEASE_APK_TEST_PLAN.md', 'DraBornGarage v1.0.0 RC', 'DraBornGarage v1.0.1 RC', required=False)

          readme = Path('README.md')
          text = readme.read_text()
          text = text.replace('**v1.0.0 RC — İlk GitHub Release APK Adayı**', '**v1.0.1 RC — Expo Bildirim, Müşteri Hafızası ve Navigasyon Düzeltmeleri**')
          old_description = 'v1.0.0 RC; v0.1–v0.9.7 arasındaki mobil özellikleri ilk kurulabilir GitHub Release APK çıktısında birleştirir. APK fiziksel cihaz testlerinden geçtikten sonra kalıcı Android upload key ve Google Play AAB aşamasına alınacaktır.'
          new_description = 'v1.0.1 RC; gerçek bildirimlerin cihaz alanına taşınmasını, daha uzun ve güçlü sesleri, kilometreli müşteri/motor servis hafızasını, basit kayıt şifresini ve Android gezinme çubuğuyla çakışmayan alt menüyü test eder.'
          text = text.replace(old_description, new_description)
          readme.write_text(text)

          # Long, normalized PCM sounds. Android channel IDs are v2 so old channel settings cannot pin the old sound.
          sound_dir = Path('assets/sounds')
          sound_dir.mkdir(parents=True, exist_ok=True)
          sample_rate = 16000

          def envelope(t, duration, attack=0.02, release=0.55):
              return min(1.0, max(0.0, t / attack), max(0.0, (duration - t) / release))

          def write_sound(filename, duration, sample_fn):
              count = int(sample_rate * duration)
              samples = []
              peak = 0.0001
              for index in range(count):
                  t = index / sample_rate
                  value = sample_fn(t) * envelope(t, duration)
                  value = math.tanh(value * 1.55)
                  peak = max(peak, abs(value))
                  samples.append(value)
              scale = 0.98 * 32767 / peak
              with wave.open(str(sound_dir / filename), 'wb') as handle:
                  handle.setnchannels(1)
                  handle.setsampwidth(2)
                  handle.setframerate(sample_rate)
                  handle.writeframes(b''.join(struct.pack('<h', max(-32767, min(32767, int(value * scale)))) for value in samples))

          chime_events = [
              (0.00, (523.25, 659.25, 783.99), 0.92),
              (0.75, (659.25, 783.99, 1046.50), 0.86),
              (1.55, (783.99, 987.77, 1174.66), 0.82),
              (2.45, (659.25, 783.99, 1046.50), 0.74),
          ]
          def chime(t):
              total = 0.0
              for start, frequencies, amplitude in chime_events:
                  u = t - start
                  if u < 0: continue
                  for position, frequency in enumerate(frequencies):
                      tone = math.sin(2 * math.pi * frequency * u) + 0.30 * math.sin(4 * math.pi * frequency * u)
                      total += amplitude * tone * math.exp(-u * (1.15 + 0.25 * position)) / ((position + 1) ** 0.40)
              return total
          write_sound('garage_chime.wav', 4.0, chime)

          pulse_starts = [0.0, 0.34, 0.70, 1.20, 1.55, 1.90, 2.45, 2.80, 3.15, 3.70]
          def pulse(t):
              total = 0.16 * math.sin(2 * math.pi * 880 * t) * (0.5 + 0.5 * math.sin(2 * math.pi * 4 * t))
              for index, start in enumerate(pulse_starts):
                  u = t - start
                  if u < 0: continue
                  frequency = (440.0, 554.37, 659.25)[index % 3]
                  total += (math.sin(2 * math.pi * frequency * u) + 0.40 * math.sin(4 * math.pi * frequency * u)) * math.exp(-u * 7.0)
              return total
          write_sound('garage_pulse.wav', 4.4, pulse)

          alert_starts = [0.0, 0.55, 1.10, 1.75, 2.30, 2.85, 3.55, 4.10]
          def alert(t):
              total = 0.25 * math.sin(2 * math.pi * 220 * t) * (0.6 + 0.4 * (1 if math.sin(2 * math.pi * 2 * t) >= 0 else -1))
              for index, start in enumerate(alert_starts):
                  u = t - start
                  if u < 0: continue
                  frequency = 880.0 if index % 2 == 0 else 740.0
                  phase = 2 * math.pi * (frequency * u + 28 * (1 - math.exp(-u * 6)))
                  total += 1.15 * (math.sin(phase) + 0.30 * math.sin(2 * phase)) * math.exp(-u * 2.8)
              return total
          write_sound('garage_alert.wav', 5.0, alert)
          PY

      - name: Commit synchronized v1.0.1 files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add App.tsx package.json package-lock.json app.json README.md docs src assets .github/workflows/release-apk.yml
          if git diff --cached --quiet; then
            echo "v1.0.1 files already synchronized."
            exit 0
          fi
          git commit -m "DraBornGarage v1.0.1 RC: Expo test düzeltmeleri"
          git push origin HEAD:feature/v1.0.1-expo-fixes
