name: Finalize DraBornGarage v1.0.6 Labels

on:
  push:
    branches: [main]
    paths:
      - .github/finalize-v1.0.6-labels-request.txt
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Update remaining labels
        run: |
          python3 <<'PY'
          from pathlib import Path
          changes = {
            'src/notifications/NotificationContextV101.tsx': [("?? '1.0.5'", "?? '1.0.6'")],
            'src/notifications/NotificationCenterScreen.tsx': [('v1.0.5 RC • ÖNCELİKLİ BİLDİRİM MERKEZİ', 'v1.0.6 RC • FIREBASE BİLDİRİM MERKEZİ')],
            'src/screens/NotificationPermissionScreen.tsx': [('DraBornGarage • v1.0.5', 'DraBornGarage • v1.0.6')],
          }
          for name, replacements in changes.items():
            path = Path(name)
            text = path.read_text(encoding='utf-8')
            for old, new in replacements:
              if old not in text:
                raise SystemExit(f'{name}: {old!r} bulunamadı')
              text = text.replace(old, new, 1)
            path.write_text(text, encoding='utf-8')
          PY
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck
      - name: Persist
        shell: bash
        run: |
          set -euo pipefail
          for path in src/notifications/NotificationContextV101.tsx src/notifications/NotificationCenterScreen.tsx src/screens/NotificationPermissionScreen.tsx; do
            export TARGET_PATH="$path"
            export TARGET_SHA="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=main" --jq .sha)"
            python3 <<'PY'
          from pathlib import Path
          import base64, json, os
          p=os.environ['TARGET_PATH']
          payload={'message':'v1.0.6: finalize visible version labels','content':base64.b64encode(Path(p).read_bytes()).decode(),'sha':os.environ['TARGET_SHA'],'branch':'main'}
          Path('payload.json').write_text(json.dumps(payload),encoding='utf-8')
          PY
            gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" --input payload.json >/dev/null
          done
