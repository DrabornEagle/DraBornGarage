name: Inspect DraBornGarage v1.0.6 Source

on:
  push:
    branches: [main]
    paths:
      - .github/inspect-v1.0.6-request.txt
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Inspect relevant source
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          roots = [Path('src'), Path('supabase/migrations')]
          patterns = [
              r'Tahsil edilecek ücret gerekli', r'Tahsil', r'Motor Hazır', r'hazır',
              r'kilomet', r'mileage', r'odometer', r'estimated_price', r'final_price',
              r'net_price', r'payment', r'appointment', r'motorcycle', r'vehicle'
          ]
          rx = re.compile('|'.join(patterns), re.I)
          output = []
          for root in roots:
              if not root.exists():
                  continue
              for path in sorted(p for p in root.rglob('*') if p.is_file() and p.suffix in {'.ts','.tsx','.sql'}):
                  try:
                      lines = path.read_text(encoding='utf-8').splitlines()
                  except Exception:
                      continue
                  hits = [i for i, line in enumerate(lines) if rx.search(line)]
                  if not hits:
                      continue
                  output.append(f'===== {path} =====')
                  included = set()
                  for i in hits[:100]:
                      for j in range(max(0, i-6), min(len(lines), i+9)):
                          included.add(j)
                  last = -2
                  for j in sorted(included):
                      if j > last + 1:
                          output.append('...')
                      output.append(f'{j+1:04d}: {lines[j]}')
                      last = j
                  output.append('')
          Path('v1.0.6-source-inspection.txt').write_text('\n'.join(output)[:700000], encoding='utf-8')
          PY

      - name: Publish inspection safely
        shell: bash
        run: |
          set -euo pipefail
          path=docs/v1.0.6-source-inspection.txt
          sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=main" --jq .sha 2>/dev/null || true)"
          content="$(base64 -w0 v1.0.6-source-inspection.txt)"
          if [ -n "$sha" ]; then
            jq -n --arg message 'ci: update v1.0.6 source inspection' --arg content "$content" --arg sha "$sha" --arg branch main '{message:$message,content:$content,sha:$sha,branch:$branch}' > payload.json
          else
            jq -n --arg message 'ci: record v1.0.6 source inspection' --arg content "$content" --arg branch main '{message:$message,content:$content,branch:$branch}' > payload.json
          fi
          gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" --input payload.json >/dev/null
