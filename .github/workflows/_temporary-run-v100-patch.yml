name: Temporary Run v1.0.0 Final Candidate Patch

on:
  push:
    branches:
      - feature/v1.0.0-final-candidate
    paths:
      - .github/workflows/_temporary-run-v100-patch.yml

permissions:
  contents: write

jobs:
  patch-test-persist:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      CI: "true"
      EXPO_NO_TELEMETRY: "1"
      EXPO_NO_GIT_STATUS: "1"
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL || 'https://xpdiwyxnnrmyvpcqwuyb.supabase.co' }}
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_cu71JQGPiRusMw_YeZzUbg_6r9r13TG' }}
      EXPO_PUBLIC_NATIVE_PUSH_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/v1.0.0-final-candidate
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply transparent source patches
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/v100_patch_part1_safe.py
          python3 scripts/v100_patch_part2.py
          python3 scripts/v100_patch_part3.py
          sed -i 's/v0\.9\.3 TAKVİM/RANDEVU TAKVİMİ/g' src/screens/AppointmentsScreen.tsx
          sed -i 's/v0\.6 Rapor Merkezi/Rapor Merkezi/g' src/components/ReportsDashboard.tsx
          sed -i 's/v0\.4 SERVİS TAKİBİ/SERVİS TAKİBİ/g' src/customer/CustomerServicesScreen.tsx

      - name: Upgrade and normalize bundled notification sounds
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import struct, wave
          target_rate=44100
          for path in map(Path, ['assets/sounds/garage_chime.wav','assets/sounds/garage_pulse.wav','assets/sounds/garage_alert.wav']):
              with wave.open(str(path),'rb') as src:
                  channels=src.getnchannels(); width=src.getsampwidth(); rate=src.getframerate(); frames=src.getnframes(); raw=src.readframes(frames)
              if channels != 1 or width not in (1,2):
                  raise SystemExit(f'{path}: unsupported WAV format')
              if width == 1:
                  source=[(byte-128)*256 for byte in raw]
              else:
                  source=list(struct.unpack('<'+'h'*(len(raw)//2),raw))
              target_count=max(1,round(len(source)*target_rate/rate))
              converted=[]
              for index in range(target_count):
                  position=index*(len(source)-1)/max(1,target_count-1)
                  left=int(position); right=min(len(source)-1,left+1); fraction=position-left
                  converted.append(round(source[left]*(1-fraction)+source[right]*fraction))
              peak=max(1,max(abs(value) for value in converted)); gain=min(8.0,32000/peak)
              boosted=[max(-32767,min(32767,round(value*gain))) for value in converted]
              with wave.open(str(path),'wb') as dst:
                  dst.setnchannels(1); dst.setsampwidth(2); dst.setframerate(target_rate)
                  dst.writeframes(struct.pack('<'+'h'*len(boosted),*boosted))
              print(path,'rate',target_rate,'peak',max(abs(value) for value in boosted),'gain',round(gain,2))
          PY

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund
      - name: Expo Doctor
        run: npx expo-doctor
      - name: TypeScript
        run: npm run typecheck
      - name: Android JavaScript bundle
        run: npm run test:bundle

      - name: Verify final candidate
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import json, re

          app=json.loads(Path('app.json').read_text())['expo']
          package=json.loads(Path('package.json').read_text())
          lock=json.loads(Path('package-lock.json').read_text())
          assert app['version']=='1.0.0'
          assert app['android']['versionCode']==1
          assert app['ios']['buildNumber']=='1'
          assert package['version']==app['version']==lock['version']==lock['packages']['']['version']
          notification=next(item[1] for item in app['plugins'] if isinstance(item,list) and item[0]=='expo-notifications')
          assert notification['defaultChannel']=='draborngarage-system-loud-v4'
          assert len(notification['sounds'])==3
          for file in notification['sounds']:
              assert Path(file).stat().st_size >= 80000, file

          literal_checks={
              'src/screens/WorkOrderDetailV04.tsx': ['Tamir Başladı • Ücreti Belirle','Ücret Kaydedildi','useSmartAutoRefresh'],
              'src/AppShellV102.tsx': ["!['orders', 'appointments', 'receivables', 'settings'].includes(tab)"],
              'src/notifications/NotificationCenterScreen.tsx': ['Kapalı Uygulama Bildirim Testi'],
              'supabase/migrations/20260716040000_v1_0_0_final_candidate_notifications_refresh.sql': ['notification_schedule_closed_app_test'],
          }
          for file,needles in literal_checks.items():
              text=Path(file).read_text()
              for needle in needles:
                  assert needle in text, f'{file}: {needle}'

          forbidden=re.compile(r'v1\.0\.4 RC|v1\.0\.6 RC|v0\.[0-9]|Expo Test Adayı|Son net ücret girilmeden Motor Hazır')
          violations=[]
          for file in Path('src').rglob('*'):
              if file.suffix not in ('.ts','.tsx'): continue
              for number,line in enumerate(file.read_text(errors='ignore').splitlines(),1):
                  if forbidden.search(line): violations.append(f'{file}:{number}:{line.strip()}')
          if violations:
              raise SystemExit('Outdated UI labels:\n'+'\n'.join(violations))
          print('v1.0.0 final candidate source verification passed')
          PY

      - name: Persist tested final candidate
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/_temporary-run-v100-patch.yml
          git rm -f .github/workflows/_temporary-feature-tree-info.yml .runtime/feature-tree-info.txt .runtime/v100-payload/part-00 || true
          git rm scripts/v100_patch_part1_safe.py scripts/v100_patch_part2.py scripts/v100_patch_part3.py
          git add app.json package.json package-lock.json assets/sounds src supabase/migrations/20260716040000_v1_0_0_final_candidate_notifications_refresh.sql
          git commit -m 'feat: prepare DraBornGarage v1.0.0 final candidate'
          git push origin HEAD:feature/v1.0.0-final-candidate
