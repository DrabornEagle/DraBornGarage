name: Temporary Final Cleanup

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-final-cleanup.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Remove temporary workflows and diagnostic markers
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          find .github/workflows -maxdepth 1 -type f -name '_temporary*' -delete
          rm -rf .runtime
          git add -A
          git commit -m 'chore: finalize clean v1.0.0 release repository'
          git fetch origin main
          git rebase origin/main
          test "$(find .github/workflows -maxdepth 1 -type f -printf '%f\n' | sort | tr '\n' ' ')" = "release-aab.yml release-apk.yml "
          git push origin HEAD:main
