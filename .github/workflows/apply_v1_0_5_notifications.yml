name: Apply DraBornGarage v1.0.5 Notifications

on:
  push:
    branches:
      - main
    paths:
      - .github/apply-v1.0.5-notifications-request.txt
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-draborngarage-v1-0-5-notifications
  cancel-in-progress: false

jobs:
  apply-test-persist:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CI: "true"
      EXPO_NO_TELEMETRY: "1"
      EXPO_NO_GIT_STATUS: "1"
      EXPO_PUBLIC_SUPABASE_URL: https://xpdiwyxnnrmyvpcqwuyb.supabase.co
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_cu71JQGPiRusMw_YeZzUbg_6r9r13TG
      EXPO_PUBLIC_NATIVE_PUSH_ENABLED: "false"
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply v1.0.5 notification patch
        run: python3 scripts/apply_v1_0_5_notifications.py

      - name: Synchronize package lock
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Expo Doctor
        run: npx expo-doctor

      - name: TypeScript
        run: npm run typecheck

      - name: Android JavaScript bundle
        run: npm run test:bundle

      - name: Verify v1.0.5 rules
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const app = require('./app.json').expo;
          const pkg = require('./package.json');
          if (app.version !== '1.0.5' || app.android.versionCode !== 23 || app.ios.buildNumber !== '23') throw new Error('Native version mismatch');
          if (pkg.version !== '1.0.5') throw new Error('Package version mismatch');
          NODE
          grep -q "draborngarage-system-loud-v3" src/notifications/notificationPermissions.ts
          grep -q "sound: 'default'" src/notifications/notificationPermissions.ts
          grep -q "NotificationPermissionScreen" src/AppRoot.tsx
          grep -q "notification_sound: 'system_loud'" src/notifications/NotificationContextV101.tsx

      - name: Persist tested source through Contents API
        shell: bash
        run: |
          set -euo pipefail
          persist_file() {
            local path="$1"
            local sha
            local content
            sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=main" --jq .sha 2>/dev/null || true)"
            content="$(base64 -w0 "$path")"
            if [ -n "$sha" ]; then
              gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" \
                -f message="v1.0.5: notification permission, system sound and channel upgrade" \
                -f content="$content" -f sha="$sha" -f branch=main >/dev/null
            else
              gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" \
                -f message="v1.0.5: add notification permission and channel files" \
                -f content="$content" -f branch=main >/dev/null
            fi
          }

          files=(
            src/AppRoot.tsx
            src/screens/NotificationPermissionScreen.tsx
            src/notifications/notificationPermissions.ts
            src/notifications/types.ts
            src/notifications/NotificationContextV101.tsx
            src/notifications/NotificationCenterScreen.tsx
            package.json
            package-lock.json
            app.json
            .github/workflows/release-apk.yml
            supabase/migrations/20260715170000_v1_0_5_notification_sound_channels.sql
            docs/CHANGELOG_V1.0.5.md
          )

          for file in "${files[@]}"; do
            persist_file "$file"
          done

      - name: Verify persisted main source
        shell: bash
        run: |
          set -euo pipefail
          APP_JSON="$(gh api "repos/${GITHUB_REPOSITORY}/contents/app.json?ref=main" --jq .content | tr -d '\n' | base64 -d)"
          CONTEXT="$(gh api "repos/${GITHUB_REPOSITORY}/contents/src/notifications/NotificationContextV101.tsx?ref=main" --jq .content | tr -d '\n' | base64 -d)"
          echo "$APP_JSON" | grep -q '"version": "1.0.5"'
          echo "$APP_JSON" | grep -q '"versionCode": 23'
          echo "$CONTEXT" | grep -q "notification_sound: 'system_loud'"
