name: Temporary DraBornGarage v1.1.5 Quality

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: draborngarage-v115-quality
  cancel-in-progress: true

jobs:
  apply-test-persist:
    if: github.event.pull_request.head.ref == 'feature/v1.1.5-live-notifications-refresh'
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      CI: "true"
      EXPO_NO_TELEMETRY: "1"
      EXPO_NO_GIT_STATUS: "1"
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL || 'https://xpdiwyxnnrmyvpcqwuyb.supabase.co' }}
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_cu71JQGPiRusMw_YeZzUbg_6r9r13TG' }}
      EXPO_PUBLIC_NATIVE_PUSH_ENABLED: "true"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/v1.1.5-live-notifications-refresh
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Generate Turkish voice assets
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends espeak-ng ffmpeg
          mkdir -p assets/sounds "$RUNNER_TEMP/voice"
          make_voice() {
            local filename="$1"; shift
            espeak-ng -v tr -s 148 -a 190 -w "$RUNNER_TEMP/voice/${filename}.raw.wav" "$*"
            ffmpeg -loglevel error -y -i "$RUNNER_TEMP/voice/${filename}.raw.wav" -ar 44100 -ac 1 -c:a pcm_s16le "assets/sounds/${filename}.wav"
          }
          make_voice garage_voice_appointment "Randevu geldi. Lütfen kontrol edin."
          make_voice garage_voice_customer_link "Müşteri bağlantı talebi geldi. Lütfen kontrol edin."
          make_voice garage_voice_service "Servis bildirimi geldi. Lütfen kontrol edin."
          make_voice garage_voice_payment "Ödeme bildirimi geldi. Lütfen kontrol edin."
          make_voice garage_voice_generic "Dra Born Garaj bildirimi geldi. Lütfen kontrol edin."
          for file in assets/sounds/garage_voice_*.wav; do test -s "$file"; test "$(stat -c %s "$file")" -gt 12000; done

      - name: Apply v1.1.5 patch
        id: apply_patch
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p docs
          python3 scripts/prepare_v115_patch_inputs.py
          python3 scripts/apply_v115_live_notifications_refresh.py 2>&1 | tee docs/V115_PATCH_FAILURE.log

      - name: Persist patch failure
        if: steps.apply_patch.outcome == 'failure'
        shell: bash
        run: |
          git reset --hard HEAD
          test -f docs/V115_PATCH_FAILURE.log || echo 'Patch failed without log' > docs/V115_PATCH_FAILURE.log
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f docs/V115_PATCH_FAILURE.log
          git commit -m 'ci: record v1.1.5 patch failure' || true
          git push origin HEAD:feature/v1.1.5-live-notifications-refresh || true
          exit 1

      - name: Refresh package lock
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Expo Doctor
        id: expo_doctor
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p docs
          npx expo-doctor 2>&1 | tee docs/V115_DOCTOR_FAILURE.txt

      - name: Persist Expo Doctor failure
        if: steps.expo_doctor.outcome == 'failure'
        shell: bash
        run: |
          git reset --hard HEAD
          test -f docs/V115_DOCTOR_FAILURE.txt || echo 'Expo Doctor failed without output' > docs/V115_DOCTOR_FAILURE.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f docs/V115_DOCTOR_FAILURE.txt
          git commit -m 'ci: record v1.1.5 Expo Doctor failure' || true
          git push origin HEAD:feature/v1.1.5-live-notifications-refresh || true
          exit 1

      - name: TypeScript
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p docs
          npm run typecheck 2>&1 | tee docs/V115_TYPESCRIPT_FAILURE.txt

      - name: Persist TypeScript failure
        if: steps.typecheck.outcome == 'failure'
        shell: bash
        run: |
          git reset --hard HEAD
          test -f docs/V115_TYPESCRIPT_FAILURE.txt || echo 'TypeScript failed without output' > docs/V115_TYPESCRIPT_FAILURE.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f docs/V115_TYPESCRIPT_FAILURE.txt
          git commit -m 'ci: record v1.1.5 TypeScript failure' || true
          git push origin HEAD:feature/v1.1.5-live-notifications-refresh || true
          exit 1

      - name: Android JavaScript bundle
        id: android_bundle
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p docs
          npm run test:bundle 2>&1 | tee docs/V115_BUNDLE_FAILURE.txt

      - name: Persist bundle failure
        if: steps.android_bundle.outcome == 'failure'
        shell: bash
        run: |
          git reset --hard HEAD
          test -f docs/V115_BUNDLE_FAILURE.txt || echo 'Android bundle failed without output' > docs/V115_BUNDLE_FAILURE.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f docs/V115_BUNDLE_FAILURE.txt
          git commit -m 'ci: record v1.1.5 bundle failure' || true
          git push origin HEAD:feature/v1.1.5-live-notifications-refresh || true
          exit 1

      - name: Verify v1.1.5 contract
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs=require('fs');
          const app=require('./app.json').expo;
          const pkg=require('./package.json');
          const lock=require('./package-lock.json');
          if(app.version!=='1.1.5'||pkg.version!=='1.1.5'||lock.version!=='1.1.5'||lock.packages?.['']?.version!=='1.1.5') throw new Error('v1.1.5 metadata uyuşmuyor');
          if(app.android.versionCode!==1||app.ios.buildNumber!=='1') throw new Error('Test versionCode/buildNumber bozuldu');
          if(!pkg.dependencies['expo-audio']||!pkg.dependencies['expo-asset']) throw new Error('Expo audio/asset eksik');
          for(const file of [
            'src/notifications/NotificationContextV115.tsx',
            'src/notifications/NotificationActionPopup.tsx',
            'src/lib/dataRefreshEvents.ts',
            'supabase/migrations/20260717023000_v1_1_5_reliable_push_actions_refresh.sql',
            'supabase/rollback/20260717023000_v1_1_5_reliable_push_actions_refresh_rollback.sql',
            'docs/FCM_V1_SETUP.md',
            'assets/sounds/garage_voice_appointment.wav',
            'assets/sounds/garage_voice_customer_link.wav',
            'assets/sounds/garage_voice_service.wav',
            'assets/sounds/garage_voice_payment.wav',
            'assets/sounds/garage_voice_generic.wav'
          ]) if(!fs.existsSync(file)) throw new Error(`Eksik: ${file}`);
          if(fs.existsSync('src/notifications/NotificationContextV114.tsx')) throw new Error('Eski wrapper kaldı');
          const migration=fs.readFileSync('supabase/migrations/20260717023000_v1_1_5_reliable_push_actions_refresh.sql','utf8');
          for(const term of ['notification_push_requests','notification_reconcile_push_requests','appointment_action_required','*/5 * * * *','work_order_status_timestamps_insert']) if(!migration.includes(term)) throw new Error(`Migration eksik: ${term}`);
          const order=fs.readFileSync('src/screens/NewWorkOrderScreen.tsx','utf8');
          if(!order.includes("started_at: startImmediately ? new Date().toISOString() : null")) throw new Error('Hemen Başla started_at eksik');
          const report=fs.readFileSync('src/components/ReportsDashboard.tsx','utf8');
          if(report.indexOf('title="Usta Raporu"')>report.indexOf('title="İşletme Raporu"')) throw new Error('Rapor kart sırası değişmedi');
          NODE

      - name: Persist tested source to feature branch
        shell: bash
        run: |
          set -euo pipefail
          rm -f scripts/apply_v115_live_notifications_refresh.py scripts/prepare_v115_patch_inputs.py docs/V115_PATCH_FAILURE.log docs/V115_DOCTOR_FAILURE.txt docs/V115_TYPESCRIPT_FAILURE.txt docs/V115_BUNDLE_FAILURE.txt
          rm -rf node_modules dist
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'feat: prepare DraBornGarage v1.1.5 live notification actions'
          git pull --rebase origin feature/v1.1.5-live-notifications-refresh
          git push origin HEAD:feature/v1.1.5-live-notifications-refresh
