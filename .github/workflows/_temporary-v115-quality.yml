name: Temporary DraBornGarage v1.1.5 Quality

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: draborngarage-v115-quality
  cancel-in-progress: true

jobs:
  apply-test-persist:
    if: github.event.pull_request.head.ref == 'feature/v1.1.5-appointment-push-voice'
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      CI: "true"
      EXPO_NO_TELEMETRY: "1"
      EXPO_NO_GIT_STATUS: "1"
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      EXPO_PUBLIC_NATIVE_PUSH_ENABLED: "true"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/v1.1.5-appointment-push-voice
          fetch-depth: 0

      - name: Detect staged patch
        id: staged
        shell: bash
        run: |
          if [ -d scripts/v115-stage ]; then echo "needed=true" >> "$GITHUB_OUTPUT"; else echo "needed=false" >> "$GITHUB_OUTPUT"; fi

      - uses: actions/setup-node@v4
        if: steps.staged.outputs.needed == 'true'
        with:
          node-version: 20
          cache: npm

      - name: Apply source patches
        if: steps.staged.outputs.needed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          for file in scripts/v115-stage/core-01.patch scripts/v115-stage/core-02.patch scripts/v115-stage/core-03.patch scripts/v115-stage/core-03b.patch scripts/v115-stage/core-04.patch scripts/v115-stage/core-05.patch scripts/v115-stage/appointments-01.patch scripts/v115-stage/appointments-02.patch; do
            echo "Applying $file"
            patch --batch --forward -p1 < "$file"
          done

      - name: Restore staged source and SQL
        if: steps.staged.outputs.needed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          test -n "$EXPO_PUBLIC_SUPABASE_URL"
          test -n "$EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY"
          curl -sS --fail --retry 5 "$EXPO_PUBLIC_SUPABASE_URL/rest/v1/v115_stage_parts?select=group_name,part_no,content&order=group_name.asc,part_no.asc" -H "apikey: $EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY" -o /tmp/v115-stage.json
          node <<'NODE'
          const fs = require('fs');
          const rows = JSON.parse(fs.readFileSync('/tmp/v115-stage.json', 'utf8'));
          const assemble = (group, expected) => {
            const parts = rows.filter((row) => row.group_name === group).sort((a, b) => a.part_no - b.part_no);
            if (parts.length !== expected || parts.some((row, index) => row.part_no !== index + 1)) throw new Error(`${group}: eksik stage parçası`);
            return parts.map((row) => row.content).join('');
          };
          fs.mkdirSync('src/notifications', { recursive: true });
          fs.mkdirSync('supabase/migrations', { recursive: true });
          fs.mkdirSync('supabase/rollback', { recursive: true });
          fs.writeFileSync('src/notifications/NotificationContextV115.tsx', assemble('NotificationContextV115', 10));
          fs.writeFileSync('supabase/migrations/20260717003000_v1_1_5_real_push_appointment_voice.sql', assemble('migration', 6));
          fs.writeFileSync('supabase/rollback/20260717003000_v1_1_5_real_push_appointment_voice_rollback.sql', assemble('rollback', 1));
          NODE
          echo '28a8093515e8c708cae316d441032e87a5f2fc6b056dd1eacda162beffcbd51d  src/notifications/NotificationContextV115.tsx' | sha256sum -c -
          echo '529b8e701d5c3a9ce0e9538c668f9b828ed7c658d0afe116e63a63b187bdddc9  supabase/migrations/20260717003000_v1_1_5_real_push_appointment_voice.sql' | sha256sum -c -
          echo '2ca65fe79d0e504ef103d951dcb67de6462ebbf87fbd44a20ea3a2880453d7e0  supabase/rollback/20260717003000_v1_1_5_real_push_appointment_voice_rollback.sql' | sha256sum -c -

      - name: Generate Turkish voice notification sounds
        if: steps.staged.outputs.needed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq espeak-ng ffmpeg
          mkdir -p assets/sounds /tmp/draborngarage-voice
          make_voice() {
            local name="$1"; shift
            espeak-ng -v tr -s 142 -p 44 -a 185 -w "/tmp/draborngarage-voice/${name}.raw.wav" "$*"
            ffmpeg -loglevel error -y -i "/tmp/draborngarage-voice/${name}.raw.wav" -ar 44100 -ac 1 -c:a pcm_s16le "assets/sounds/${name}.wav"
          }
          make_voice voice_appointment 'Randevu geldi. Lütfen kontrol edin.'
          make_voice voice_service 'Servis bildirimi geldi. Lütfen kontrol edin.'
          make_voice voice_payment 'Ödeme bildirimi geldi. Lütfen kontrol edin.'
          make_voice voice_receivable 'Alacak bildirimi geldi. Lütfen kontrol edin.'
          make_voice voice_platform 'Platform bildirimi geldi. Lütfen kontrol edin.'
          make_voice voice_customer 'Müşteri bildirimi geldi. Lütfen kontrol edin.'
          make_voice voice_system 'DraBornGarage bildirimi geldi. Lütfen kontrol edin.'

      - name: Remove staging files
        if: steps.staged.outputs.needed == 'true'
        shell: bash
        run: |
          rm -rf scripts/v115-stage
          rm -f scripts/apply_v115_appointment_push_voice.py
          rm -f docs/V115_WORK_STARTED.md docs/SOURCE_EXPORT_V115.json docs/V115_SECRET_CHECK.json
          rm -f .github/workflows/_temporary-v115-secret-check.yml

      - name: Refresh package lock
        if: steps.staged.outputs.needed == 'true'
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Install locked dependencies
        if: steps.staged.outputs.needed == 'true'
        run: npm ci --no-audit --no-fund

      - name: Expo Doctor
        if: steps.staged.outputs.needed == 'true'
        run: npx expo-doctor

      - name: TypeScript
        if: steps.staged.outputs.needed == 'true'
        run: npm run typecheck

      - name: Android JavaScript bundle
        if: steps.staged.outputs.needed == 'true'
        run: npm run test:bundle

      - name: Verify v1.1.5 release contract
        if: steps.staged.outputs.needed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const app = require('./app.json').expo;
          const pkg = require('./package.json');
          const lock = require('./package-lock.json');
          if (app.version !== '1.1.5' || pkg.version !== '1.1.5' || lock.version !== '1.1.5' || lock.packages?.['']?.version !== '1.1.5') throw new Error('v1.1.5 metadata uyuşmuyor');
          if (app.android.versionCode !== 1 || app.ios.buildNumber !== '1') throw new Error('Test build kodu değişti');
          const plugin = app.plugins.find((item) => Array.isArray(item) && item[0] === 'expo-notifications')?.[1];
          if (plugin?.defaultChannel !== 'draborngarage-system-default-v8') throw new Error('v8 varsayılan kanal eksik');
          for (const name of ['appointment','service','payment','receivable','platform','customer','system']) if (!fs.existsSync(`assets/sounds/voice_${name}.wav`)) throw new Error(`Türkçe ses eksik: ${name}`);
          const context = fs.readFileSync('src/notifications/NotificationContextV115.tsx', 'utf8');
          if (!context.includes('turkish_smart_voice') || !context.includes('createContext') || !context.includes('previewNotificationSound')) throw new Error('Birleşik v1.1.5 bildirim contexti eksik');
          const reports = fs.readFileSync('src/components/ReportsDashboard.tsx', 'utf8');
          if (reports.indexOf('title="Usta Raporu"') > reports.indexOf('title="İşletme Raporu"')) throw new Error('Rapor kart sırası yanlış');
          const shell = fs.readFileSync('src/AppShellV102.tsx', 'utf8');
          if (!shell.includes('AppointmentActionPrompt')) throw new Error('Randevu popup bağlantısı eksik');
          const migration = fs.readFileSync('supabase/migrations/20260717003000_v1_1_5_real_push_appointment_voice.sql', 'utf8');
          for (const value of ['notification_reconcile_push_attempts','notification_enqueue_pending_appointment_actions',"interval '5 minutes'",'InvalidCredentials']) if (!migration.includes(value)) throw new Error(`Migration eksik: ${value}`);
          NODE

      - name: Persist tested source to feature branch
        if: steps.staged.outputs.needed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf node_modules dist
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'feat: prepare DraBornGarage v1.1.5 appointment push and voice notifications'
          git pull --rebase origin feature/v1.1.5-appointment-push-voice
          git push origin HEAD:feature/v1.1.5-appointment-push-voice
