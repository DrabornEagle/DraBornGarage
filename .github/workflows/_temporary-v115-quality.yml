name: Temporary DraBornGarage v1.1.5 Final Validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: draborngarage-v115-final-validation
  cancel-in-progress: true

jobs:
  validate:
    if: github.event.pull_request.head.ref == 'feature/v1.1.5-live-notifications-refresh'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "true"
      EXPO_NO_TELEMETRY: "1"
      EXPO_NO_GIT_STATUS: "1"
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL || 'https://xpdiwyxnnrmyvpcqwuyb.supabase.co' }}
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_cu71JQGPiRusMw_YeZzUbg_6r9r13TG' }}
      EXPO_PUBLIC_NATIVE_PUSH_ENABLED: "true"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/v1.1.5-live-notifications-refresh
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply final v1.1.5 source adjustments
        run: |
          if [ -f scripts/finalize_v115_source.py ]; then
            python3 scripts/finalize_v115_source.py
          fi

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Expo Doctor
        run: npx expo-doctor

      - name: TypeScript
        run: npm run typecheck

      - name: Android JavaScript bundle
        run: npm run test:bundle

      - name: Verify v1.1.5 final contract
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs=require('fs');
          const app=require('./app.json').expo;
          const pkg=require('./package.json');
          const lock=require('./package-lock.json');
          if(app.version!=='1.1.5'||pkg.version!=='1.1.5'||lock.version!=='1.1.5'||lock.packages?.['']?.version!=='1.1.5') throw new Error('v1.1.5 metadata uyuşmuyor');
          if(app.android.versionCode!==1||app.ios.buildNumber!=='1') throw new Error('versionCode/buildNumber bozuldu');
          if(!pkg.dependencies['expo-audio']||!pkg.dependencies['expo-asset']) throw new Error('Expo audio bağımlılıkları eksik');
          for(const file of [
            'src/notifications/NotificationContextV115.tsx',
            'src/notifications/NotificationActionPopup.tsx',
            'src/lib/dataRefreshEvents.ts',
            'supabase/migrations/20260717023000_v1_1_5_reliable_push_actions_refresh.sql',
            'supabase/rollback/20260717023000_v1_1_5_reliable_push_actions_refresh_rollback.sql',
            'docs/FCM_V1_SETUP.md',
            'assets/sounds/garage_voice_appointment.wav',
            'assets/sounds/garage_voice_customer_link.wav',
            'assets/sounds/garage_voice_service.wav',
            'assets/sounds/garage_voice_payment.wav',
            'assets/sounds/garage_voice_generic.wav'
          ]) if(!fs.existsSync(file)) throw new Error(`Eksik: ${file}`);
          const shell=fs.readFileSync('src/AppShellV102.tsx','utf8');
          if(!shell.includes("['home', 'team', 'customers', 'settings']")) throw new Error('İşletme müşteri talebi yönlendirmesi açık değil');
          const wrapper=fs.readFileSync('src/notifications/NotificationContextV115.tsx','utf8');
          const effectBlock="void registerPushNotifications();\n    void refreshPushHealth();";
          if(!wrapper.includes(effectBlock)) throw new Error('İlk açılış push sağlık kontrolü eksik');
          const migration=fs.readFileSync('supabase/migrations/20260717023000_v1_1_5_reliable_push_actions_refresh.sql','utf8');
          if(!migration.includes("'draborngarage-appointment-action-reminders','* * * * *'")) throw new Error('Randevu hatırlatma taraması dakikalık değil');
          if(!migration.includes('notification_push_requests')||!migration.includes('appointment_action_required')) throw new Error('Push teslim ve aksiyon migration kapsamı eksik');
          const report=fs.readFileSync('src/components/ReportsDashboard.tsx','utf8');
          if(report.indexOf('title="Usta Raporu"')>report.indexOf('title="İşletme Raporu"')) throw new Error('Rapor kart sırası yanlış');
          NODE

      - name: Persist final tested source
        shell: bash
        run: |
          set -euo pipefail
          rm -f scripts/finalize_v115_source.py
          rm -rf node_modules dist
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'fix: finalize DraBornGarage v1.1.5 notification delivery'
          git pull --rebase origin feature/v1.1.5-live-notifications-refresh
          git push origin HEAD:feature/v1.1.5-live-notifications-refresh
