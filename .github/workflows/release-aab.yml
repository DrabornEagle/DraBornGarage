name: DraBornGarage Release AAB

on:
  workflow_dispatch:
    inputs:
      publish_github_release:
        description: GitHub ön sürümüne AAB ekle
        required: true
        type: boolean
        default: true
      play_version:
        description: Google Play versionName
        required: true
        type: string
        default: '1.0'
      play_version_code:
        description: Google Play versionCode
        required: true
        type: number
        default: 1
  push:
    branches: [main]
    paths: [.github/release-triggers/google-play-v1.0]
  pull_request:
    branches: [main]
    paths: [.github/release-triggers/google-play-v1.0-pr]

permissions:
  contents: write

concurrency:
  group: draborngarage-production-aab
  cancel-in-progress: false

env:
  CI: "true"
  EXPO_NO_TELEMETRY: "1"
  EXPO_NO_GIT_STATUS: "1"
  EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL || 'https://xpdiwyxnnrmyvpcqwuyb.supabase.co' }}
  EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_cu71JQGPiRusMw_YeZzUbg_6r9r13TG' }}
  EXPO_PUBLIC_NATIVE_PUSH_ENABLED: "true"
  EXPECTED_UPLOAD_CERT_SHA256: "61:69:5A:48:64:07:75:75:3A:0C:68:B1:8E:23:AC:34:56:FE:D5:AD:DE:50:E5:FF:92:BD:06:A4:6D:4D:EA:EE"
  PLAY_VERSION: ${{ inputs.play_version || '1.0' }}
  PLAY_VERSION_CODE: ${{ inputs.play_version_code || 1 }}

jobs:
  release-aab:
    name: Production-signed Google Play AAB
    runs-on: ubuntu-latest
    timeout-minutes: 80
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Google Play metadata
        run: |
          node <<'NODE'
          const fs = require('fs');
          const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
          const version = String(process.env.PLAY_VERSION || '').trim();
          const versionCode = Number(process.env.PLAY_VERSION_CODE);
          if (!/^\d+\.\d+(?:\.\d+)?$/.test(version)) throw new Error('Geçersiz Google Play versionName');
          if (!Number.isInteger(versionCode) || versionCode < 1) throw new Error('Geçersiz Google Play versionCode');
          app.expo.version = version;
          app.expo.android.versionCode = versionCode;
          fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');
          NODE

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Validate v1.0 source and release secrets
        shell: bash
        run: |
          set -euo pipefail
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            [ -n "${!name:-}" ] || { echo "Eksik GitHub secret: $name"; exit 1; }
          done
          node <<'NODE'
          const fs = require('fs');
          const app = require('./app.json').expo;
          const pkg = require('./package.json');
          const lock = require('./package-lock.json');
          const firebase = require('./google-services.json');
          if (app.version !== process.env.PLAY_VERSION || app.android?.versionCode !== Number(process.env.PLAY_VERSION_CODE)) throw new Error('Google Play metadata uyuşmuyor');
          if (lock.version !== pkg.version || lock.packages?.['']?.version !== pkg.version) throw new Error('Paket ve kilit sürümleri eşleşmiyor');
          if (firebase.client?.[0]?.client_info?.android_client_info?.package_name !== app.android.package) throw new Error('Firebase paket adı uyuşmuyor');
          for (const file of ['assets/draborngarage-icon.png', 'assets/draborngarage-welcome.png', 'release-security/DraBornGarage-v1.0-backup-public-cert.pem']) {
            if (!fs.existsSync(file) || fs.statSync(file).size < 500) throw new Error(`${file} geçersiz`);
          }
          NODE

      - name: Restore and verify permanent keystore
        shell: bash
        run: |
          set -euo pipefail
          KEYSTORE_PATH="$RUNNER_TEMP/DraBornGarage-upload-keystore-v1.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"
          ACTUAL_SHA256="$(keytool -list -v -keystore "$KEYSTORE_PATH" -storepass "$ANDROID_KEYSTORE_PASSWORD" -alias "$ANDROID_KEY_ALIAS" | awk -F'SHA256: ' '/SHA256:/{print $2; exit}' | tr -d '\r')"
          [ "$ACTUAL_SHA256" = "$EXPECTED_UPLOAD_CERT_SHA256" ] || { echo "Yanlış upload keystore sertifikası: $ACTUAL_SHA256"; exit 1; }
          echo "DRABORNGARAGE_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Install Android NDK
        shell: bash
        run: |
          SDKMANAGER="$(find "$ANDROID_HOME/cmdline-tools" -type f -name sdkmanager | sort | tail -n 1)"
          yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
          "$SDKMANAGER" "ndk;27.1.12297006"

      - name: Read release metadata
        id: meta
        run: |
          VERSION="$(node -p "require('./app.json').expo.version")"
          VERSION_CODE="$(node -p "require('./app.json').expo.android.versionCode")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "aab_name=DraBornGarage-v${VERSION}-production.aab" >> "$GITHUB_OUTPUT"
          echo "recovery_name=DraBornGarage-v${VERSION}-Signing-Recovery.zip.p7m" >> "$GITHUB_OUTPUT"

      - name: Install and validate source
        run: |
          npm ci --no-audit --no-fund
          npx expo-doctor
          npm run typecheck
          npm run test:bundle

      - name: Generate signed Android project
        run: |
          mkdir -p release-output
          npx expo config --type public --json > release-output/expo-public-config.json
          npx expo prebuild --platform android --clean --no-install
          python3 scripts/configure_android_signing.py
          python3 <<'PY'
          from pathlib import Path
          path = Path('android/app/src/main/AndroidManifest.xml')
          text = path.read_text().replace(' data-generated="true"', '')
          lines = []
          for line in text.splitlines():
              if '<uses-permission' in line and 'tools:node="remove"' in line and 'tools:ignore=' not in line:
                  line = line.replace('/>', ' tools:ignore="PermissionImpliesUnsupportedChromeOsHardware"/>')
              lines.append(line)
          text = '\n'.join(lines) + '\n'
          feature = '  <uses-feature android:name="android.hardware.camera" android:required="false"/>'
          if 'android.hardware.camera' not in text:
              pos = text.find('>')
              text = text[:pos + 1] + '\n' + feature + text[pos + 1:]
          path.write_text(text)
          PY

      - name: Build and lint Release AAB
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew :app:bundleRelease :app:lintRelease --no-daemon --stacktrace

      - name: Verify and collect AAB
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_AAB="$(find android/app/build/outputs/bundle/release -type f -name '*.aab' | head -n 1)"
          AAB_PATH="release-output/${{ steps.meta.outputs.aab_name }}"
          cp "$SOURCE_AAB" "$AAB_PATH"
          jarsigner -verify -verbose -certs "$AAB_PATH" | tee release-output/aab-signature.txt
          jarsigner -verify "$AAB_PATH"
          sha256sum "$AAB_PATH" | tee release-output/SHA256SUMS.txt

      - name: Create encrypted signing and source recovery backup
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          RECOVERY_DIR="$RUNNER_TEMP/draborngarage-signing-recovery"
          PLAIN_ZIP="$RUNNER_TEMP/DraBornGarage-v${{ steps.meta.outputs.version }}-Signing-Recovery.zip"
          ENCRYPTED="release-output/${{ steps.meta.outputs.recovery_name }}"
          mkdir -p "$RECOVERY_DIR"
          cp "$DRABORNGARAGE_KEYSTORE_PATH" "$RECOVERY_DIR/DraBornGarage-upload-keystore-v1.jks"
          cat > "$RECOVERY_DIR/KEYSTORE_CREDENTIALS.txt" <<EOF
          ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD
          ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS
          ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD
          UPLOAD_CERT_SHA256=$EXPECTED_UPLOAD_CERT_SHA256
          EOF
          cat > "$RECOVERY_DIR/RECOVERY_README.txt" <<'EOF'
          DraBornGarage Google Play İmzalama Kurtarma Paketi
          İçerik: upload keystore, alias/parolalar, v1.0 kaynak ve v1.1.8final geri alma kaynağı.
          Bu paket yalnız kullanıcıya teslim edilen özel anahtarla açılabilir.
          EOF
          git archive --format=zip --output="$RECOVERY_DIR/DraBornGarage-v1.0-source.zip" HEAD
          git fetch origin backup/v1.1.8final:refs/remotes/origin/backup/v1.1.8final
          git archive --format=zip --output="$RECOVERY_DIR/DraBornGarage-v1.1.8final-source.zip" origin/backup/v1.1.8final
          cp app.json package.json package-lock.json google-services.json "$RECOVERY_DIR/"
          cp release-security/DraBornGarage-v1.0-backup-public-cert.pem "$RECOVERY_DIR/"
          (cd "$RECOVERY_DIR" && zip -q -r "$PLAIN_ZIP" .)
          openssl cms -encrypt -binary -aes256 -in "$PLAIN_ZIP" -out "$ENCRYPTED" -outform DER release-security/DraBornGarage-v1.0-backup-public-cert.pem
          rm -rf "$RECOVERY_DIR" "$PLAIN_ZIP"
          test -s "$ENCRYPTED"
          sha256sum "$ENCRYPTED" | tee -a release-output/SHA256SUMS.txt
          cat > release-output/BUILD_INFO.txt <<EOF
          DraBornGarage v${{ steps.meta.outputs.version }}
          Android versionCode: ${{ steps.meta.outputs.version_code }}
          Commit: $GITHUB_SHA
          Upload certificate SHA-256: $EXPECTED_UPLOAD_CERT_SHA256
          Backup branch: backup/v1.1.8final
          Encrypted recovery: ${{ steps.meta.outputs.recovery_name }}
          EOF

      - name: Upload Release AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: DraBornGarage-v${{ steps.meta.outputs.version }}-Production-AAB
          path: release-output/
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub prerelease
        if: ${{ github.event_name == 'push' || inputs.publish_github_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}-aab-rc
          target_commitish: main
          name: DraBornGarage v${{ steps.meta.outputs.version }} Google Play AAB
          prerelease: true
          make_latest: false
          overwrite_files: true
          files: |
            release-output/${{ steps.meta.outputs.aab_name }}
            release-output/${{ steps.meta.outputs.recovery_name }}
            release-output/SHA256SUMS.txt
            release-output/aab-signature.txt
            release-output/BUILD_INFO.txt
