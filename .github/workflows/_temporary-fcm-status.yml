name: Temporary FCM Status

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-fcm-status.yml

permissions:
  actions: read
  contents: write

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Capture FCM run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .runtime
          gh run list --repo "$GITHUB_REPOSITORY" --workflow "Temporary Configure FCM V1" --limit 3 --json databaseId,status,conclusion,headSha,url,createdAt > .runtime/fcm-v1-run-status.json
      - name: Persist status
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/_temporary-fcm-status.yml
          git add .runtime/fcm-v1-run-status.json
          git commit -m 'chore: publish EAS FCM V1 run status'
          git pull --rebase origin main
          git push origin HEAD:main
