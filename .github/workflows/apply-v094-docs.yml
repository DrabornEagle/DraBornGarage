name: Apply v0.9.4 Docs

on:
  push:
    branches:
      - feature/v0.9.4-customer-payment-confirmation
    paths:
      - scripts/apply-v094-docs.mjs
      - .github/workflows/apply-v094-docs.yml

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/v0.9.4-customer-payment-confirmation
          fetch-depth: 0
      - name: Apply docs patch
        run: node scripts/apply-v094-docs.mjs
      - name: Commit docs
        run: |
          git config user.name "DrabornEagle CI"
          git config user.email "actions@users.noreply.github.com"
          git add README.md docs/TERMUX_INSTALL.md
          if git diff --cached --quiet; then
            echo "No documentation changes"
          else
            git commit -m "docs: DraBornGarage v0.9.4 README ve Termux"
            git push origin HEAD:feature/v0.9.4-customer-payment-confirmation
          fi
