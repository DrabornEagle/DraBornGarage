name: Temporary Query v1.1.1 Fix Run

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-query-v111-run.yml

permissions:
  contents: write
  actions: read

jobs:
  query:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Record v1.1.1 workflow status
        shell: bash
        run: |
          mkdir -p docs
          gh run list --repo "$GITHUB_REPOSITORY" --workflow _temporary-v111-notification-fix.yml --branch fix/v1.1.1-notification-permission-sounds --limit 10 --json databaseId,status,conclusion,headSha,createdAt,updatedAt,url > docs/V111_RUN_QUERY.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/V111_RUN_QUERY.json
          git commit -m 'ci: record v1.1.1 notification fix run status'
          git pull --rebase origin main
          git push origin HEAD:main
