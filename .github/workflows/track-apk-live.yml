name: Track DraBornGarage APK Build

on:
  push:
    branches:
      - main
    paths:
      - .github/apk-live-status-request.txt
  workflow_dispatch:

permissions:
  actions: read
  contents: write

concurrency:
  group: track-draborngarage-apk-live
  cancel-in-progress: true

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read latest APK workflow run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p .github
          gh run list \
            --workflow release-apk.yml \
            --limit 1 \
            --json databaseId,number,status,conclusion,headSha,url,createdAt,updatedAt,displayTitle \
            --jq '.[0]' > .github/apk-live-status-v1.0.4.json
          cat .github/apk-live-status-v1.0.4.json

      - name: Commit live status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/apk-live-status-v1.0.4.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "ci: update v1.0.4 APK live status"
          git pull --rebase origin main
          git push origin main
