name: Temporary Source Export v1.1.5

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-source-export-v115.yml

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create source archive
        run: |
          zip -qr DraBornGarage-source-v1.1.5.zip . -x '.git/*' 'node_modules/*' 'dist/*' 'android/*'
      - uses: actions/upload-artifact@v4
        with:
          name: DraBornGarage-source-v1.1.5
          path: DraBornGarage-source-v1.1.5.zip
          retention-days: 7
      - name: Record run
        run: |
          printf '{"run_id":%s,"head_sha":"%s","artifact":"DraBornGarage-source-v1.1.5"}\n' "$GITHUB_RUN_ID" "$GITHUB_SHA" > docs/SOURCE_EXPORT_V115.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/SOURCE_EXPORT_V115.json
          git commit -m 'chore: record v1.1.5 source export'
          git pull --rebase origin main
          git push origin HEAD:main
