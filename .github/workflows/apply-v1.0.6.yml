name: Apply DraBornGarage v1.0.6

on:
  push:
    branches: [main]
    paths:
      - .github/apply-v1.0.6-request.txt
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-draborngarage-v1-0-6
  cancel-in-progress: false

jobs:
  apply-test-persist:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      CI: "true"
      EXPO_NO_TELEMETRY: "1"
      EXPO_NO_GIT_STATUS: "1"
      EXPO_PUBLIC_SUPABASE_URL: https://xpdiwyxnnrmyvpcqwuyb.supabase.co
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_cu71JQGPiRusMw_YeZzUbg_6r9r13TG
      EXPO_PUBLIC_NATIVE_PUSH_ENABLED: "true"
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply v1.0.6 patch
        run: python3 scripts/apply_v1_0_6.py

      - name: Synchronize package lock
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Expo Doctor
        run: npx expo-doctor

      - name: TypeScript
        run: npm run typecheck

      - name: Android JavaScript bundle
        run: npm run test:bundle

      - name: Verify v1.0.6 rules
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const app = require('./app.json').expo;
          const pkg = require('./package.json');
          const lock = require('./package-lock.json');
          if (app.version !== '1.0.6' || app.android.versionCode !== 24 || app.ios.buildNumber !== '24') throw new Error('Native version mismatch');
          if (pkg.version !== '1.0.6' || lock.version !== '1.0.6' || lock.packages?.['']?.version !== '1.0.6') throw new Error('Package version mismatch');
          if (app.android.googleServicesFile !== './google-services.json') throw new Error('Firebase googleServicesFile missing');
          const firebase = require('./google-services.json');
          const packageName = firebase.client?.[0]?.client_info?.android_client_info?.package_name;
          if (packageName !== app.android.package) throw new Error('Firebase Android package mismatch');
          NODE
          grep -q "customer_motorcycle_odometer" src/screens/AuthScreen.tsx
          grep -q "p_odometer: odometerValue" src/customer/CustomerAppointmentsScreen.tsx
          grep -q "bikeOdometer" src/screens/CustomersScreen.tsx
          ! grep -q "Tahsil edilecek ücret gerekli" src/screens/WorkOrderDetailV04.tsx
          grep -q "needsInitialCharge" src/components/ReceivableManagerCard.tsx
          grep -q "staff_record_payment" supabase/migrations/20260715230000_v1_0_6_finance_mileage_firebase.sql
          grep -q "customer_create_open_appointment" supabase/migrations/20260715230000_v1_0_6_finance_mileage_firebase.sql

      - name: Persist tested source safely
        shell: bash
        run: |
          set -euo pipefail
          files=(
            app.json
            package.json
            package-lock.json
            src/types.ts
            src/screens/AuthScreen.tsx
            src/context/AuthContext.tsx
            src/customer/CustomerAppointmentsScreen.tsx
            src/screens/CustomersScreen.tsx
            src/screens/WorkOrderDetailV04.tsx
            src/components/ReceivableManagerCard.tsx
            supabase/migrations/20260715230000_v1_0_6_finance_mileage_firebase.sql
            docs/CHANGELOG_V1.0.6.md
          )
          for path in "${files[@]}"; do
            export TARGET_PATH="$path"
            export TARGET_SHA="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=main" --jq .sha 2>/dev/null || true)"
            python3 <<'PY'
          from pathlib import Path
          import base64, json, os
          path = os.environ['TARGET_PATH']
          payload = {
              'message': 'v1.0.6: Firebase, optional price and mileage flows',
              'content': base64.b64encode(Path(path).read_bytes()).decode(),
              'branch': 'main',
          }
          if os.environ.get('TARGET_SHA'):
              payload['sha'] = os.environ['TARGET_SHA']
          Path('contents-payload.json').write_text(json.dumps(payload), encoding='utf-8')
          PY
            gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" --input contents-payload.json >/dev/null
          done

      - name: Verify persisted main source
        shell: bash
        run: |
          set -euo pipefail
          APP="$(gh api "repos/${GITHUB_REPOSITORY}/contents/app.json?ref=main" --jq .content | tr -d '\n' | base64 -d)"
          PAYMENT="$(gh api "repos/${GITHUB_REPOSITORY}/contents/src/components/ReceivableManagerCard.tsx?ref=main" --jq .content | tr -d '\n' | base64 -d)"
          echo "$APP" | grep -q '"version": "1.0.6"'
          echo "$APP" | grep -q '"versionCode": 24'
          echo "$APP" | grep -q '"googleServicesFile": "./google-services.json"'
          echo "$PAYMENT" | grep -q 'needsInitialCharge'

  report:
    if: always()
    needs: apply-test-persist
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Write result
        shell: bash
        run: |
          set -euo pipefail
          path=.github/v1.0.6-apply-status.json
          sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=main" --jq .sha 2>/dev/null || true)"
          export RESULT='${{ needs.apply-test-persist.result }}'
          export RUN_URL='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          export HEAD_SHA='${{ github.sha }}'
          export TARGET_SHA="$sha"
          python3 <<'PY'
          import base64, json, os
          result = {'result': os.environ['RESULT'], 'run_url': os.environ['RUN_URL'], 'head_sha': os.environ['HEAD_SHA']}
          payload = {
              'message': 'ci: update v1.0.6 apply status',
              'content': base64.b64encode((json.dumps(result, ensure_ascii=False, indent=2) + '\n').encode()).decode(),
              'branch': 'main',
          }
          if os.environ.get('TARGET_SHA'):
              payload['sha'] = os.environ['TARGET_SHA']
          open('status-payload.json','w',encoding='utf-8').write(json.dumps(payload))
          PY
          gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" --input status-payload.json >/dev/null
