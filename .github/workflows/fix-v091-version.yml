name: Fix v0.9.1 Notification Version

on:
  push:
    branches: ["feature/v0.9.1-navigation-sounds-payment-push"]
    paths: [".github/workflows/fix-v091-version.yml"]

permissions:
  contents: write

jobs:
  fix-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/v0.9.1-navigation-sounds-payment-push
          fetch-depth: 0
      - run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/notifications/NotificationContext.tsx')
          content = path.read_text()
          content = content.replace("Constants.expoConfig?.version || '0.8.17'", "Constants.expoConfig?.version || '0.9.1'")
          path.write_text(content)
          PY
          rm -f .github/workflows/fix-v091-version.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/notifications/NotificationContext.tsx .github/workflows/fix-v091-version.yml
          git commit -m "chore(v0.9.1): sync notification app version"
          git push origin HEAD:feature/v0.9.1-navigation-sounds-payment-push
