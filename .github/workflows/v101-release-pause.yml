name: DraBornGarage v1.0.1 Release Pause

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  pause:
    if: github.event.pull_request.head.ref == 'feature/v1.0.1-expo-fixes' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/v1.0.1-expo-fixes
          fetch-depth: 0

      - name: Make APK workflow manual for Expo testing
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/release-apk.yml')
          text = path.read_text()
          old = '''on:
            workflow_dispatch:
            pull_request:
              branches: [main]
            push:
              branches: [main, "feature/v1.0-release-apk"]
          '''
          # Handle the actual non-indented YAML block.
          old = old.replace('          ', '')
          new = '''on:
            workflow_dispatch:
          '''.replace('          ', '')
          if old in text:
            text = text.replace(old, new)
          elif 'pull_request:' in text or 'push:' in text:
            start = text.index('on:\n')
            end = text.index('\npermissions:', start)
            text = text[:start] + 'on:\n  workflow_dispatch:\n' + text[end:]
          text = text.replace("'1.0.0'", "'1.0.1'")
          text = text.replace('v1.0.0', 'v1.0.1')
          text = text.replace('versionCode !== 17', 'versionCode !== 18')
          text = text.replace("buildNumber !== '17'", "buildNumber !== '18'")
          text = text.replace('versionCode: **17**', 'versionCode: **18**')
          text = text.replace('DraBornGarage-v1.0.0-Release-APK', 'DraBornGarage-v1.0.1-Release-APK')
          path.write_text(text)
          PY

      - name: Commit manual-only release workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/release-apk.yml
          if git diff --cached --quiet; then
            echo "Release workflow already manual-only."
            exit 0
          fi
          git commit -m "ci(v1.0.1): keep Test APK workflow manual during Expo testing"
          git push origin HEAD:feature/v1.0.1-expo-fixes
