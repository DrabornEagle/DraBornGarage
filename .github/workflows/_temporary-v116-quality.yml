name: Temporary DraBornGarage v1.1.6 Quality

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: draborngarage-v116-quality
  cancel-in-progress: true

jobs:
  apply-test-persist:
    if: github.event.pull_request.head.ref == 'feature/v1.1.6-push-retry-notification-cleanup'
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      CI: "true"
      EXPO_NO_TELEMETRY: "1"
      EXPO_NO_GIT_STATUS: "1"
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL || 'https://xpdiwyxnnrmyvpcqwuyb.supabase.co' }}
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_cu71JQGPiRusMw_YeZzUbg_6r9r13TG' }}
      EXPO_PUBLIC_NATIVE_PUSH_ENABLED: "true"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/v1.1.6-push-retry-notification-cleanup
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Turkish speech build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends espeak ffmpeg

      - name: Apply v1.1.6 patch when staging script exists
        shell: bash
        run: |
          if [ -f scripts/apply_v116_notification_reliability.py ]; then
            python3 scripts/apply_v116_notification_reliability.py
          else
            echo 'Tested v1.1.6 source is already present on the feature branch.'
          fi

      - name: Generate clearer Turkish voices
        run: bash scripts/generate_turkish_voice_sounds.sh

      - name: Refresh package lock
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Expo Doctor
        run: npx expo-doctor

      - name: TypeScript
        run: npm run typecheck

      - name: Android JavaScript bundle
        run: npm run test:bundle

      - name: Verify v1.1.6 contract
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs=require('fs');
          const app=require('./app.json').expo;
          const pkg=require('./package.json');
          const lock=require('./package-lock.json');
          if(app.version!=='1.1.6'||pkg.version!=='1.1.6'||lock.version!=='1.1.6'||lock.packages?.['']?.version!=='1.1.6') throw new Error('v1.1.6 metadata uyuşmuyor');
          if(app.android.versionCode!==1||app.ios.buildNumber!=='1') throw new Error('Test build kodu 1 değil');
          if(pkg.dependencies['expo-network']!=='~8.0.8') throw new Error('expo-network eksik');
          const context=fs.readFileSync('src/notifications/NotificationContextV116.tsx','utf8');
          if(!context.includes('isAirplaneModeEnabledAsync')||!context.includes('getDevicePushTokenWithRetry')||!context.includes('addNetworkStateListener')) throw new Error('FCM yeniden deneme sözleşmesi eksik');
          const center=fs.readFileSync('src/notifications/NotificationCenterScreen.tsx','utf8');
          if(!center.includes('Bütün Bildirimleri Temizle')||!center.includes('INITIAL_NOTIFICATION_COUNT = 4')||!center.includes('NOTIFICATION_PAGE_INCREMENT = 10')) throw new Error('Bildirim temizleme/sayfalama eksik');
          const base=fs.readFileSync('src/notifications/NotificationContextV101.tsx','utf8');
          if(!base.includes('clearAllNotifications')||!base.includes("notification_clear_all")) throw new Error('Toplu temizleme context sözleşmesi eksik');
          for(const file of ['garage_voice_appointment.wav','garage_voice_customer_link.wav','garage_voice_service.wav','garage_voice_payment.wav','garage_voice_generic.wav']) {
            const path=`assets/sounds/${file}`;
            if(!fs.existsSync(path)||fs.statSync(path).size<150000) throw new Error(`Türkçe ses geçersiz: ${path}`);
          }
          NODE
          test -f supabase/migrations/20260717113000_v1_1_6_notification_cleanup_push_retry.sql
          test -f supabase/rollback/20260717113000_v1_1_6_notification_cleanup_push_retry_rollback.sql
          ! grep -q 'notification_clear_all_unused' supabase/rollback/20260717113000_v1_1_6_notification_cleanup_push_retry_rollback.sql

      - name: Persist tested source when changed
        shell: bash
        run: |
          set -euo pipefail
          rm -f scripts/apply_v116_notification_reliability.py
          rm -rf node_modules dist
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          if git diff --cached --quiet; then
            echo 'No source changes to persist.'
            exit 0
          fi
          git commit -m 'feat: verify DraBornGarage v1.1.6 notification reliability'
          git pull --rebase origin feature/v1.1.6-push-retry-notification-cleanup
          git push origin HEAD:feature/v1.1.6-push-retry-notification-cleanup
