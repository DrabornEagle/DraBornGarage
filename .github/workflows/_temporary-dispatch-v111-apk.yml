name: Temporary Dispatch DraBornGarage v1.1.1 APK

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-dispatch-v111-apk.yml

permissions:
  contents: write
  actions: write

concurrency:
  group: draborngarage-v111-apk-dispatch
  cancel-in-progress: true

jobs:
  dispatch-watch-record:
    runs-on: ubuntu-latest
    timeout-minutes: 100
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Dispatch real Release APK workflow
        id: release
        shell: bash
        run: |
          set -euo pipefail
          before_id="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow release-apk.yml --event workflow_dispatch --branch main --limit 1 --json databaseId --jq '.[0].databaseId // 0')"
          gh workflow run release-apk.yml --repo "$GITHUB_REPOSITORY" --ref main -f publish_github_release=false
          run_id=""
          for attempt in $(seq 1 40); do
            sleep 5
            candidate="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow release-apk.yml --event workflow_dispatch --branch main --limit 1 --json databaseId --jq '.[0].databaseId // 0')"
            if [ "$candidate" != "0" ] && [ "$candidate" != "$before_id" ]; then
              run_id="$candidate"
              break
            fi
          done
          [ -n "$run_id" ] || { echo 'Release APK run kimliği bulunamadı'; exit 1; }
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Watch Release APK workflow
        shell: bash
        run: gh run watch "${{ steps.release.outputs.run_id }}" --repo "$GITHUB_REPOSITORY" --exit-status --interval 10

      - name: Record successful build
        shell: bash
        run: |
          set -euo pipefail
          run_id="${{ steps.release.outputs.run_id }}"
          run_json="$(gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --json status,conclusion,url,headSha,createdAt,updatedAt)"
          status="$(printf '%s' "$run_json" | jq -r '.status')"
          conclusion="$(printf '%s' "$run_json" | jq -r '.conclusion')"
          url="$(printf '%s' "$run_json" | jq -r '.url')"
          head_sha="$(printf '%s' "$run_json" | jq -r '.headSha')"
          artifact="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/artifacts" --jq '.artifacts[0].name // "artifact bulunamadı"')"
          mkdir -p docs
          cat > docs/BUILD_STATUS_V1.1.1.md <<EOF
          # DraBornGarage v1.1.1 Release APK Durumu

          - Workflow: DraBornGarage Release APK
          - Run ID: \`$run_id\`
          - Durum: \`$status\`
          - Sonuç: \`$conclusion\`
          - Commit: \`$head_sha\`
          - Artifact: \`$artifact\`
          - GitHub Actions: $url
          - Kayıt zamanı: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          EOF
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/BUILD_STATUS_V1.1.1.md
          git commit -m "build: record DraBornGarage v1.1.1 Release APK result"
          git pull --rebase origin main
          git push origin HEAD:main
          [ "$conclusion" = "success" ]
