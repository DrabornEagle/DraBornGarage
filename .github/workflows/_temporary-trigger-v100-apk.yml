name: Temporary Trigger v1.0.0 APK

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-trigger-v100-apk.yml

permissions:
  actions: write
  contents: write

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Dispatch Release APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release-apk.yml --repo "$GITHUB_REPOSITORY" -f publish_github_release=true
      - name: Remove trigger
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/_temporary-trigger-v100-apk.yml
          git commit -m 'ci: remove v1.0.0 APK trigger'
          git pull --rebase origin main
          git push origin HEAD:main
