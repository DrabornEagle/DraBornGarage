name: Fix v0.9.1 UI Label

on:
  push:
    branches: ["feature/v0.9.1-navigation-sounds-payment-push"]
    paths: [".github/workflows/fix-v091-ui-label.yml"]

permissions:
  contents: write

jobs:
  fix-label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/v0.9.1-navigation-sounds-payment-push
          fetch-depth: 0
      - run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/notifications/NotificationCenterScreen.tsx')
          content = path.read_text()
          content = content.replace('v0.8 • CANLI BİLDİRİM MERKEZİ', 'v0.9.1 • SESLİ BİLDİRİM MERKEZİ')
          path.write_text(content)
          PY
          rm -f .github/workflows/fix-v091-ui-label.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/notifications/NotificationCenterScreen.tsx .github/workflows/fix-v091-ui-label.yml
          git commit -m "chore(v0.9.1): update notification center version label"
          git push origin HEAD:feature/v0.9.1-navigation-sounds-payment-push
