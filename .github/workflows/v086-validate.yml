name: DraBornGarage v0.8.6 Validate

on:
  push:
    branches:
      - feature/v0.8.6-customer-discovery-booking
    paths:
      - scripts/apply_v086_release.mjs
      - scripts/fix_v086_types.mjs
      - .github/workflows/v086-validate.yml
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: draborngarage-v086-validate
  cancel-in-progress: true

jobs:
  validate-and-finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/v0.8.6-customer-discovery-booking
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Restore shared type exports
        run: node scripts/fix_v086_types.mjs

      - name: Apply v0.8.6 release metadata
        run: node scripts/apply_v086_release.mjs

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Capture TypeScript diagnostics
        id: typecheck
        continue-on-error: true
        run: |
          set +e
          npm run typecheck > v086-typecheck.log 2>&1
          code=$?
          cat v086-typecheck.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload TypeScript diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: draborngarage-v086-typecheck
          path: v086-typecheck.log
          if-no-files-found: error
          retention-days: 7

      - name: Enforce TypeScript result
        run: test "${{ steps.typecheck.outputs.exit_code }}" = "0"

      - name: Android JavaScript bundle validation
        run: |
          rm -rf dist
          npm run test:bundle
          rm -rf dist

      - name: Remove one-time release files
        run: |
          rm -f scripts/apply_v086_release.mjs
          rm -f scripts/fix_v086_types.mjs
          rm -f .github/workflows/v086-validate.yml
          rm -f docs/V086_PLAN.md

      - name: Commit validated v0.8.6
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: finalize v0.8.6 customer discovery and booking"
          git pull --rebase origin feature/v0.8.6-customer-discovery-booking
          git push origin HEAD:feature/v0.8.6-customer-discovery-booking
