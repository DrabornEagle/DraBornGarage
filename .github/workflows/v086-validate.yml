name: DraBornGarage v0.8.6 Validate

on:
  push:
    branches:
      - feature/v0.8.6-customer-discovery-booking
    paths:
      - scripts/apply_v086_release.mjs
      - .github/workflows/v086-validate.yml

permissions:
  contents: write

concurrency:
  group: draborngarage-v086-validate
  cancel-in-progress: true

jobs:
  validate-and-finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/v0.8.6-customer-discovery-booking
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply v0.8.6 release metadata
        run: node scripts/apply_v086_release.mjs

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript validation
        run: npm run typecheck

      - name: Android JavaScript bundle validation
        run: |
          rm -rf dist
          npm run test:bundle
          rm -rf dist

      - name: Remove one-time release files
        run: |
          rm -f scripts/apply_v086_release.mjs
          rm -f .github/workflows/v086-validate.yml
          rm -f docs/V086_PLAN.md

      - name: Commit validated v0.8.6
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: finalize v0.8.6 customer discovery and booking"
          git pull --rebase origin feature/v0.8.6-customer-discovery-booking
          git push origin HEAD:feature/v0.8.6-customer-discovery-booking
