name: DraBornGarage v0.8.11 Validate

on:
  push:
    branches:
      - feature/v0.8.11-notifications-mechanic-workflow-billing
    paths:
      - scripts/apply_v0811.py
      - scripts/patch_v0811_updater.py
      - .github/workflows/v0811-validate.yml
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: draborngarage-v0811-validate
  cancel-in-progress: true

jobs:
  validate-and-finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/v0.8.11-notifications-mechanic-workflow-billing
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply v0.8.11 changes
        run: |
          python3 scripts/patch_v0811_updater.py
          set +e
          python3 scripts/apply_v0811.py > /tmp/v0811-apply.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            git reset --hard HEAD
            cp /tmp/v0811-apply.log docs/V0811_APPLY_ERROR.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/V0811_APPLY_ERROR.txt
            git commit -m "ci: capture v0.8.11 updater error"
            git pull --rebase origin feature/v0.8.11-notifications-mechanic-workflow-billing
            git push origin HEAD:feature/v0.8.11-notifications-mechanic-workflow-billing
            cat /tmp/v0811-apply.log
            exit "$status"
          fi

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript validation
        run: |
          set +e
          npm run typecheck > /tmp/v0811-typecheck.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            git reset --hard HEAD
            cp /tmp/v0811-typecheck.log docs/V0811_TYPECHECK_ERROR.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/V0811_TYPECHECK_ERROR.txt
            git commit -m "ci: capture v0.8.11 typecheck error"
            git pull --rebase origin feature/v0.8.11-notifications-mechanic-workflow-billing
            git push origin HEAD:feature/v0.8.11-notifications-mechanic-workflow-billing
            cat /tmp/v0811-typecheck.log
            exit "$status"
          fi

      - name: Android JavaScript bundle validation
        run: |
          rm -rf dist
          npm run test:bundle
          rm -rf dist

      - name: Remove one-time updater
        run: |
          rm -f scripts/apply_v0811.py
          rm -f scripts/patch_v0811_updater.py
          rm -f .github/workflows/v0811-validate.yml
          rm -f docs/V0811_APPLY_ERROR.txt
          rm -f docs/V0811_TYPECHECK_ERROR.txt

      - name: Commit validated v0.8.11
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: finalize v0.8.11 notification mechanic workflow and billing"
          git pull --rebase origin feature/v0.8.11-notifications-mechanic-workflow-billing
          git push origin HEAD:feature/v0.8.11-notifications-mechanic-workflow-billing
