name: DraBornGarage Release APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/apk-build-request-v1.0.6.txt

permissions:
  contents: write

concurrency:
  group: draborngarage-release-apk-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  EXPO_NO_TELEMETRY: "1"
  EXPO_NO_GIT_STATUS: "1"
  EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL || 'https://xpdiwyxnnrmyvpcqwuyb.supabase.co' }}
  EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_cu71JQGPiRusMw_YeZzUbg_6r9r13TG' }}
  EXPO_PUBLIC_NATIVE_PUSH_ENABLED: "true"
  EXPO_PUBLIC_EAS_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_EAS_PROJECT_ID }}

jobs:
  release-apk:
    name: Build and publish signed v1.0.6 Firebase APK
    runs-on: ubuntu-latest
    timeout-minutes: 70

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install required Android NDK
        shell: bash
        run: |
          set -euo pipefail
          SDKMANAGER="$(find "$ANDROID_HOME/cmdline-tools" -type f -name sdkmanager | sort | tail -n 1)"
          test -x "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
          "$SDKMANAGER" "ndk;27.1.12297006"
          test -d "$ANDROID_HOME/ndk/27.1.12297006"
          echo "Android NDK 27.1.12297006 hazır"

      - name: Prepare output directory
        run: mkdir -p release-output

      - name: Validate v1.0.6 source, artwork and Firebase
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const pkg = require('./package.json');
          const lock = require('./package-lock.json');
          const app = require('./app.json').expo;
          const firebase = require('./google-services.json');
          if (pkg.version !== '1.0.6' || lock.version !== '1.0.6' || lock.packages?.['']?.version !== '1.0.6') throw new Error('Paket sürümü uyuşmuyor');
          if (pkg.dependencies.expo !== '~54.0.36' || lock.packages?.['node_modules/expo']?.version !== '54.0.36') throw new Error('Expo SDK kilidi uyuşmuyor');
          if (app.version !== '1.0.6' || app.android?.versionCode !== 24 || app.ios?.buildNumber !== '24') throw new Error('Native sürüm uyuşmuyor');
          if (app.android?.googleServicesFile !== './google-services.json') throw new Error('googleServicesFile eksik');
          const firebasePackage = firebase.client?.[0]?.client_info?.android_client_info?.package_name;
          if (firebasePackage !== app.android.package) throw new Error('Firebase paket adı uyuşmuyor');
          for (const file of ['assets/draborngarage-icon.png','assets/draborngarage-welcome.png']) if (!fs.existsSync(file) || fs.statSync(file).size < 100000) throw new Error(`${file} geçersiz`);
          console.log('v1.0.6 / Android 24 / Firebase kaynakları doğrulandı');
          NODE

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Expo Doctor
        run: npx expo-doctor 2>&1 | tee release-output/expo-doctor.txt

      - name: TypeScript
        run: npm run typecheck

      - name: Android JavaScript bundle
        run: npm run test:bundle

      - name: Verify v1.0.6 feature rules
        shell: bash
        run: |
          set -euo pipefail
          grep -q "motorcycleOdometer" src/screens/AuthScreen.tsx
          grep -q "p_odometer: odometerValue" src/customer/CustomerAppointmentsScreen.tsx
          grep -q "bikeOdometer" src/screens/CustomersScreen.tsx
          grep -q "needsInitialCharge" src/components/ReceivableManagerCard.tsx
          ! grep -q "Tahsil edilecek ücret gerekli" src/screens/WorkOrderDetailV04.tsx
          grep -q "draborngarage-system-loud-v3" src/notifications/notificationPermissions.ts
          grep -q "v1.0.6 RC" src/notifications/NotificationCenterScreen.tsx

      - name: Export public Expo configuration
        run: npx expo config --type public --json > release-output/expo-public-config.json

      - name: Generate clean Android native project
        run: npx expo prebuild --platform android --clean --no-install

      - name: Verify generated Firebase Android configuration
        shell: bash
        run: |
          set -euo pipefail
          test -s android/app/google-services.json
          node <<'NODE'
          const app = require('./app.json').expo;
          const generated = require('./android/app/google-services.json');
          const packageName = generated.client?.[0]?.client_info?.android_client_info?.package_name;
          if (packageName !== app.android.package) throw new Error('Üretilen Firebase paket adı uyuşmuyor');
          NODE

      - name: Normalize generated Android manifest
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          path=Path('android/app/src/main/AndroidManifest.xml')
          text=path.read_text().replace(' data-generated="true"','')
          lines=[]
          for line in text.splitlines():
              if '<uses-permission' in line and 'tools:node="remove"' in line and 'tools:ignore=' not in line:
                  line=line.replace('/>',' tools:ignore="PermissionImpliesUnsupportedChromeOsHardware"/>')
              lines.append(line)
          text='\n'.join(lines)+'\n'
          feature='  <uses-feature android:name="android.hardware.camera" android:required="false"/>'
          if 'android.hardware.camera' not in text:
              pos=text.find('>')
              text=text[:pos+1]+'\n'+feature+text[pos+1:]
          path.write_text(text)
          PY

      - name: Build Android release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Android lint
        working-directory: android
        run: ./gradlew :app:lintRelease --no-daemon --stacktrace

      - name: Verify manifest and collect APK
        id: apk
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import shutil, xml.etree.ElementTree as ET
          candidates=[p for p in Path('android/app/build/intermediates').rglob('AndroidManifest.xml') if 'release' in p.parts and ('merged_manifest' in p.parts or 'merged_manifests' in p.parts)]
          if not candidates: raise SystemExit('Merged release manifest bulunamadı')
          manifest=max(candidates,key=lambda p:p.stat().st_size)
          shutil.copyfile(manifest,'release-output/AndroidManifest-release.xml')
          android='{http://schemas.android.com/apk/res/android}'
          root=ET.parse(manifest).getroot()
          permissions={n.attrib.get(android+'name') for n in root.findall('uses-permission')}
          blocked={'android.permission.RECORD_AUDIO','android.permission.ACCESS_FINE_LOCATION','android.permission.ACCESS_COARSE_LOCATION','android.permission.READ_CONTACTS','android.permission.WRITE_CONTACTS','android.permission.CALL_PHONE','android.permission.READ_PHONE_STATE','android.permission.READ_SMS','android.permission.SEND_SMS'}
          if blocked & permissions: raise SystemExit(f'Engellenen izinler bulundu: {sorted(blocked & permissions)}')
          for required in ('android.permission.CAMERA','android.permission.POST_NOTIFICATIONS'):
              if required not in permissions: raise SystemExit(f'{required} bulunamadı')
          PY
          SOURCE_APK="$(find android/app/build/outputs/apk/release -type f -name '*.apk' | head -n 1)"
          test -f "$SOURCE_APK"
          APK_NAME="DraBornGarage-v1.0.6-release-test.apk"
          APK_PATH="release-output/${APK_NAME}"
          cp "$SOURCE_APK" "$APK_PATH"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          "$APKSIGNER" verify --verbose --print-certs "$APK_PATH" | tee release-output/apk-signature.txt
          sha256sum "$APK_PATH" | tee release-output/SHA256SUMS.txt
          stat -c '%n %s bytes' "$APK_PATH" | tee release-output/apk-size.txt
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Build information and release notes
        shell: bash
        run: |
          if [ -n "${EXPO_PUBLIC_EAS_PROJECT_ID:-}" ]; then EAS_STATUS="configured"; else EAS_STATUS="missing"; fi
          {
            echo "DraBornGarage v1.0.6 RC"
            echo "Android versionCode: 24"
            echo "Commit: $GITHUB_SHA"
            echo "Run: $GITHUB_RUN_ID"
            echo "Firebase Android google-services.json: configured"
            echo "Native push client flag: enabled"
            echo "Expo EAS project ID secret: ${EAS_STATUS}"
            echo "Android NDK: 27.1.12297006"
            echo "Signing: GitHub test signing; Google Play production upload key değildir"
          } | tee release-output/BUILD_INFO.txt
          cat > release-output/RELEASE_NOTES.md <<'EOF'
          # DraBornGarage v1.0.6 Test APK

          - Firebase Android yapılandırması
          - Motor Hazır aşamasında ücret zorunluluğu kaldırıldı
          - İlk Nakit/IBAN/Borç tutarı otomatik Net Fiyat olur
          - Kullanıcı kaydı, randevu ve müşteri motor ekleme akışlarında kilometre
          - Randevu kilometresinin servis kaydına aktarılması
          - Telefonun varsayılan bildirim sesi ve yüksek öncelikli bildirim kanalı
          - Expo Doctor, TypeScript, bundle, Firebase, NDK, lint, manifest ve APK imza kontrolleri
          EOF

      - name: Upload DraBornGarage Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DraBornGarage-v1.0.6-Firebase-Release-APK
          path: release-output/
          if-no-files-found: error
          retention-days: 30
          compression-level: 6

      - name: Publish GitHub test release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.6-test
          target_commitish: main
          name: DraBornGarage v1.0.6 Test APK
          body_path: release-output/RELEASE_NOTES.md
          prerelease: true
          make_latest: false
          overwrite_files: true
          files: |
            release-output/DraBornGarage-v1.0.6-release-test.apk
            release-output/SHA256SUMS.txt
            release-output/apk-signature.txt
            release-output/apk-size.txt
            release-output/BUILD_INFO.txt
            release-output/AndroidManifest-release.xml

      - name: Build summary
        run: |
          {
            echo "# DraBornGarage Release APK v1.0.6"
            echo "- Version: **1.0.6 RC**"
            echo "- Android versionCode: **24**"
            echo "- Firebase Android: **configured**"
            echo "- NDK: **27.1.12297006**"
            echo "- APK: **${{ steps.apk.outputs.apk_name }}**"
          } >> "$GITHUB_STEP_SUMMARY"
