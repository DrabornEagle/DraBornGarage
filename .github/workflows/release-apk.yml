name: DraBornGarage Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/apk-build-request-v1.0.4.txt

permissions:
  contents: write

concurrency:
  group: draborngarage-release-apk-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  EXPO_NO_TELEMETRY: "1"
  EXPO_NO_GIT_STATUS: "1"
  EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL || 'https://xpdiwyxnnrmyvpcqwuyb.supabase.co' }}
  EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_cu71JQGPiRusMw_YeZzUbg_6r9r13TG' }}
  EXPO_PUBLIC_NATIVE_PUSH_ENABLED: "false"

jobs:
  release-apk:
    name: Build and publish signed v1.0.4 hotfix APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Prepare output directory
        run: mkdir -p release-output

      - name: Verify repository artwork
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import hashlib
          import struct

          expected = {
              Path('assets/draborngarage-icon.png'): (1536, 1536),
              Path('assets/draborngarage-welcome.png'): (864, 1536),
          }

          for path, dimensions in expected.items():
              if not path.is_file():
                  raise SystemExit(f'{path}: dosya GitHub deposunda bulunamadı')
              data = path.read_bytes()
              if data[:8] != b'\x89PNG\r\n\x1a\n':
                  raise SystemExit(f'{path}: geçerli PNG değil')
              width, height = struct.unpack('>II', data[16:24])
              if (width, height) != dimensions:
                  raise SystemExit(f'{path}: beklenen {dimensions}, bulunan {(width, height)}')
              if len(data) < 100_000:
                  raise SystemExit(f'{path}: dosya beklenenden küçük')
              print(f'{path}: {width}x{height}, {len(data)} bytes, sha256={hashlib.sha256(data).hexdigest()}')
          PY

      - name: Apply v1.0.4 native hotfix
        env:
          DGB_APPLY_TRIGGER: "0"
        run: python3 scripts/apply_v1_0_4_native_hotfix.py

      - name: Synchronize package lock metadata
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Validate v1.0.4 hotfix metadata
        shell: bash
        run: |
          node <<'NODE'
          const pkg = require('./package.json');
          const lock = require('./package-lock.json');
          const app = require('./app.json').expo;
          if (pkg.version !== '1.0.4' || lock.version !== '1.0.4' || lock.packages?.['']?.version !== '1.0.4') {
            throw new Error('Paket sürümleri 1.0.4 ile eşleşmiyor.');
          }
          if (app.version !== '1.0.4' || app.android?.versionCode !== 22 || app.ios?.buildNumber !== '22') {
            throw new Error('Native sürüm bilgileri 1.0.4 / 22 ile eşleşmiyor.');
          }
          console.log('Release metadata OK: 1.0.4 / 22');
          NODE

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Expo Doctor
        run: npx expo-doctor 2>&1 | tee release-output/expo-doctor.txt

      - name: TypeScript
        run: npm run typecheck

      - name: Android JavaScript bundle
        run: npm run test:bundle

      - name: Verify hotfix source rules
        shell: bash
        run: |
          set -euo pipefail
          grep -q "react-native-edge-to-edge" package.json
          grep -q '"versionCode": 22' app.json
          grep -q "NATIVE_PUSH_ENABLED" src/notifications/NotificationContextV101.tsx
          grep -q 'GARAGE OS • v${APP_VERSION} TEST APK' src/screens/AuthScreen.tsx
          ! grep -R "v1.0.3" src --include='*.tsx'

      - name: Package tested hotfix source
        shell: bash
        run: |
          set -euo pipefail
          rm -f scripts/apply_v1_0_4_native_hotfix.py .github/workflows/apply_v1_0_4_native_hotfix_once.yml
          git diff --name-status HEAD > release-output/HOTFIX_SOURCE_FILES.txt
          git diff --binary HEAD > release-output/DraBornGarage-v1.0.4-hotfix-source.patch
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='android' \
            --exclude='release-output' \
            -czf release-output/DraBornGarage-v1.0.4-tested-source.tar.gz .

      - name: Persist tested source through GitHub Contents API
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from __future__ import annotations
          import base64
          import json
          import os
          from pathlib import Path
          import subprocess
          import time
          from urllib.error import HTTPError
          from urllib.parse import quote
          from urllib.request import Request, urlopen

          repo = os.environ['GITHUB_REPOSITORY']
          token = os.environ['GH_TOKEN']
          branch = 'main'
          api = f'https://api.github.com/repos/{repo}/contents'
          headers = {
              'Accept': 'application/vnd.github+json',
              'Authorization': f'Bearer {token}',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'DraBornGarage-v1.0.4-hotfix',
          }

          diff = subprocess.check_output(['git', 'diff', '--name-status', 'HEAD'], text=True)
          changes: list[tuple[str, str]] = []
          for raw in diff.splitlines():
              if not raw.strip():
                  continue
              status, path = raw.split('\t', 1)
              if path.startswith('.github/workflows/'):
                  continue
              changes.append((status, path))

          def request(method: str, url: str, payload: dict | None = None):
              data = None if payload is None else json.dumps(payload).encode()
              req = Request(url, method=method, headers=headers, data=data)
              with urlopen(req, timeout=60) as response:
                  body = response.read()
                  return json.loads(body) if body else None

          for status, path in changes:
              encoded = quote(path, safe='/')
              url = f'{api}/{encoded}?ref={branch}'
              current = None
              for attempt in range(5):
                  try:
                      current = request('GET', url)
                      break
                  except HTTPError as exc:
                      if exc.code == 404:
                          current = None
                          break
                      if exc.code in (409, 422, 429) and attempt < 4:
                          time.sleep(2 ** attempt)
                          continue
                      raise

              message = f'v1.0.4 hotfix source: {path}'
              if status.startswith('D'):
                  if current:
                      payload = {'message': message, 'sha': current['sha'], 'branch': branch}
                      request('DELETE', f'{api}/{encoded}', payload)
                      print('deleted', path)
                  continue

              content = base64.b64encode(Path(path).read_bytes()).decode()
              payload = {'message': message, 'content': content, 'branch': branch}
              if current:
                  payload['sha'] = current['sha']

              for attempt in range(5):
                  try:
                      request('PUT', f'{api}/{encoded}', payload)
                      print('updated', path)
                      break
                  except HTTPError as exc:
                      if exc.code in (409, 422) and attempt < 4:
                          time.sleep(2 ** attempt)
                          current = request('GET', url)
                          payload['sha'] = current['sha']
                          continue
                      raise
          PY

      - name: Verify persisted main source
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git show origin/main:app.json | grep -q '"versionCode": 22' && \
            git show origin/main:src/notifications/NotificationContextV101.tsx | grep -q 'NATIVE_PUSH_ENABLED' && \
            git show origin/main:src/screens/AuthScreen.tsx | grep -q 'GARAGE OS • v${APP_VERSION} TEST APK' && \
            break
            sleep 3
          done
          git show origin/main:app.json | grep -q '"versionCode": 22'
          git show origin/main:package-lock.json | grep -q '"version": "1.0.4"'

      - name: Export public Expo configuration
        run: npx expo config --type public --json > release-output/expo-public-config.json

      - name: Generate clean Android native project
        run: npx expo prebuild --platform android --clean --no-install

      - name: Normalize generated Android manifest
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('android/app/src/main/AndroidManifest.xml')
          text = path.read_text().replace(' data-generated="true"', '')
          lines = []
          for line in text.splitlines():
              if '<uses-permission' in line and 'tools:node="remove"' in line and 'tools:ignore=' not in line:
                  line = line.replace('/>', ' tools:ignore="PermissionImpliesUnsupportedChromeOsHardware"/>')
              lines.append(line)
          text = '\n'.join(lines) + '\n'
          feature = '  <uses-feature android:name="android.hardware.camera" android:required="false"/>'
          if 'android.hardware.camera' not in text:
              root_end = text.find('>')
              text = text[:root_end + 1] + '\n' + feature + text[root_end + 1:]
          path.write_text(text)
          PY

      - name: Build Android release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Android lint
        working-directory: android
        run: ./gradlew :app:lintRelease --no-daemon --stacktrace

      - name: Verify merged release manifest
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import shutil
          import xml.etree.ElementTree as ET

          candidates = [
              path for path in Path('android/app/build/intermediates').rglob('AndroidManifest.xml')
              if 'release' in path.parts and ('merged_manifest' in path.parts or 'merged_manifests' in path.parts)
          ]
          if not candidates:
              raise SystemExit('Merged release manifest bulunamadı.')
          manifest = max(candidates, key=lambda path: path.stat().st_size)
          shutil.copyfile(manifest, 'release-output/AndroidManifest-release.xml')
          android = '{http://schemas.android.com/apk/res/android}'
          root = ET.parse(manifest).getroot()
          permissions = {node.attrib.get(android + 'name') for node in root.findall('uses-permission')}
          features = {node.attrib.get(android + 'name'): node.attrib.get(android + 'required') for node in root.findall('uses-feature')}
          blocked = {
              'android.permission.RECORD_AUDIO',
              'android.permission.ACCESS_FINE_LOCATION',
              'android.permission.ACCESS_COARSE_LOCATION',
              'android.permission.READ_CONTACTS',
              'android.permission.WRITE_CONTACTS',
              'android.permission.CALL_PHONE',
              'android.permission.READ_PHONE_STATE',
              'android.permission.READ_SMS',
              'android.permission.SEND_SMS',
          }
          unexpected = sorted(blocked & permissions)
          if unexpected:
              raise SystemExit(f'Engellenen izinler bulundu: {unexpected}')
          if 'android.permission.CAMERA' not in permissions:
              raise SystemExit('CAMERA izni bulunamadı.')
          if features.get('android.hardware.camera') != 'false':
              raise SystemExit('Kamera required=false değil.')
          print('Merged manifest verified:', manifest)
          PY

      - name: Collect and verify APK
        id: apk
        shell: bash
        run: |
          SOURCE_APK="$(find android/app/build/outputs/apk/release -type f -name '*.apk' | head -n 1)"
          test -f "$SOURCE_APK"
          APK_NAME="DraBornGarage-v1.0.4-release-test.apk"
          APK_PATH="release-output/${APK_NAME}"
          cp "$SOURCE_APK" "$APK_PATH"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          "$APKSIGNER" verify --verbose --print-certs "$APK_PATH" | tee release-output/apk-signature.txt
          sha256sum "$APK_PATH" | tee release-output/SHA256SUMS.txt
          stat -c '%n %s bytes' "$APK_PATH" | tee release-output/apk-size.txt
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Build information
        shell: bash
        run: |
          {
            echo "DraBornGarage v1.0.4 RC Hotfix"
            echo "Android versionCode: 22"
            echo "Trigger commit: $GITHUB_SHA"
            echo "Run: $GITHUB_RUN_ID"
            echo "Remote push: disabled in GitHub test APK until FCM credentials are configured"
            echo "Signing: GitHub test signing; Google Play production upload key değildir"
          } | tee release-output/BUILD_INFO.txt

          cat > release-output/RELEASE_NOTES.md <<EOF
          # DraBornGarage v1.0.4 Test APK Hotfix

          Google Play final yayını öncesi cihaz test paketi.

          - Uygulama sürümü: **1.0.4 RC**
          - Android versionCode: **22**
          - Bildirim izni sonrası native kapanma düzeltildi
          - GitHub test APK'sında FCM kurulana kadar uzaktan push token kaydı kapalı
          - Yerel bildirim merkezi ve cihaz bildirimleri aktif
          - Android sistem navigasyonu edge-to-edge ve şeffaf
          - Alt menüler Xiaomi üç tuşlu navigasyon için güvenli mesafede
          - Giriş ekranı sürümü app.json'dan dinamik okunur
          - TypeScript, Expo Doctor, Android bundle, lint, manifest ve APK imza kontrolleri tamamlandı
          EOF

      - name: Upload DraBornGarage Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DraBornGarage-v1.0.4-Hotfix-Release-APK
          path: release-output/
          if-no-files-found: error
          retention-days: 30
          compression-level: 6

      - name: Publish GitHub test release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.4-test
          target_commitish: main
          name: DraBornGarage v1.0.4 Test APK Hotfix
          body_path: release-output/RELEASE_NOTES.md
          prerelease: true
          make_latest: false
          overwrite_files: true
          files: |
            release-output/DraBornGarage-v1.0.4-release-test.apk
            release-output/SHA256SUMS.txt
            release-output/apk-signature.txt
            release-output/apk-size.txt
            release-output/BUILD_INFO.txt
            release-output/AndroidManifest-release.xml

      - name: Build summary
        shell: bash
        run: |
          {
            echo "# DraBornGarage Release APK Hotfix"
            echo "- Version: **1.0.4 RC**"
            echo "- Android versionCode: **22**"
            echo "- APK: **${{ steps.apk.outputs.apk_name }}**"
            echo "- Artifact: **DraBornGarage-v1.0.4-Hotfix-Release-APK**"
            echo "- Release tag: **v1.0.4-test**"
          } >> "$GITHUB_STEP_SUMMARY"
