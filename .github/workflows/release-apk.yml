name: DraBornGarage Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/apk-build-request-v1.0.5.txt

permissions:
  contents: write

concurrency:
  group: draborngarage-release-apk-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  EXPO_NO_TELEMETRY: "1"
  EXPO_NO_GIT_STATUS: "1"
  EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL || 'https://xpdiwyxnnrmyvpcqwuyb.supabase.co' }}
  EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_cu71JQGPiRusMw_YeZzUbg_6r9r13TG' }}
  EXPO_PUBLIC_NATIVE_PUSH_ENABLED: "false"

jobs:
  release-apk:
    name: Build and publish signed v1.0.5 notification APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Prepare output directory
        run: mkdir -p release-output

      - name: Verify repository artwork
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import hashlib
          import struct

          expected = {
              Path('assets/draborngarage-icon.png'): (1536, 1536),
              Path('assets/draborngarage-welcome.png'): (864, 1536),
          }
          for path, dimensions in expected.items():
              if not path.is_file():
                  raise SystemExit(f'{path}: dosya GitHub deposunda bulunamadı')
              data = path.read_bytes()
              if data[:8] != b'\x89PNG\r\n\x1a\n':
                  raise SystemExit(f'{path}: geçerli PNG değil')
              width, height = struct.unpack('>II', data[16:24])
              if (width, height) != dimensions:
                  raise SystemExit(f'{path}: beklenen {dimensions}, bulunan {(width, height)}')
              if len(data) < 100_000:
                  raise SystemExit(f'{path}: dosya beklenenden küçük')
              print(f'{path}: {width}x{height}, {len(data)} bytes, sha256={hashlib.sha256(data).hexdigest()}')
          PY

      - name: Validate v1.0.5 source metadata
        run: |
          node <<'NODE'
          const pkg = require('./package.json');
          const lock = require('./package-lock.json');
          const app = require('./app.json').expo;
          if (pkg.version !== '1.0.5' || lock.version !== '1.0.5' || lock.packages?.['']?.version !== '1.0.5') {
            throw new Error('Paket sürümleri 1.0.5 ile eşleşmiyor.');
          }
          if (pkg.dependencies.expo !== '~54.0.36' || lock.packages?.['node_modules/expo']?.version !== '54.0.36') {
            throw new Error('Expo SDK 54.0.36 kilidi eksik.');
          }
          if (app.version !== '1.0.5' || app.android?.versionCode !== 23 || app.ios?.buildNumber !== '23') {
            throw new Error('Native sürüm bilgileri 1.0.5 / 23 ile eşleşmiyor.');
          }
          console.log('Source metadata OK: 1.0.5 / 23 / Expo 54.0.36');
          NODE

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Expo Doctor
        run: npx expo-doctor 2>&1 | tee release-output/expo-doctor.txt

      - name: TypeScript
        run: npm run typecheck

      - name: Android JavaScript bundle
        run: npm run test:bundle

      - name: Verify v1.0.5 notification source rules
        shell: bash
        run: |
          set -euo pipefail
          grep -q "NotificationPermissionScreen" src/AppRoot.tsx
          grep -q "draborngarage-system-loud-v3" src/notifications/notificationPermissions.ts
          grep -q "sound: 'default'" src/notifications/notificationPermissions.ts
          grep -q "AndroidImportance.MAX" src/notifications/notificationPermissions.ts
          grep -q "notification_sound: 'system_loud'" src/notifications/NotificationContextV101.tsx
          grep -q "requestDeviceNotificationPermission" src/notifications/NotificationContextV101.tsx
          grep -q 'GARAGE OS • v${APP_VERSION} TEST APK' src/screens/AuthScreen.tsx
          grep -q "Math.max(insets.bottom, 36)" src/AppShellV102.tsx
          grep -q "Math.max(insets.bottom, 36)" src/customer/CustomerShell.tsx

      - name: Export public Expo configuration
        run: npx expo config --type public --json > release-output/expo-public-config.json

      - name: Generate clean Android native project
        run: npx expo prebuild --platform android --clean --no-install

      - name: Normalize generated Android manifest
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('android/app/src/main/AndroidManifest.xml')
          text = path.read_text().replace(' data-generated="true"', '')
          lines = []
          for line in text.splitlines():
              if '<uses-permission' in line and 'tools:node="remove"' in line and 'tools:ignore=' not in line:
                  line = line.replace('/>', ' tools:ignore="PermissionImpliesUnsupportedChromeOsHardware"/>')
              lines.append(line)
          text = '\n'.join(lines) + '\n'
          feature = '  <uses-feature android:name="android.hardware.camera" android:required="false"/>'
          if 'android.hardware.camera' not in text:
              root_end = text.find('>')
              text = text[:root_end + 1] + '\n' + feature + text[root_end + 1:]
          path.write_text(text)
          PY

      - name: Build Android release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Android lint
        working-directory: android
        run: ./gradlew :app:lintRelease --no-daemon --stacktrace

      - name: Verify merged release manifest
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import shutil
          import xml.etree.ElementTree as ET

          candidates = [
              path for path in Path('android/app/build/intermediates').rglob('AndroidManifest.xml')
              if 'release' in path.parts and ('merged_manifest' in path.parts or 'merged_manifests' in path.parts)
          ]
          if not candidates:
              raise SystemExit('Merged release manifest bulunamadı.')
          manifest = max(candidates, key=lambda path: path.stat().st_size)
          shutil.copyfile(manifest, 'release-output/AndroidManifest-release.xml')
          android = '{http://schemas.android.com/apk/res/android}'
          root = ET.parse(manifest).getroot()
          permissions = {node.attrib.get(android + 'name') for node in root.findall('uses-permission')}
          features = {node.attrib.get(android + 'name'): node.attrib.get(android + 'required') for node in root.findall('uses-feature')}
          blocked = {
              'android.permission.RECORD_AUDIO',
              'android.permission.ACCESS_FINE_LOCATION',
              'android.permission.ACCESS_COARSE_LOCATION',
              'android.permission.READ_CONTACTS',
              'android.permission.WRITE_CONTACTS',
              'android.permission.CALL_PHONE',
              'android.permission.READ_PHONE_STATE',
              'android.permission.READ_SMS',
              'android.permission.SEND_SMS',
          }
          unexpected = sorted(blocked & permissions)
          if unexpected:
              raise SystemExit(f'Engellenen izinler bulundu: {unexpected}')
          if 'android.permission.CAMERA' not in permissions:
              raise SystemExit('CAMERA izni bulunamadı.')
          if 'android.permission.POST_NOTIFICATIONS' not in permissions:
              raise SystemExit('POST_NOTIFICATIONS izni bulunamadı.')
          if features.get('android.hardware.camera') != 'false':
              raise SystemExit('Kamera required=false değil.')
          print('Merged manifest verified:', manifest)
          PY

      - name: Collect and verify APK
        id: apk
        shell: bash
        run: |
          SOURCE_APK="$(find android/app/build/outputs/apk/release -type f -name '*.apk' | head -n 1)"
          test -f "$SOURCE_APK"
          APK_NAME="DraBornGarage-v1.0.5-release-test.apk"
          APK_PATH="release-output/${APK_NAME}"
          cp "$SOURCE_APK" "$APK_PATH"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          "$APKSIGNER" verify --verbose --print-certs "$APK_PATH" | tee release-output/apk-signature.txt
          sha256sum "$APK_PATH" | tee release-output/SHA256SUMS.txt
          stat -c '%n %s bytes' "$APK_PATH" | tee release-output/apk-size.txt
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Build information
        shell: bash
        run: |
          {
            echo "DraBornGarage v1.0.5 RC"
            echo "Android versionCode: 23"
            echo "Commit: $GITHUB_SHA"
            echo "Run: $GITHUB_RUN_ID"
            echo "Notification sound: phone default notification sound / MAX importance channel v3"
            echo "First-run notification permission education: enabled"
            echo "Remote push: Firebase FCM V1 and EAS project credentials are still required"
            echo "Signing: GitHub test signing; Google Play production upload key değildir"
          } | tee release-output/BUILD_INFO.txt

          cat > release-output/RELEASE_NOTES.md <<'EOF'
          # DraBornGarage v1.0.5 Test APK

          Google Play final yayını öncesi bildirim ve ilk kurulum test paketi.

          - Uygulama sürümü: **1.0.5 RC**
          - Android versionCode: **23**
          - İlk açılış akışında modern bildirim izin açıklaması
          - Telefonun varsayılan bildirim sesini kullanan yeni yüksek öncelikli Android v3 kanalı
          - Güçlü titreşim, kilit ekranı görünürlüğü ve rozet desteği
          - Eski düşük seviyeli özel WAV kanalları yerine telefonun Bildirim Sesi seviyesi
          - Yerel test bildirimi ve zamanlı hatırlatmalar uygulama kapalıyken çalışır
          - Yeni sunucu hareketlerinin uygulama tamamen kapalıyken gelmesi için Firebase FCM V1/EAS kimlik bilgileri ayrıca bağlanmalıdır
          - Expo Doctor, TypeScript, Android bundle, lint, manifest ve APK imza kontrolleri tamamlandı
          EOF

      - name: Upload DraBornGarage Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DraBornGarage-v1.0.5-Notification-Release-APK
          path: release-output/
          if-no-files-found: error
          retention-days: 30
          compression-level: 6

      - name: Publish GitHub test release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.5-test
          target_commitish: main
          name: DraBornGarage v1.0.5 Test APK
          body_path: release-output/RELEASE_NOTES.md
          prerelease: true
          make_latest: false
          overwrite_files: true
          files: |
            release-output/DraBornGarage-v1.0.5-release-test.apk
            release-output/SHA256SUMS.txt
            release-output/apk-signature.txt
            release-output/apk-size.txt
            release-output/BUILD_INFO.txt
            release-output/AndroidManifest-release.xml

      - name: Build summary
        shell: bash
        run: |
          {
            echo "# DraBornGarage Release APK v1.0.5"
            echo "- Version: **1.0.5 RC**"
            echo "- Android versionCode: **23**"
            echo "- APK: **${{ steps.apk.outputs.apk_name }}**"
            echo "- Artifact: **DraBornGarage-v1.0.5-Notification-Release-APK**"
            echo "- Release tag: **v1.0.5-test**"
          } >> "$GITHUB_STEP_SUMMARY"
