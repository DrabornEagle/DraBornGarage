name: DraBornGarage v0.8.4 Final Fix

on:
  push:
    branches:
      - feature/v0.8.4-clean-release
    paths:
      - scripts/fix_v084_typecheck.mjs
      - .github/workflows/v084-fix.yml

permissions:
  contents: write

jobs:
  fix-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout clean branch
        uses: actions/checkout@v4
        with:
          ref: feature/v0.8.4-clean-release
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply final type fix
        run: node scripts/fix_v084_typecheck.mjs

      - name: Commit final source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: finalize v0.8.4 type safety" || true
          git pull --rebase origin feature/v0.8.4-clean-release
          git push origin HEAD:feature/v0.8.4-clean-release

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript validation
        run: npm run typecheck

      - name: Android JavaScript bundle validation
        run: |
          rm -rf dist
          npm run test:bundle
          rm -rf dist
