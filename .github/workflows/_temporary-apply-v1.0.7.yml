name: Temporary Apply v1.0.7 Hardening

on:
  push:
    branches: [main]
    paths:
      - .github/apply-v1.0.7-request.txt
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: draborngarage-v1-0-7-hardening
  cancel-in-progress: false

jobs:
  apply-test-persist:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      CI: "true"
      EXPO_NO_TELEMETRY: "1"
      EXPO_NO_GIT_STATUS: "1"
      EXPO_PUBLIC_SUPABASE_URL: https://xpdiwyxnnrmyvpcqwuyb.supabase.co
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_cu71JQGPiRusMw_YeZzUbg_6r9r13TG
      EXPO_PUBLIC_NATIVE_PUSH_ENABLED: "true"
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Apply v1.0.7 hardening
        run: python3 scripts/apply_v1_0_7_release_hardening.py
      - name: Synchronize package lock
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Expo Doctor
        run: npx expo-doctor
      - name: TypeScript
        run: npm run typecheck
      - name: Android JavaScript bundle
        run: npm run test:bundle
      - name: Verify v1.0.7 rules
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const app = require('./app.json').expo;
          const pkg = require('./package.json');
          const lock = require('./package-lock.json');
          if (app.version !== '1.0.7' || app.android.versionCode !== 25 || app.ios.buildNumber !== '25') throw new Error('Native version mismatch');
          if (pkg.version !== '1.0.7' || lock.version !== '1.0.7' || lock.packages?.['']?.version !== '1.0.7') throw new Error('Package version mismatch');
          NODE
          grep -q "AppErrorBoundary" App.tsx
          grep -q "odometerProfile" src/context/AuthContext.tsx
          grep -q "select('customer_motorcycle_odometer')" src/context/AuthContext.tsx
          grep -q "const EAS_PROJECT_ID" src/notifications/NotificationContextV101.tsx
          grep -q "Boolean(EAS_PROJECT_ID)" src/notifications/NotificationContextV101.tsx
          grep -q "unreadCountRef.current" src/notifications/NotificationContextV101.tsx
          grep -q "DRABORNGARAGE_PRODUCTION_SIGNING" scripts/configure_android_signing.py
          grep -q "61:69:5A:48:64:07:75:75" docs/RELEASE_SIGNING.md
      - name: Persist tested source
        shell: bash
        run: |
          set -euo pipefail
          files=(
            app.json
            package.json
            package-lock.json
            App.tsx
            .gitignore
            eas.json
            src/context/AuthContext.tsx
            src/notifications/NotificationContextV101.tsx
            src/components/AppErrorBoundary.tsx
            scripts/configure_android_signing.py
            docs/RELEASE_SIGNING.md
          )
          for path in "${files[@]}"; do
            export TARGET_PATH="$path"
            export TARGET_SHA="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=main" --jq .sha 2>/dev/null || true)"
            python3 <<'PY'
          from pathlib import Path
          import base64, json, os
          path = os.environ['TARGET_PATH']
          payload = {
              'message': 'v1.0.7: login recovery, push hardening and production signing setup',
              'content': base64.b64encode(Path(path).read_bytes()).decode(),
              'branch': 'main',
          }
          if os.environ.get('TARGET_SHA'):
              payload['sha'] = os.environ['TARGET_SHA']
          Path('payload.json').write_text(json.dumps(payload), encoding='utf-8')
          PY
            gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" --input payload.json >/dev/null
          done
      - name: Publish result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          result='${{ job.status }}'
          path=.github/v1.0.7-apply-result.json
          sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=main" --jq .sha 2>/dev/null || true)"
          export RESULT="$result" TARGET_SHA="$sha" RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          python3 <<'PY'
          import base64, json, os
          data = (json.dumps({'result': os.environ['RESULT'], 'run_url': os.environ['RUN_URL']}, indent=2) + '\n').encode()
          payload = {'message':'ci: update v1.0.7 result','content':base64.b64encode(data).decode(),'branch':'main'}
          if os.environ.get('TARGET_SHA'): payload['sha']=os.environ['TARGET_SHA']
          open('result.json','w',encoding='utf-8').write(json.dumps(payload))
          PY
          gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" --input result.json >/dev/null
