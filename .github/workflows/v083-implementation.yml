name: DraBornGarage v0.8.3 Implementation

on:
  push:
    branches:
      - feature/v0.8.3-customer-motor-tax-linking
    paths:
      - scripts/apply_v083.mjs
      - scripts/fix_v083.mjs
      - .github/workflows/v083-implementation.yml

concurrency:
  group: draborngarage-v083-generation
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  implement-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/v0.8.3-customer-motor-tax-linking
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply v0.8.3 source changes
        run: node scripts/apply_v083.mjs

      - name: Apply v0.8.3 follow-up fixes
        run: node scripts/fix_v083.mjs

      - name: Persist generated v0.8.3 files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Generated changes are already committed."
          else
            git commit -m "fix: finalize v0.8.3 tax and plate linking"
            git pull --rebase origin feature/v0.8.3-customer-motor-tax-linking
            git push origin HEAD:feature/v0.8.3-customer-motor-tax-linking
          fi

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript validation
        run: npm run typecheck

      - name: Android JavaScript bundle validation
        run: |
          rm -rf dist
          npm run test:bundle
          rm -rf dist
