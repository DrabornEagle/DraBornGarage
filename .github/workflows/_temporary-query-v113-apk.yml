name: Temporary Query v1.1.3 APK

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-query-v113-apk.yml

permissions:
  contents: write
  actions: read

jobs:
  query:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Record recent APK runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p docs
          gh run list --repo "$GITHUB_REPOSITORY" --workflow release-apk.yml --branch main --limit 8 --json databaseId,status,conclusion,headSha,createdAt,updatedAt,url > docs/V113_APK_RUN_QUERY.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/V113_APK_RUN_QUERY.json
          git commit -m "ci: record v1.1.3 APK run status"
          git pull --rebase origin main
          git push origin HEAD:main
