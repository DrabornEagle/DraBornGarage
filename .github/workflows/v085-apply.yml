name: DraBornGarage v0.8.5 Apply

on:
  push:
    branches:
      - feature/v0.8.5-mechanic-applications-ui
    paths:
      - scripts/v085_parts/**
      - .github/workflows/v085-apply.yml

permissions:
  contents: write

concurrency:
  group: draborngarage-v085-apply
  cancel-in-progress: true

jobs:
  apply-validate-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/v0.8.5-mechanic-applications-ui
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Assemble and apply v0.8.5
        run: |
          cat scripts/v085_parts/*.part > /tmp/apply_v085.py
          python /tmp/apply_v085.py
          test "$(node -p "require('./package.json').version")" = "0.8.5"
          if grep -RIn "bicycle" src; then
            echo "Bisiklet simgesi kaldı."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript validation
        run: npm run typecheck

      - name: Android JavaScript bundle validation
        run: |
          rm -rf dist
          npm run test:bundle
          rm -rf dist

      - name: Remove one-time generation files
        run: |
          rm -rf scripts/v085_parts
          rm -f .github/workflows/v085-apply.yml
          rm -f .github/workflows/v085-scan.yml
          rm -f v085-scan.txt

      - name: Commit validated v0.8.5
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: complete v0.8.5 mechanic applications and readable UI"
          git pull --rebase origin feature/v0.8.5-mechanic-applications-ui
          git push origin HEAD:feature/v0.8.5-mechanic-applications-ui
