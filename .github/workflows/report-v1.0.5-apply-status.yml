name: Report DraBornGarage v1.0.5 Apply Status

on:
  workflow_run:
    workflows:
      - Apply DraBornGarage v1.0.5 Notifications
    types:
      - completed

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Write status
        shell: bash
        run: |
          set -euo pipefail
          payload="$(jq -n \
            --arg status '${{ github.event.workflow_run.status }}' \
            --arg conclusion '${{ github.event.workflow_run.conclusion }}' \
            --arg url '${{ github.event.workflow_run.html_url }}' \
            --argjson run_id '${{ github.event.workflow_run.id }}' \
            --arg head_sha '${{ github.event.workflow_run.head_sha }}' \
            '{status:$status,conclusion:$conclusion,url:$url,run_id:$run_id,head_sha:$head_sha}')"
          content="$(printf '%s\n' "$payload" | base64 -w0)"
          sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/.github/v1.0.5-apply-status.json?ref=main" --jq .sha 2>/dev/null || true)"
          if [ -n "$sha" ]; then
            gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/.github/v1.0.5-apply-status.json" -f message='ci: update v1.0.5 apply status' -f content="$content" -f sha="$sha" -f branch=main >/dev/null
          else
            gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/.github/v1.0.5-apply-status.json" -f message='ci: record v1.0.5 apply status' -f content="$content" -f branch=main >/dev/null
          fi
