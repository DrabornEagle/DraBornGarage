name: Temporary Snapshot DraBornGarage v1.1.7 APK

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-snapshot-v117-apk.yml

permissions:
  contents: write
  actions: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Write latest Release APK run snapshot
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs
          gh run list --repo "$GITHUB_REPOSITORY" --workflow release-apk.yml --event workflow_dispatch --branch main --limit 3 --json databaseId,status,conclusion,headSha,createdAt,updatedAt,url > docs/APK_RUN_SNAPSHOT_V117.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/APK_RUN_SNAPSHOT_V117.json
          git commit -m 'build: snapshot v1.1.7 Release APK run'
          git pull --rebase origin main
          git push origin HEAD:main
