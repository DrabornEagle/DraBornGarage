name: Temporary Dispatch Verified APK

on:
  push:
    branches: [main]
    paths:
      - .github/dispatch-verified-apk-request.txt

permissions:
  actions: write
  contents: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Release APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release-apk.yml --repo "$GITHUB_REPOSITORY" --ref main -f publish_github_release=true
      - name: Remove dispatcher files
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          req=.github/dispatch-verified-apk-request.txt
          req_sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${req}?ref=main" --jq .sha)"
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/contents/${req}" -f message='ci: remove verified APK request' -f sha="$req_sha" -f branch=main >/dev/null
          self=.github/workflows/_temporary-dispatch-verified-apk.yml
          self_sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${self}?ref=main" --jq .sha)"
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/contents/${self}" -f message='ci: remove temporary verified APK dispatcher' -f sha="$self_sha" -f branch=main >/dev/null
