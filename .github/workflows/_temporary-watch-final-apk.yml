name: Temporary Watch Final APK

on:
  push:
    branches: [main]
    paths:
      - .github/watch-final-apk-request.txt

permissions:
  actions: read
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Wait for latest Release APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sleep 8
          gh run list --repo "$GITHUB_REPOSITORY" --workflow release-apk.yml --limit 1 --json databaseId,status,conclusion,url,headSha,createdAt > run-start.json
          id="$(jq -r '.[0].databaseId')"
          echo "Watching Release APK run $id"
          set +e
          gh run watch "$id" --repo "$GITHUB_REPOSITORY" --exit-status --interval 10
          watch_status=$?
          set -e
          gh run view "$id" --repo "$GITHUB_REPOSITORY" --json databaseId,status,conclusion,url,headSha,createdAt,jobs > run-final.json
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${id}/artifacts?per_page=100" > artifacts.json
          jq -n --slurpfile run run-final.json --slurpfile artifacts artifacts.json --argjson watch_status "$watch_status" '{watch_status:$watch_status,run:$run[0],artifacts:$artifacts[0].artifacts}' > final-apk-status.json
      - name: Persist result and clean watcher
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          path=.github/final-apk-status.json
          sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=main" --jq .sha 2>/dev/null || true)"
          if [ ! -s final-apk-status.json ]; then echo '{"error":"watcher did not produce a status file"}' > final-apk-status.json; fi
          content="$(base64 -w0 final-apk-status.json)"
          args=(--method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" -f message='ci: save final production APK status' -f content="$content" -f branch=main)
          [ -z "$sha" ] || args+=(-f sha="$sha")
          gh api "${args[@]}" >/dev/null
          req=.github/watch-final-apk-request.txt
          req_sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${req}?ref=main" --jq .sha 2>/dev/null || true)"
          [ -z "$req_sha" ] || gh api --method DELETE "repos/${GITHUB_REPOSITORY}/contents/${req}" -f message='ci: remove final APK watch request' -f sha="$req_sha" -f branch=main >/dev/null
          self=.github/workflows/_temporary-watch-final-apk.yml
          self_sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${self}?ref=main" --jq .sha 2>/dev/null || true)"
          [ -z "$self_sha" ] || gh api --method DELETE "repos/${GITHUB_REPOSITORY}/contents/${self}" -f message='ci: remove temporary final APK watcher' -f sha="$self_sha" -f branch=main >/dev/null
