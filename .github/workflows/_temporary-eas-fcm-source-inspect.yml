name: Temporary EAS FCM Source Inspect

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-eas-fcm-source-inspect.yml

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install current EAS CLI locally
        run: npm install --no-save --ignore-scripts eas-cli@latest
      - name: Inspect FCM credential implementation
        shell: bash
        run: |
          mkdir -p .runtime
          {
            echo '=== EAS CLI VERSION ==='
            npx eas-cli --version
            echo
            echo '=== MATCHING FILES ==='
            grep -RIlE 'FCM V1|Push Notifications|Google Service Account Key' node_modules/eas-cli/build node_modules/eas-cli/dist 2>/dev/null | head -n 80
            echo
            echo '=== RELEVANT SOURCE SNIPPETS ==='
            grep -RInE 'FCM V1|Push Notifications|Google Service Account Key|create.*GoogleServiceAccount|upload.*ServiceAccount|Android.*ServiceAccount' node_modules/eas-cli/build node_modules/eas-cli/dist 2>/dev/null | head -n 1000
          } > .runtime/eas-fcm-source.txt
      - name: Persist sanitized report
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/_temporary-eas-fcm-source-inspect.yml
          git add .runtime/eas-fcm-source.txt
          git commit -m 'chore: inspect EAS FCM credential automation surface'
          git push origin HEAD:main
