name: Apply v0.9.7 Fixes

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feature/v0.9.7-total-completed-ready-price-guard'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/v0.9.7-total-completed-ready-price-guard
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply v0.9.7 source fixes
        run: node scripts/apply-v097-fixes.mjs

      - name: Commit generated changes
        run: |
          if git diff --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md app.json package.json package-lock.json docs/TERMUX_INSTALL.md src
          git commit -m "DraBornGarage v0.9.7: toplam iş sayısı ve Motor Hazır ücret koruması"
          git push origin HEAD:feature/v0.9.7-total-completed-ready-price-guard
