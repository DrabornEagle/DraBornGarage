name: Temporary EAS Credentials Help

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-eas-credentials-help.yml

permissions:
  contents: write

jobs:
  help:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Read official CLI help
        run: |
          mkdir -p .runtime
          npx --yes eas-cli@21.0.1 credentials --help > .runtime/eas-credentials-help.txt 2>&1
      - name: Persist help and remove workflow
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/_temporary-eas-credentials-help.yml
          git add .runtime/eas-credentials-help.txt
          git commit -m 'chore: capture EAS credentials command help'
          git pull --rebase origin main
          git push origin HEAD:main
