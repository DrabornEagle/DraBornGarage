name: Temporary EAS Credentials Help

on:
  push:
    branches: [main]
    paths:
      - .github/eas-credentials-help-request.txt

permissions:
  contents: write

jobs:
  help:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Collect EAS CLI credential help
        run: |
          npm ci --no-audit --no-fund
          {
            echo '=== credentials --help ==='
            npx --yes eas-cli@latest credentials --help || true
            echo '=== credentials:configure-build --help ==='
            npx --yes eas-cli@latest credentials:configure-build --help || true
            echo '=== help ==='
            npx --yes eas-cli@latest --help || true
          } > eas-credentials-help.txt 2>&1
      - name: Persist report and clean
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          path=.github/eas-credentials-help.txt
          sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=main" --jq .sha 2>/dev/null || true)"
          content="$(base64 -w0 eas-credentials-help.txt)"
          args=(--method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" -f message='ci: save EAS credentials help' -f content="$content" -f branch=main)
          [ -z "$sha" ] || args+=(-f sha="$sha")
          gh api "${args[@]}" >/dev/null
          req=.github/eas-credentials-help-request.txt
          req_sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${req}?ref=main" --jq .sha)"
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/contents/${req}" -f message='ci: remove EAS credentials help request' -f sha="$req_sha" -f branch=main >/dev/null
          self=.github/workflows/_temporary-eas-credentials-help.yml
          self_sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${self}?ref=main" --jq .sha)"
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/contents/${self}" -f message='ci: remove temporary EAS credentials helper' -f sha="$self_sha" -f branch=main >/dev/null
