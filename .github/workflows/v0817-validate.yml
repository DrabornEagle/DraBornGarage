name: DraBornGarage v0.8.17 Validate

on:
  push:
    branches:
      - feature/v0.8.17-push-sounds-payment-focus
    paths:
      - scripts/apply_v0817.py
      - .github/workflows/v0817-validate.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: draborngarage-v0817-validate
  cancel-in-progress: true

jobs:
  validate-and-finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/v0.8.17-push-sounds-payment-focus
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply v0.8.17 changes
        run: python3 scripts/apply_v0817.py

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript validation
        run: npm run typecheck

      - name: Android JavaScript bundle validation
        run: |
          rm -rf dist
          npm run test:bundle
          rm -rf dist

      - name: Verify generated sound assets
        run: |
          test -s assets/sounds/garage_chime.wav
          test -s assets/sounds/garage_pulse.wav
          test -s assets/sounds/garage_alert.wav
          file assets/sounds/*.wav

      - name: Remove one-time updater
        run: |
          rm -f scripts/apply_v0817.py
          rm -f .github/workflows/v0817-validate.yml

      - name: Commit validated v0.8.17
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: finalize v0.8.17 push sounds and payment focus"
          git pull --rebase origin feature/v0.8.17-push-sounds-payment-focus
          git push origin HEAD:feature/v0.8.17-push-sounds-payment-focus
