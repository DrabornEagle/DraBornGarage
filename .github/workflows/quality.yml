name: DraBornGarage Quality Gate

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-v091-ui:
    if: github.ref == 'refs/heads/feature/v0.9.1-navigation-sounds-payment-push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/v0.9.1-navigation-sounds-payment-push
          fetch-depth: 0
      - name: Apply source patches
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text()
              if old not in text:
                  raise SystemExit(f"Pattern not found in {path}: {old[:100]!r}")
              p.write_text(text.replace(old, new, 1))

          replace_once('src/privacy/PrivacyCenter.tsx', "floatingButton: { position: 'absolute', zIndex: 80, top: 50, left: 14,", "floatingButton: { position: 'absolute', zIndex: 80, top: 50, right: 14,")
          replace_once('src/screens/AppointmentsScreen.tsx', "import { Ionicons } from '@expo/vector-icons';\n", "import { Ionicons } from '@expo/vector-icons';\nimport { LinearGradient } from 'expo-linear-gradient';\n")
          replace_once('src/screens/AppointmentsScreen.tsx', """    <View style={[styles.tabs, { backgroundColor: colors.surfaceSoft, borderColor: colors.border }]}>
      {([['calendar', 'Takvim', 'calendar'], ['new', editing ? 'Yeniden Planla' : 'Randevu Ekle', 'add-circle'], ['schedule', 'Çalışma Saatleri', 'time']] as [Tab, string, keyof typeof Ionicons.glyphMap][]).map(([value, label, icon]) => <AnimatedPressable key={value} onPress={() => { setTab(value); if (value !== 'new') setEditing(null); }} style={[styles.tab, tab === value && { backgroundColor: colors.cardStrong, borderColor: `${colors.primary}60` }]}><Ionicons name={icon} size={18} color={tab === value ? colors.primary : colors.textMuted} /><Text style={[styles.tabText, { color: tab === value ? colors.text : colors.textMuted }]}>{label}</Text></AnimatedPressable>)}
    </View>""", """    <View style={styles.modeGrid}>
      <AppointmentModeCard active={tab === 'calendar'} title="Takvim" subtitle="Günlük randevuları gör ve yönet" icon="calendar" accent={colors.cyan} onPress={() => { setTab('calendar'); setEditing(null); }} />
      <AppointmentModeCard active={tab === 'new'} title={editing ? 'Yeniden Planla' : 'Randevu Ekle'} subtitle={editing ? 'Seçili kaydın tarihini değiştir' : 'Müşteri için yeni kayıt oluştur'} icon="add-circle" accent={colors.green} onPress={() => setTab('new')} />
      <AppointmentModeCard active={tab === 'schedule'} title="Çalışma Saatleri" subtitle="Müsaitlik, mola ve kapalı zamanlar" icon="time" accent={colors.orange} onPress={() => { setTab('schedule'); setEditing(null); }} />
    </View>""")
          marker = "function Choice({ active, title, sub, onPress }:"
          helper = """function AppointmentModeCard({ active, title, subtitle, icon, accent, onPress }: { active: boolean; title: string; subtitle: string; icon: keyof typeof Ionicons.glyphMap; accent: string; onPress: () => void }) {
  const { colors } = useTheme();
  return <AnimatedPressable onPress={onPress} style={[styles.modeCard, { backgroundColor: active ? 'transparent' : colors.card, borderColor: active ? accent : colors.border, shadowColor: active ? accent : colors.black }]}>
    {active && <LinearGradient colors={[`${accent}EE`, `${colors.primary2}E8`, `${colors.black}F2`]} start={{ x: 0, y: 0 }} end={{ x: 1, y: 1 }} style={StyleSheet.absoluteFill} />}
    <View style={[styles.modeIcon, { backgroundColor: active ? 'rgba(255,255,255,0.16)' : `${accent}15`, borderColor: active ? 'rgba(255,255,255,0.26)' : `${accent}35` }]}><Ionicons name={icon} size={23} color={active ? '#fff' : accent} /></View>
    <View style={styles.copy}><Text numberOfLines={1} style={[styles.modeTitle, { color: active ? '#fff' : colors.text }]}>{title}</Text><Text numberOfLines={2} style={[styles.modeSubtitle, { color: active ? 'rgba(255,255,255,0.76)' : colors.textMuted }]}>{subtitle}</Text></View>
    <Ionicons name={active ? 'checkmark-circle' : 'chevron-forward-circle'} size={21} color={active ? '#fff' : accent} />
  </AnimatedPressable>;
}

"""
          replace_once('src/screens/AppointmentsScreen.tsx', marker, helper + marker)
          replace_once('src/screens/AppointmentsScreen.tsx', "content: { paddingHorizontal: 18, paddingTop: 56, paddingBottom: 120, gap: 15 }, tabs: { flexDirection: 'row', gap: 5, padding: 5, borderWidth: 1, borderRadius: 18 }, tab: { flex: 1, minHeight: 48, borderWidth: 1, borderColor: 'transparent', borderRadius: 14, alignItems: 'center', justifyContent: 'center', gap: 3 }, tabText: { fontSize: 12, fontWeight: '900', textAlign: 'center' }, sectionGap:", "content: { paddingHorizontal: 18, paddingTop: 56, paddingBottom: 120, gap: 15 }, modeGrid: { gap: 9 }, modeCard: { minHeight: 78, borderWidth: 1, borderRadius: 22, paddingHorizontal: 13, paddingVertical: 11, flexDirection: 'row', alignItems: 'center', gap: 11, overflow: 'hidden', shadowOpacity: 0.18, shadowRadius: 14, shadowOffset: { width: 0, height: 8 }, elevation: 6 }, modeIcon: { width: 48, height: 48, borderRadius: 16, borderWidth: 1, alignItems: 'center', justifyContent: 'center' }, modeTitle: { fontSize: 15, fontWeight: '900' }, modeSubtitle: { fontSize: 11.5, lineHeight: 15, marginTop: 3 }, sectionGap:")

          replace_once('src/AppShell.tsx', "const { membership, isAdmin, workshop } = useAuth();", "const { membership, isAdmin, workshop, selectWorkshop } = useAuth();")
          replace_once('src/AppShell.tsx', "const [customerNavigationKey, setCustomerNavigationKey] = useState(0);", "const [customerNavigationKey, setCustomerNavigationKey] = useState(0);\n  const [adminNavigationKey, setAdminNavigationKey] = useState(0);\n  const [focusedPaymentReportId, setFocusedPaymentReportId] = useState<string | null>(null);")
          replace_once('src/AppShell.tsx', """      if (target === 'customers' && navigationTarget.targetSection === 'claims' && allowedForBusiness) {
        setCustomerInitialTab('claims');
        setCustomerNavigationKey((value) => value + 1);
      }
      setTab(allowedForApprentice && allowedForBusiness ? target : isAdmin ? 'team' : 'home');""", """      if (target === 'customers' && navigationTarget.targetSection === 'claims' && allowedForBusiness) {
        setCustomerInitialTab('claims');
        setCustomerNavigationKey((value) => value + 1);
      }
      if (target === 'team' && navigationTarget.targetSection === 'platform' && isAdmin) {
        const paymentReportId = typeof navigationTarget.data?.payment_report_id === 'string' ? navigationTarget.data.payment_report_id : null;
        const targetWorkshopId = typeof navigationTarget.data?.workshop_id === 'string' ? navigationTarget.data.workshop_id : null;
        setFocusedPaymentReportId(paymentReportId);
        setAdminNavigationKey((value) => value + 1);
        if (targetWorkshopId && targetWorkshopId !== workshop?.id) selectWorkshop(targetWorkshopId).catch(() => undefined);
      }
      setTab(allowedForApprentice && allowedForBusiness ? target : isAdmin ? 'team' : 'home');""")
          replace_once('src/AppShell.tsx', "}, [navigationTarget, consumeNavigationTarget, isApprentice, businessRestricted, isAdmin]);", "}, [navigationTarget, consumeNavigationTarget, isApprentice, businessRestricted, isAdmin, selectWorkshop, workshop?.id]);")
          replace_once('src/AppShell.tsx', "? isAdmin ? <AdminScreen /> : <TeamScreen />", "? isAdmin ? <AdminScreen key={`admin-${adminNavigationKey}`} initialSection={focusedPaymentReportId ? 'platform' : undefined} focusPaymentReportId={focusedPaymentReportId} /> : <TeamScreen />")

          replace_once('src/screens/AdminScreen.tsx', "export function AdminScreen() {", "export function AdminScreen({ initialSection, focusPaymentReportId }: { initialSection?: Section; focusPaymentReportId?: string | null }) {")
          replace_once('src/screens/AdminScreen.tsx', "const [section, setSection] = useState<Section>('management');", "const [section, setSection] = useState<Section>(initialSection ?? 'management');")
          replace_once('src/screens/AdminScreen.tsx', "useEffect(() => { load(); }, [load]);", "useEffect(() => { load(); }, [load]);\n  useEffect(() => { if (initialSection) setSection(initialSection); }, [initialSection, focusPaymentReportId]);")
          replace_once('src/screens/AdminScreen.tsx', "<PlatformFeesDashboard />", "<PlatformFeesDashboard focusPaymentReportId={focusPaymentReportId} />")

          replace_once('src/components/PlatformFeesDashboard.tsx', "export function PlatformFeesDashboard() {", "export function PlatformFeesDashboard({ focusPaymentReportId }: { focusPaymentReportId?: string | null }) {")
          replace_once('src/components/PlatformFeesDashboard.tsx', "useEffect(() => { load(); }, [load]);", "useEffect(() => { load(); }, [load]);\n  useEffect(() => { if (!focusPaymentReportId) return; LayoutAnimation.configureNext(LayoutAnimation.Presets.easeInEaseOut); setExpandedSections((current) => ({ ...current, paymentReports: true })); }, [focusPaymentReportId]);")
          replace_once('src/components/PlatformFeesDashboard.tsx', "<PaymentReportCard key={report.id} report={report} isAdmin={isAdmin}", "<PaymentReportCard key={report.id} report={report} focused={report.id === focusPaymentReportId} isAdmin={isAdmin}")
          replace_once('src/components/PlatformFeesDashboard.tsx', "function PaymentReportCard({ report, isAdmin, reviewNote, onReviewNote, onApprove, onReject, onCancel, onOpenReceipt, loading }: { report: PaymentReport; isAdmin: boolean;", "function PaymentReportCard({ report, focused, isAdmin, reviewNote, onReviewNote, onApprove, onReject, onCancel, onOpenReceipt, loading }: { report: PaymentReport; focused?: boolean; isAdmin: boolean;")
          replace_once('src/components/PlatformFeesDashboard.tsx', "return <GlassCard style={styles.reportCard}>", "return <GlassCard style={[styles.reportCard, focused && { borderColor: colors.green, borderWidth: 2, backgroundColor: `${colors.green}10` }]}>")
          replace_once('src/components/PlatformFeesDashboard.tsx', "<View style={styles.row}><View style={[styles.reportIcon", "{focused && <View style={[styles.paymentArrivalBanner, { backgroundColor: `${colors.green}18`, borderColor: `${colors.green}55` }]}><Ionicons name=\"cash\" size={19} color={colors.green} /><Text style={[styles.paymentArrivalText, { color: colors.green }]}>ÖDEME GELDİ • İNCELE VE ONAYLA</Text></View>}\n    <View style={styles.row}><View style={[styles.reportIcon")
          replace_once('src/components/PlatformFeesDashboard.tsx', "reportCard: { gap:", "paymentArrivalBanner: { minHeight: 43, borderWidth: 1, borderRadius: 14, paddingHorizontal: 11, flexDirection: 'row', alignItems: 'center', justifyContent: 'center', gap: 7 }, paymentArrivalText: { fontSize: 11.5, fontWeight: '900', letterSpacing: 0.5 }, reportCard: { gap:")
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src
          git commit -m "feat(v0.9.1): modern calendar privacy placement and payment focus [skip ci]"
          git push origin HEAD:feature/v0.9.1-navigation-sounds-payment-push

  android-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund
      - name: TypeScript
        run: npm run typecheck
      - name: Android JavaScript bundle
        run: npm run test:bundle
