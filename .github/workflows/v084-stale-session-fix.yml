name: DraBornGarage v0.8.4 Stale Session Fix

on:
  push:
    branches:
      - fix/v0.8.4-stale-session-cleanup
    paths:
      - scripts/apply_v084_stale_session_fix.mjs
      - .github/workflows/v084-stale-session-fix.yml

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: fix/v0.8.4-stale-session-cleanup
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply stale session fix
        run: node scripts/apply_v084_stale_session_fix.mjs

      - name: Commit fixed source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: clear sessions for deleted accounts" || true
          git pull --rebase origin fix/v0.8.4-stale-session-cleanup
          git push origin HEAD:fix/v0.8.4-stale-session-cleanup

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript validation
        run: npm run typecheck

      - name: Android JavaScript bundle validation
        run: |
          rm -rf dist
          npm run test:bundle
          rm -rf dist
