name: Temporary Query DraBornGarage v1.1.5 Quality

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-query-v115-quality.yml

permissions:
  contents: write
  actions: read

jobs:
  query:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Record quality run
        shell: bash
        run: |
          set -euo pipefail
          sleep 15
          gh run list --repo "$GITHUB_REPOSITORY" --workflow _temporary-v115-quality.yml --limit 8 --json databaseId,event,status,conclusion,headSha,createdAt,updatedAt,url > docs/V115_QUALITY_RUNS.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/V115_QUALITY_RUNS.json
          git commit -m 'ci: record v1.1.5 quality run status'
          git pull --rebase origin main
          git push origin HEAD:main
