name: Temporary Query DraBornGarage v1.1.5 Quality

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-query-v115-quality.yml

permissions:
  contents: write
  actions: read

jobs:
  query:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Record latest quality run
        shell: bash
        run: |
          set -euo pipefail
          sleep 12
          run_id="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow _temporary-v115-quality.yml --limit 1 --json databaseId --jq '.[0].databaseId')"
          test -n "$run_id"
          for attempt in $(seq 1 60); do
            status="$(gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --json status --jq '.status')"
            [ "$status" = completed ] && break
            sleep 10
          done
          gh run list --repo "$GITHUB_REPOSITORY" --workflow _temporary-v115-quality.yml --limit 8 --json databaseId,event,status,conclusion,headSha,createdAt,updatedAt,url > docs/V115_QUALITY_RUNS.json
          gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --json status,conclusion,headSha,jobs,url > docs/V115_QUALITY_LATEST.json
          gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --log-failed > docs/V115_QUALITY_FAILED.log 2>&1 || true
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/V115_QUALITY_RUNS.json docs/V115_QUALITY_LATEST.json docs/V115_QUALITY_FAILED.log
          git commit -m 'ci: record latest v1.1.5 quality result'
          git pull --rebase origin main
          git push origin HEAD:main
