name: Finalize DraBornGarage v1.0.5 Lockfile

on:
  push:
    branches:
      - main
    paths:
      - .github/finalize-v1.0.5-lock-request.txt
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: "true"
      EXPO_NO_TELEMETRY: "1"
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Generate locked dependencies
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Verify lock metadata
        run: |
          node <<'NODE'
          const pkg = require('./package.json');
          const lock = require('./package-lock.json');
          if (pkg.version !== '1.0.5') throw new Error('package.json version mismatch');
          if (pkg.dependencies.expo !== '~54.0.36') throw new Error('Expo range mismatch');
          if (lock.version !== '1.0.5' || lock.packages?.['']?.version !== '1.0.5') throw new Error('lock version mismatch');
          if (lock.packages?.['']?.dependencies?.expo !== '~54.0.36') throw new Error('lock Expo range mismatch');
          if (lock.packages?.['node_modules/expo']?.version !== '54.0.36') throw new Error('resolved Expo version mismatch');
          NODE

      - name: Install and validate
        run: |
          npm ci --no-audit --no-fund
          npx expo-doctor
          npm run typecheck
          npm run test:bundle

      - name: Persist package lock through JSON input
        shell: bash
        run: |
          set -euo pipefail
          base64 -w0 package-lock.json > package-lock.b64
          SHA="$(gh api "repos/${GITHUB_REPOSITORY}/contents/package-lock.json?ref=main" --jq .sha)"
          jq -n \
            --arg message 'v1.0.5: finalize Expo 54.0.36 package lock' \
            --arg branch 'main' \
            --arg sha "$SHA" \
            --rawfile content package-lock.b64 \
            '{message:$message,branch:$branch,sha:$sha,content:$content}' > package-lock-payload.json
          gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/package-lock.json" --input package-lock-payload.json >/dev/null

      - name: Verify persisted lock
        shell: bash
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/contents/package-lock.json?ref=main" --jq .content | tr -d '\n' | base64 -d > remote-package-lock.json
          node <<'NODE'
          const lock = require('./remote-package-lock.json');
          if (lock.version !== '1.0.5' || lock.packages?.['']?.version !== '1.0.5') throw new Error('remote lock mismatch');
          if (lock.packages?.['node_modules/expo']?.version !== '54.0.36') throw new Error('remote Expo mismatch');
          NODE

      - name: Write completion status
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          payload="$(jq -n --arg result '${{ job.status }}' --arg run_url '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}' '{result:$result,run_url:$run_url}')"
          printf '%s\n' "$payload" > status.json
          base64 -w0 status.json > status.b64
          SHA="$(gh api "repos/${GITHUB_REPOSITORY}/contents/.github/v1.0.5-lock-status.json?ref=main" --jq .sha 2>/dev/null || true)"
          if [ -n "$SHA" ]; then
            jq -n --arg message 'ci: update v1.0.5 lock status' --arg branch main --arg sha "$SHA" --rawfile content status.b64 '{message:$message,branch:$branch,sha:$sha,content:$content}' > status-payload.json
          else
            jq -n --arg message 'ci: record v1.0.5 lock status' --arg branch main --rawfile content status.b64 '{message:$message,branch:$branch,content:$content}' > status-payload.json
          fi
          gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/.github/v1.0.5-lock-status.json" --input status-payload.json >/dev/null
