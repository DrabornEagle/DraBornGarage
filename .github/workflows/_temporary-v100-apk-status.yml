name: Temporary v1.0.0 APK Status

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-v100-apk-status.yml

permissions:
  actions: read
  contents: write

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Capture Release APK run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .runtime
          gh run list --repo "$GITHUB_REPOSITORY" --workflow "Release APK" --limit 5 --json databaseId,status,conclusion,headSha,url,createdAt > .runtime/v100-apk-status.json
      - name: Persist status
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/_temporary-v100-apk-status.yml
          git add .runtime/v100-apk-status.json
          git commit -m 'chore: publish v1.0.0 APK status'
          git pull --rebase origin main
          git push origin HEAD:main
