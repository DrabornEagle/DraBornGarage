name: Apply v0.9.6 Fixes

on:
  push:
    branches:
      - feature/v0.9.6-workflow-notifications-pricing
    paths:
      - scripts/apply-v096-fixes.mjs
      - .github/workflows/apply-v096-fixes.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: feature/v0.9.6-workflow-notifications-pricing
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply source fixes
        run: node scripts/apply-v096-fixes.mjs

      - name: Commit generated changes
        run: |
          if git diff --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md app.json package.json package-lock.json docs/TERMUX_INSTALL.md src
          git commit -m "DraBornGarage v0.9.6: servis akışı, fiyat ve bildirim düzeltmeleri"
          git push origin HEAD:feature/v0.9.6-workflow-notifications-pricing
