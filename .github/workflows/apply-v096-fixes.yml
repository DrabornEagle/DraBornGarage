name: Apply v0.9.6 Fixes

on:
  push:
    branches:
      - feature/v0.9.6-workflow-notifications-pricing
    paths:
      - scripts/apply-v096-fixes.mjs
      - .github/workflows/apply-v096-fixes.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: feature/v0.9.6-workflow-notifications-pricing
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply source fixes and capture log
        id: apply
        shell: bash
        run: |
          set +e
          node scripts/apply-v096-fixes.mjs > /tmp/v096-apply.log 2>&1
          STATUS=$?
          cat /tmp/v096-apply.log
          cp /tmp/v096-apply.log scripts/v096-apply.log
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit generated changes or diagnostic log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/v096-apply.log
          if [ "${{ steps.apply.outputs.status }}" = "0" ]; then
            git add README.md app.json package.json package-lock.json docs/TERMUX_INSTALL.md src
            MESSAGE="DraBornGarage v0.9.6: servis akışı, fiyat ve bildirim düzeltmeleri"
          else
            MESSAGE="diagnostic: v0.9.6 yama hata günlüğü"
          fi
          git diff --cached --quiet || git commit -m "$MESSAGE"
          git push origin HEAD:feature/v0.9.6-workflow-notifications-pricing
