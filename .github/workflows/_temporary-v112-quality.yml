name: Temporary v1.1.2 Quality

on:
  push:
    branches:
      - fix/v1.1.2-notification-delivery
    paths:
      - docs/.v112-quality-trigger

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      CI: "true"
      EXPO_NO_TELEMETRY: "1"
      EXPO_PUBLIC_SUPABASE_URL: "https://example.supabase.co"
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: "test-key"
      EXPO_PUBLIC_NATIVE_PUSH_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/v1.1.2-notification-delivery
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Sync lock version
        run: npm install --package-lock-only --ignore-scripts
      - name: Install dependencies
        run: npm ci
      - name: TypeScript
        run: npm run typecheck
      - name: Android bundle
        run: npm run test:bundle
      - name: Commit validated lockfile
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          rm -f docs/.v112-quality-trigger
          rm -f .github/workflows/_temporary-v112-quality.yml
          rm -f scripts/patch_v112_notifications.mjs
          rm -f docs/.v112-plan.tmp
          git add -A
          git commit -m "test: validate v1.1.2 notification delivery"
          git push origin HEAD:fix/v1.1.2-notification-delivery
