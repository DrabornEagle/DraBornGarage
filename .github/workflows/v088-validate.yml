name: DraBornGarage v0.8.8 Validate

on:
  push:
    branches:
      - feature/v0.8.8-notification-reports-sportbike
    paths:
      - scripts/apply_v088.py
      - .github/workflows/v088-validate.yml
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: draborngarage-v088-validate
  cancel-in-progress: true

jobs:
  validate-and-finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/v0.8.8-notification-reports-sportbike
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Capture v0.8.8 apply diagnostics
        id: apply
        continue-on-error: true
        run: |
          set +e
          python3 scripts/apply_v088.py > v088-apply.log 2>&1
          code=$?
          cat v088-apply.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload apply diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: draborngarage-v088-apply
          path: v088-apply.log
          if-no-files-found: error
          retention-days: 7

      - name: Enforce apply result
        run: test "${{ steps.apply.outputs.exit_code }}" = "0"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript validation
        run: npm run typecheck

      - name: Android JavaScript bundle validation
        run: |
          rm -rf dist
          npm run test:bundle
          rm -rf dist

      - name: Remove one-time automation files
        run: |
          rm -f scripts/apply_v088.py
          rm -f .github/workflows/v088-validate.yml
          rm -f v088-apply.log

      - name: Commit validated v0.8.8
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: finalize v0.8.8 notification reports and sportbike UI"
          git pull --rebase origin feature/v0.8.8-notification-reports-sportbike
          git push origin HEAD:feature/v0.8.8-notification-reports-sportbike
