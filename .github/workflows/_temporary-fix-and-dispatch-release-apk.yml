name: Temporary Fix and Dispatch Release APK

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-fix-and-dispatch-release-apk.yml

permissions:
  actions: write
  contents: write

jobs:
  fix-dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch Release APK workflow
        run: |
          python3 <<'PY'
          from pathlib import Path
          p=Path('.github/workflows/release-apk.yml')
          t=p.read_text()
          old='''      - name: Validate production signing secrets\n        shell: bash\n'''
          new='''      - name: Install locked dependencies for EAS project linking\n        run: npm ci --no-audit --no-fund\n\n      - name: Validate production signing secrets\n        shell: bash\n'''
          if old not in t:
              raise SystemExit('Dependency insertion target not found')
          t=t.replace(old,new,1)
          old2='''          if ! git diff --quiet -- app.json; then\n            git config user.name github-actions[bot]\n            git config user.email 41898282+github-actions[bot]@users.noreply.github.com\n            git add app.json\n            git commit -m 'build: link Expo EAS project ID'\n            git push origin HEAD:main\n          fi\n'''
          new2='''          if ! git diff --quiet -- app.json; then\n            APP_SHA="$(gh api "repos/${GITHUB_REPOSITORY}/contents/app.json?ref=main" --jq .sha)"\n            APP_CONTENT="$(base64 -w0 app.json)"\n            gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/app.json" \\\n              -f message='build: link Expo EAS project ID' \\\n              -f content="$APP_CONTENT" \\\n              -f sha="$APP_SHA" \\\n              -f branch=main >/dev/null\n          fi\n'''
          if old2 not in t:
              raise SystemExit('EAS persistence target not found')
          t=t.replace(old2,new2,1)
          p.write_text(t)
          PY
      - name: Persist patched workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          path=.github/workflows/release-apk.yml
          sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=main" --jq .sha)"
          content="$(base64 -w0 "$path")"
          gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" -f message='ci: fix EAS initialization order' -f content="$content" -f sha="$sha" -f branch=main >/dev/null
          sleep 5
      - name: Dispatch patched Release APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release-apk.yml --repo "$GITHUB_REPOSITORY" --ref main -f publish_github_release=true
      - name: Remove temporary patcher
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          self=.github/workflows/_temporary-fix-and-dispatch-release-apk.yml
          self_sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${self}?ref=main" --jq .sha)"
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/contents/${self}" -f message='ci: remove temporary APK patcher' -f sha="$self_sha" -f branch=main >/dev/null
