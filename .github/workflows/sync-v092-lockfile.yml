name: Sync v0.9.2 Lockfile

on:
  push:
    branches: ["hotfix/v0.9.2-expo-go-notification-response"]
    paths:
      - package.json
      - .github/workflows/sync-v092-lockfile.yml

permissions:
  contents: write

jobs:
  sync-lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout hotfix branch
        uses: actions/checkout@v4
        with:
          ref: hotfix/v0.9.2-expo-go-notification-response
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Synchronize package lock metadata
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Commit lockfile when changed
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "Lockfile already synchronized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore(v0.9.2): sync package lock version"
          git push origin HEAD:hotfix/v0.9.2-expo-go-notification-response
