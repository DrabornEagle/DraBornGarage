name: Temporary Dispatch DraBornGarage Release APK

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-dispatch-release-apk.yml

permissions:
  contents: read
  actions: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch real DraBornGarage Release APK workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release-apk.yml --repo "${{ github.repository }}" --ref main -f publish_github_release=false
