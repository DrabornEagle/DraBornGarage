name: Temporary Dispatch Release APK

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-dispatch-release-apk.yml

permissions:
  actions: write
  contents: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Release APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release-apk.yml --repo "$GITHUB_REPOSITORY" --ref main -f publish_github_release=true
      - name: Remove temporary dispatcher
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/.github/workflows/_temporary-dispatch-release-apk.yml?ref=main" --jq .sha)"
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/contents/.github/workflows/_temporary-dispatch-release-apk.yml" -f message='ci: remove temporary APK dispatcher' -f sha="$sha" -f branch=main >/dev/null
