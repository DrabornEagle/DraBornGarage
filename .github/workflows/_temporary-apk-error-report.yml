name: Temporary APK Error Report
on:
  push:
    branches: [main]
    paths: [.github/workflows/_temporary-apk-error-report.yml]
permissions:
  actions: read
  contents: write
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Build short error report
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run view 29454141983 --repo "$GITHUB_REPOSITORY" --log-failed > full.log
          grep -E "(APK yanlış|Engellenen izin|bulunamadı|certificate SHA-256|Signer #1|Process completed|error|Error|FAIL)" full.log | tail -n 80 > short.log || true
      - name: Save report
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          path=.github/apk-error-short.txt
          sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=main" --jq .sha 2>/dev/null || true)"
          content="$(base64 -w0 short.log)"
          args=(--method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" -f message='ci: save APK verification report' -f content="$content" -f branch=main)
          [ -z "$sha" ] || args+=(-f sha="$sha")
          gh api "${args[@]}" >/dev/null
