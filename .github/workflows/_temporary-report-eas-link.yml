name: Temporary Report EAS Link

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-report-eas-link.yml

permissions:
  actions: read
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Collect latest runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run list --repo "$GITHUB_REPOSITORY" --limit 6 --json databaseId,name,status,conclusion,url,createdAt,headSha > eas-link-runs.json
      - name: Persist report and remove self
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          path=.github/eas-link-runs.json
          sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=main" --jq .sha 2>/dev/null || true)"
          content="$(base64 -w0 eas-link-runs.json)"
          if [ -n "$sha" ]; then
            gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" -f message='ci: update EAS link status' -f content="$content" -f sha="$sha" -f branch=main >/dev/null
          else
            gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" -f message='ci: add EAS link status' -f content="$content" -f branch=main >/dev/null
          fi
          self=.github/workflows/_temporary-report-eas-link.yml
          self_sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${self}?ref=main" --jq .sha)"
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/contents/${self}" -f message='ci: remove temporary EAS link reporter' -f sha="$self_sha" -f branch=main >/dev/null
