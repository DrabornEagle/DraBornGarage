name: Temporary v1.1.3 APK Dispatch

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-dispatch-v113-apk.yml

permissions:
  actions: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Run production APK workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release-apk.yml --repo "$GITHUB_REPOSITORY" --ref main -f publish_github_release=false
