name: Sync v0.9 Lockfile

on:
  push:
    branches: ["feature/v0.9-google-play-pilot"]
    paths:
      - package.json
      - .github/workflows/sync-v09-lockfile.yml

permissions:
  contents: write

jobs:
  sync-lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/v0.9-google-play-pilot
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Sync package lock metadata
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Commit lockfile when changed
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "Lockfile is already synchronized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore(v0.9): sync package lock version"
          git push origin HEAD:feature/v0.9-google-play-pilot
