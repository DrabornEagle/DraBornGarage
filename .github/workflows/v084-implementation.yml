name: DraBornGarage v0.8.4 Implementation

on:
  push:
    branches:
      - feature/v0.8.4-approval-calendar-modern-ui
    paths:
      - scripts/apply_v084_core.mjs
      - scripts/apply_v084_ui.mjs
      - .github/workflows/v084-implementation.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/apply_v084_core.mjs
      - scripts/apply_v084_ui.mjs
      - .github/workflows/v084-implementation.yml

concurrency:
  group: draborngarage-v084-generation
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  implement-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/v0.8.4-approval-calendar-modern-ui
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply v0.8.4 core changes
        run: node scripts/apply_v084_core.mjs

      - name: Apply v0.8.4 UI changes
        run: node scripts/apply_v084_ui.mjs

      - name: Persist generated v0.8.4 files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Generated changes are already committed."
          else
            git commit -m "feat: complete v0.8.4 approval calendar and modern UI"
            git pull --rebase origin feature/v0.8.4-approval-calendar-modern-ui
            git push origin HEAD:feature/v0.8.4-approval-calendar-modern-ui
          fi

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript validation
        run: npm run typecheck

      - name: Android JavaScript bundle validation
        run: |
          rm -rf dist
          npm run test:bundle
          rm -rf dist

      - name: Upload validated database files
        uses: actions/upload-artifact@v4
        with:
          name: draborngarage-v084-sql
          path: |
            supabase/migrations/20260712220000_v0_8_4_business_approval.sql
            supabase/rollbacks/20260712220000_v0_8_4_business_approval_rollback.sql
          if-no-files-found: error
          retention-days: 7
