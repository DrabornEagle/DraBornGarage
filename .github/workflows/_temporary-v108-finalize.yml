name: Temporary v1.0.8 Finalize

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-v108-finalize.yml

permissions:
  actions: write
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CI: "true"
      EXPO_NO_TELEMETRY: "1"
      EXPO_NO_GIT_STATUS: "1"
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL || 'https://xpdiwyxnnrmyvpcqwuyb.supabase.co' }}
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_cu71JQGPiRusMw_YeZzUbg_6r9r13TG' }}
      EXPO_PUBLIC_NATIVE_PUSH_ENABLED: "true"
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Apply hotfix
        run: python3 scripts/apply_v108_runtime_hotfix.py
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Expo Doctor
        run: npx expo-doctor
      - name: TypeScript
        run: npm run typecheck
      - name: Android bundle
        run: npm run test:bundle
      - name: Verify hotfix
        run: |
          grep -q "from 'expo-status-bar'" App.tsx
          ! grep -q 'SystemBars' App.tsx
          grep -q "typeof api.addNotificationReceivedListener === 'function'" src/notifications/NotificationContextV101.tsx
          grep -q "typeof api.addNotificationResponseReceivedListener === 'function'" src/notifications/NotificationContextV101.tsx
          grep -q 'if (!open) return null' src/notifications/NotificationCenterScreen.tsx
          node -e "const a=require('./app.json').expo,p=require('./package.json'),l=require('./package-lock.json');if(a.version!=='1.0.8'||a.android.versionCode!==26||p.version!==a.version||l.version!==a.version||l.packages[''].version!==a.version)process.exit(1)"
      - name: Commit and safely rebase
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/_temporary-v108-finalize.yml
          git rm -f .github/workflows/_temporary-v108-runtime-hotfix.yml scripts/apply_v108_runtime_hotfix.py
          git add App.tsx app.json package.json package-lock.json src/notifications/NotificationContextV101.tsx src/notifications/NotificationCenterScreen.tsx src/components/AppErrorBoundary.tsx
          git commit -m 'fix: harden Android startup in v1.0.8'
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
      - name: Dispatch production APK
        run: gh workflow run release-apk.yml --repo "$GITHUB_REPOSITORY" -f publish_github_release=true
