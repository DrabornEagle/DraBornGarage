name: Temporary Dispatch DraBornGarage v1.1.2 APK

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/_temporary-dispatch-v112-apk.yml

permissions:
  actions: write
  contents: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Dispatch release workflow
        run: |
          gh workflow run release-apk.yml --repo "$GITHUB_REPOSITORY" --ref main -f publish_github_release=false
          sleep 10
          mkdir -p docs
          gh run list --repo "$GITHUB_REPOSITORY" --workflow release-apk.yml --branch main --limit 5 --json databaseId,status,conclusion,headSha,createdAt,updatedAt,url > docs/V112_APK_RUN_QUERY.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/V112_APK_RUN_QUERY.json
          git commit -m "ci: record v1.1.2 Release APK run"
          git pull --rebase origin main
          git push origin HEAD:main
