name: Apply DraBornGarage v1.0.4 Native Hotfix

on:
  push:
    branches:
      - main
    paths:
      - scripts/apply_v1_0_4_native_hotfix.py
      - .github/workflows/apply_v1_0_4_native_hotfix_once.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-draborngarage-v1-0-4-native-hotfix
  cancel-in-progress: false

jobs:
  apply-test-and-trigger-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"
      EXPO_NO_TELEMETRY: "1"
      EXPO_NO_GIT_STATUS: "1"
      EXPO_PUBLIC_SUPABASE_URL: https://xpdiwyxnnrmyvpcqwuyb.supabase.co
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_cu71JQGPiRusMw_YeZzUbg_6r9r13TG
      EXPO_PUBLIC_NATIVE_PUSH_ENABLED: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply native hotfix
        run: python3 scripts/apply_v1_0_4_native_hotfix.py

      - name: Update lock file
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Expo Doctor
        run: npx expo-doctor

      - name: TypeScript and Android bundle
        run: npm run test:release

      - name: Verify hotfix source rules
        shell: bash
        run: |
          set -euo pipefail
          grep -q "react-native-edge-to-edge" package.json
          grep -q '"versionCode": 22' app.json
          grep -q "NATIVE_PUSH_ENABLED" src/notifications/NotificationContextV101.tsx
          grep -q 'GARAGE OS • v${APP_VERSION} TEST APK' src/screens/AuthScreen.tsx
          ! grep -R "v1.0.3" src --include='*.tsx'

      - name: Remove one-time files
        run: rm -f scripts/apply_v1_0_4_native_hotfix.py .github/workflows/apply_v1_0_4_native_hotfix_once.yml

      - name: Commit hotfix and trigger Release APK
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "v1.0.4 hotfix: notification stability, transparent navigation and version sync"
          git push origin main
