name: Temporary DraBornGarage v1.1.3 Quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-v113-quality.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "true"
      EXPO_NO_TELEMETRY: "1"
      EXPO_PUBLIC_SUPABASE_URL: "https://example.supabase.co"
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: "test-key"
      EXPO_PUBLIC_NATIVE_PUSH_ENABLED: "true"
    steps:
      - name: Checkout v1.1.3 branch
        uses: actions/checkout@v4
        with:
          ref: fix/v1.1.3-expo-token-module
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Sync package lock
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify direct Expo token modules
        run: |
          node -e "console.log(require.resolve('expo-notifications/build/getDevicePushTokenAsync'))"
          node -e "console.log(require.resolve('expo-notifications/build/getExpoPushTokenAsync'))"
          grep -q "expo-notifications/build/getDevicePushTokenAsync" src/notifications/NotificationContextV113.tsx
          grep -q "expo-notifications/build/getExpoPushTokenAsync" src/notifications/NotificationContextV113.tsx
          ! grep -q "typeof api.getDevicePushTokenAsync" src/notifications/NotificationContextV113.tsx

      - name: Expo Doctor
        run: npx expo-doctor

      - name: TypeScript
        run: npm run typecheck

      - name: Android JavaScript bundle
        run: npm run test:bundle

      - name: Commit validated lockfile
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package-lock.json
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "test: validate v1.1.3 direct Expo push modules"
            git push origin HEAD:fix/v1.1.3-expo-token-module
          fi
