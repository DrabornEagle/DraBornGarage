name: Temporary DraBornGarage v1.1.3 Quality

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-v113-quality.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "true"
      EXPO_NO_TELEMETRY: "1"
      EXPO_PUBLIC_SUPABASE_URL: "https://example.supabase.co"
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: "test-key"
      EXPO_PUBLIC_NATIVE_PUSH_ENABLED: "true"
    steps:
      - name: Checkout v1.1.3 branch
        uses: actions/checkout@v4
        with:
          ref: fix/v1.1.3-expo-token-module
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Improve push error dialog
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'src/notifications/NotificationCenterScreen.tsx';
          let text = fs.readFileSync(path, 'utf8');
          const oldBlock = `  const enablePush = async () => {
            setSaving(true);
            const error = await updatePreferences({ push_notifications_enabled: true });
            const enabled = !error && await registerPushNotifications();
            setSaving(false);
            if (error) return Alert.alert('Push bildirimi açılamadı', error);
            Alert.alert(enabled ? 'Uygulama kapalı bildirimleri hazır' : 'Native APK kurulumu gerekli', enabled
              ? 'Yeni bildirimler uygulama kapalıyken de seçtiğin sesle gelebilir.'
              : 'Expo Go Android uzaktan push alamaz. EAS ile oluşturulan APK kurulduğunda bu özellik otomatik etkinleşir.');
          };`;
          const newBlock = `  const enablePush = async () => {
            setSaving(true);
            const error = await updatePreferences({ push_notifications_enabled: true });
            setSaving(false);
            if (error) return Alert.alert('Push bildirimi açılamadı', error);
            Alert.alert('Uygulama kapalı bildirimleri hazır', 'Telefon bu hesaba kaydedildi. Yeni bildirimler uygulama kapalıyken de seçtiğin sesle gelebilir.');
          };`;
          if (!text.includes(oldBlock)) throw new Error('enablePush bloğu bulunamadı');
          text = text.replace(oldBlock, newBlock);
          text = text.replace('    registerPushNotifications,\n', '');
          text = text.replace(
            `      : 'Cihaz push kaydı veya FCM V1 bağlantısı henüz hazır değil. Bildirim ayarını açık tutup tekrar dene.');`,
            `      : (pushError || 'Cihaz push kaydı henüz hazır değil. Telefonu Push Sistemine Kaydet düğmesini kullan.'));`,
          );
          fs.writeFileSync(path, text);
          NODE

      - name: Sync package lock
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify direct Expo token modules
        run: |
          node -e "console.log(require.resolve('expo-notifications/build/getDevicePushTokenAsync'))"
          node -e "console.log(require.resolve('expo-notifications/build/getExpoPushTokenAsync'))"
          grep -q "expo-notifications/build/getDevicePushTokenAsync" src/notifications/NotificationContextV113.tsx
          grep -q "expo-notifications/build/getExpoPushTokenAsync" src/notifications/NotificationContextV113.tsx
          ! grep -q "typeof api.getDevicePushTokenAsync" src/notifications/NotificationContextV113.tsx

      - name: Expo Doctor
        run: npx expo-doctor

      - name: TypeScript
        run: npm run typecheck

      - name: Android JavaScript bundle
        run: npm run test:bundle

      - name: Commit validated v1.1.3 files
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package-lock.json src/notifications/NotificationCenterScreen.tsx
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "test: validate v1.1.3 direct Expo push modules"
            git push origin HEAD:fix/v1.1.3-expo-token-module
          fi
