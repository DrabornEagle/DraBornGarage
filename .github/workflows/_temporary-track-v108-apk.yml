name: Temporary Track v1.0.8 APK
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-track-v108-apk.yml
permissions:
  actions: read
  contents: write
jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait for APK
        run: |
          sleep 8
          id="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow release-apk.yml --limit 1 --json databaseId --jq '.[0].databaseId')"
          while [ "$(gh run view "$id" --repo "$GITHUB_REPOSITORY" --json status --jq .status)" != completed ]; do sleep 20; done
          gh run view "$id" --repo "$GITHUB_REPOSITORY" --json databaseId,status,conclusion,url,jobs > run.json
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${id}/artifacts" > artifacts.json
          jq -n --slurpfile r run.json --slurpfile a artifacts.json '{run:$r[0],artifacts:$a[0].artifacts}' > final.json
      - name: Publish and clean
        if: always()
        run: |
          [ -s final.json ] || jq -n '{error:"APK tracker failed"}' > final.json
          path=.github/v108-apk-status.json
          existing="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=main" --jq .sha 2>/dev/null || true)"
          content="$(base64 -w0 final.json)"
          args=(--method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" -f message='ci: publish v1.0.8 APK status' -f content="$content" -f branch=main)
          [ -z "$existing" ] || args+=(-f sha="$existing")
          gh api "${args[@]}" >/dev/null
          self=.github/workflows/_temporary-track-v108-apk.yml
          sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${self}?ref=main" --jq .sha 2>/dev/null || true)"
          [ -z "$sha" ] || gh api --method DELETE "repos/${GITHUB_REPOSITORY}/contents/${self}" -f message='ci: remove temporary v1.0.8 APK tracker' -f sha="$sha" -f branch=main >/dev/null
