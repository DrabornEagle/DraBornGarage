name: Temporary v1.1.5 FCM Credential Check

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-v115-secret-check.yml

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Record presence only
        shell: bash
        run: |
          set -euo pipefail
          firebase=false
          expo=false
          [ -n "${FIREBASE_SERVICE_ACCOUNT_JSON:-}" ] && firebase=true
          [ -n "${EXPO_TOKEN:-}" ] && expo=true
          printf '{"firebase_service_account_present":%s,"expo_token_present":%s}\n' "$firebase" "$expo" > docs/V115_SECRET_CHECK.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/V115_SECRET_CHECK.json
          git commit -m 'chore: record v1.1.5 credential availability'
          git pull --rebase origin main
          git push origin HEAD:main
