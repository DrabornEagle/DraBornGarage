name: Temporary Apply DraBornGarage v1.1.0

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  apply-test-package:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.ref == 'agent/v1.1.0-notifications-platform-policy'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "true"
      EXPO_NO_TELEMETRY: "1"
      EXPO_NO_GIT_STATUS: "1"
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL || 'https://xpdiwyxnnrmyvpcqwuyb.supabase.co' }}
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_cu71JQGPiRusMw_YeZzUbg_6r9r13TG' }}
      EXPO_PUBLIC_NATIVE_PUSH_ENABLED: "true"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v1.1.0-notifications-platform-policy
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Decode and apply v1.1.0 patch
        id: patch
        shell: bash
        run: |
          mkdir -p .runtime
          cat scripts/.v110_payload_* | base64 --decode | gzip --decompress > /tmp/v110_upgrade.py
          python3 scripts/.v110_fix.py
          set +e
          python3 /tmp/v110_upgrade.py > .runtime/v110-patch.log 2>&1
          status=$?
          set -e
          cat .runtime/v110-patch.log
          if [ "$status" -ne 0 ]; then exit "$status"; fi
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Install locked dependencies and generate sounds
        shell: bash
        run: npm ci --no-audit --no-fund 2>&1 | tee .runtime/npm-ci.log

      - name: Expo Doctor
        shell: bash
        run: npx expo-doctor 2>&1 | tee .runtime/expo-doctor.log

      - name: TypeScript
        shell: bash
        run: npm run typecheck 2>&1 | tee .runtime/typecheck.log

      - name: Android JavaScript bundle
        shell: bash
        run: npm run test:bundle 2>&1 | tee .runtime/bundle.log

      - name: Verify v1.1.0 source contract
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY' 2>&1 | tee .runtime/contract.log
          from pathlib import Path
          import json, wave
          app=json.loads(Path('app.json').read_text())['expo']
          package=json.loads(Path('package.json').read_text())
          lock=json.loads(Path('package-lock.json').read_text())
          assert app['version']=='1.1.0'
          assert app['android']['versionCode']==1
          assert app['ios']['buildNumber']=='1'
          assert package['version']==lock['version']==lock['packages']['']['version']=='1.1.0'
          notification=next(item[1] for item in app['plugins'] if isinstance(item,list) and item[0]=='expo-notifications')
          assert notification['defaultChannel']=='draborngarage-system-default-v5'
          assert len(notification['sounds'])==9
          durations=[]
          for item in notification['sounds']:
              path=Path(item)
              assert path.exists() and path.stat().st_size>20000, item
              with wave.open(str(path),'rb') as wav:
                  assert wav.getframerate()==44100 and wav.getnchannels()==1 and wav.getsampwidth()==2
                  durations.append(round(wav.getnframes()/wav.getframerate(),2))
          assert len(set(durations))>=6, durations
          assert 'default_fee_percentage numeric(7,4) not null default 10' in Path('supabase/migrations/20260716173000_v1_1_0_notifications_percentage_platform_fee.sql').read_text()
          assert 'name: DraBornGarage Release APK' in Path('.github/workflows/release-apk.yml').read_text()
          assert 'name: DraBornGarage Release AAB' in Path('.github/workflows/release-aab.yml').read_text()
          print('v1.1.0 source contract passed', durations)
          PY

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: v110-validation-diagnostics
          path: .runtime/
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 2

      - name: Prepare tested v1.1.0 source
        shell: bash
        run: |
          set -euo pipefail
          rm -f scripts/.v110_payload_* scripts/.v110_fix.py .github/workflows/_temporary-apply-v110.yml docs/.pr-trigger
          rm -rf .runtime node_modules dist
          tar --exclude=.git --exclude=DraBornGarage-v1.1.0-tested-source.tar.gz -czf DraBornGarage-v1.1.0-tested-source.tar.gz .

      - name: Upload tested v1.1.0 source
        uses: actions/upload-artifact@v4
        with:
          name: DraBornGarage-v1.1.0-tested-source
          path: DraBornGarage-v1.1.0-tested-source.tar.gz
          if-no-files-found: error
          retention-days: 3
          compression-level: 0
