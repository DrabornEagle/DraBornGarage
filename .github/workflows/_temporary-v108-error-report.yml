name: Temporary v1.0.8 Error Report
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-v108-error-report.yml
permissions:
  actions: read
  contents: write
jobs:
  report:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Collect failure
        run: |
          gh run view 29457008912 --repo "$GITHUB_REPOSITORY" --log-failed > failed.log
          tail -n 120 failed.log > short.log
      - name: Publish and remove reporter
        run: |
          path=.github/v108-patch-error.txt
          content="$(base64 -w0 short.log)"
          existing="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=main" --jq .sha 2>/dev/null || true)"
          args=(--method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" -f message='ci: publish v1.0.8 patch error' -f content="$content" -f branch=main)
          [ -z "$existing" ] || args+=(-f sha="$existing")
          gh api "${args[@]}" >/dev/null
          self=.github/workflows/_temporary-v108-error-report.yml
          self_sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${self}?ref=main" --jq .sha)"
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/contents/${self}" -f message='ci: remove temporary v1.0.8 error reporter' -f sha="$self_sha" -f branch=main >/dev/null
