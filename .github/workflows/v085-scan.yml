name: DraBornGarage v0.8.5 Scan

on:
  push:
    branches:
      - feature/v0.8.5-mechanic-applications-ui
  pull_request:
    branches:
      - main

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/v0.8.5-mechanic-applications-ui
      - name: Build scan report
        run: |
          {
            echo '=== BICYCLE OCCURRENCES ==='
            grep -RIn --exclude-dir=node_modules --exclude='*.map' -E "bicycle|bike-outline|bike" src || true
            echo '=== SMALL FONT OCCURRENCES ==='
            grep -RIn --exclude-dir=node_modules -E "fontSize: ([6-9](\.[0-9]+)?)" src | head -500 || true
            echo '=== SOURCE FILES ==='
            find src -type f | sort
          } > v085-scan.txt
          cat v085-scan.txt
      - name: Create repository snapshot
        run: |
          zip -qr draborngarage-v085-repo.zip . -x '.git/*' 'node_modules/*' 'dist/*'
      - name: Upload scan report
        uses: actions/upload-artifact@v4
        with:
          name: draborngarage-v085-scan
          path: v085-scan.txt
          retention-days: 7
      - name: Upload repository snapshot
        uses: actions/upload-artifact@v4
        with:
          name: draborngarage-v085-repo
          path: draborngarage-v085-repo.zip
          retention-days: 7
