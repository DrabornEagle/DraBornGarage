name: DraBornGarage v0.8.17 Branch Finalizer

on:
  push:
    branches:
      - feature/v0.8.17-push-sounds-payment-focus

permissions:
  contents: write

concurrency:
  group: draborngarage-v0817-branch-finalizer
  cancel-in-progress: true

jobs:
  finalize:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/v0.8.17-push-sounds-payment-focus
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Normalize updater hotfixes
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply_v0817.py')
          source = path.read_text(encoding='utf-8')
          source = source.replace('"       setPreferences(merged);\\n       await syncLocalSchedules(upcoming, merged);\\n       return true;"', '"      setPreferences(merged);\\n      await syncLocalSchedules(upcoming, merged);\\n      return true;"')
          source = source.replace('"   }, [preferences, upcoming, syncLocalSchedules]);"', '"  }, [preferences, upcoming, syncLocalSchedules]);"')
          path.write_text(source, encoding='utf-8')
          PY

      - name: Apply updater with diagnostic capture
        shell: bash
        run: |
          set +e
          python3 scripts/apply_v0817.py > /tmp/v0817-updater.log 2>&1
          code=$?
          cat /tmp/v0817-updater.log
          if [ $code -ne 0 ]; then
            cp /tmp/v0817-updater.log docs/V0817_WORKFLOW_ERROR.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/V0817_WORKFLOW_ERROR.txt
            git commit -m "ci: capture v0.8.17 updater failure"
            git push origin HEAD:feature/v0.8.17-push-sounds-payment-focus
            exit $code
          fi

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript validation with diagnostic capture
        shell: bash
        run: |
          set +e
          npm run typecheck > /tmp/v0817-typecheck.log 2>&1
          code=$?
          cat /tmp/v0817-typecheck.log
          if [ $code -ne 0 ]; then
            cp /tmp/v0817-typecheck.log docs/V0817_WORKFLOW_ERROR.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/V0817_WORKFLOW_ERROR.txt
            git commit -m "ci: capture v0.8.17 TypeScript failure"
            git push origin HEAD:feature/v0.8.17-push-sounds-payment-focus
            exit $code
          fi

      - name: Android JavaScript bundle validation
        shell: bash
        run: |
          set +e
          rm -rf dist
          npm run test:bundle > /tmp/v0817-bundle.log 2>&1
          code=$?
          cat /tmp/v0817-bundle.log
          rm -rf dist
          if [ $code -ne 0 ]; then
            cp /tmp/v0817-bundle.log docs/V0817_WORKFLOW_ERROR.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/V0817_WORKFLOW_ERROR.txt
            git commit -m "ci: capture v0.8.17 bundle failure"
            git push origin HEAD:feature/v0.8.17-push-sounds-payment-focus
            exit $code
          fi

      - name: Verify generated sound assets
        run: |
          test -s assets/sounds/garage_chime.wav
          test -s assets/sounds/garage_pulse.wav
          test -s assets/sounds/garage_alert.wav
          file assets/sounds/*.wav

      - name: Finalize feature branch
        run: |
          rm -f scripts/apply_v0817.py
          rm -f scripts/v0817-trigger.txt
          rm -f .github/workflows/v0817-validate.yml
          rm -f .github/workflows/v0817-branch-finalizer.yml
          rm -f docs/V0817_WORKFLOW_ERROR.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: finalize v0.8.17 push sounds and payment focus"
          git pull --rebase origin feature/v0.8.17-push-sounds-payment-focus
          git push origin HEAD:feature/v0.8.17-push-sounds-payment-focus
