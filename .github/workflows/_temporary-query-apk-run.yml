name: Temporary Query DraBornGarage Release APK

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-query-apk-run.yml

permissions:
  contents: write
  actions: read

jobs:
  query:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Record latest APK workflow runs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs
          {
            echo '# DraBornGarage Release APK Run Sorgusu'
            echo
            echo '```json'
            gh run list --repo "$GITHUB_REPOSITORY" --workflow release-apk.yml --limit 10 --json databaseId,event,status,conclusion,headSha,createdAt,updatedAt,url
            echo '```'
          } > docs/APK_RUN_QUERY.md
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/APK_RUN_QUERY.md
          git commit -m 'build: record latest Release APK runs'
          git pull --rebase origin main
          git push origin HEAD:main
