name: Prepare DraBornGarage v1.0

on:
  push:
    branches: ["feature/v1.0-release-apk"]
    paths:
      - ".github/workflows/prepare-v1-release.yml"

permissions:
  contents: write

jobs:
  prepare-version:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout v1.0 branch
        uses: actions/checkout@v4
        with:
          ref: feature/v1.0-release-apk
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set v1.0 release metadata
        shell: bash
        run: |
          python3 <<'PY'
          import json
          from pathlib import Path

          package_path = Path('package.json')
          package_data = json.loads(package_path.read_text())
          package_data['version'] = '1.0.0'
          package_path.write_text(json.dumps(package_data, ensure_ascii=False, indent=2) + '\n')

          app_path = Path('app.json')
          app_data = json.loads(app_path.read_text())
          expo = app_data['expo']
          expo['version'] = '1.0.0'
          expo['android']['versionCode'] = 17
          expo['ios']['buildNumber'] = '17'
          app_path.write_text(json.dumps(app_data, ensure_ascii=False, indent=2) + '\n')

          eas_path = Path('eas.json')
          eas_data = json.loads(eas_path.read_text())
          eas_data.setdefault('build', {})['release-apk'] = {
              'distribution': 'internal',
              'android': {
                  'buildType': 'apk',
                  'gradleCommand': ':app:assembleRelease'
              }
          }
          eas_data['build']['production'] = {
              'android': {'buildType': 'app-bundle'}
          }
          eas_path.write_text(json.dumps(eas_data, ensure_ascii=False, indent=2) + '\n')

          replacements = {
              'src/notifications/NotificationCenterScreen.tsx': [
                  ('v0.9.7 • SESLİ BİLDİRİM MERKEZİ', 'v1.0.0 RC • SESLİ BİLDİRİM MERKEZİ'),
              ],
              'src/notifications/NotificationContext.tsx': [
                  ("Constants.expoConfig?.version || '0.9.7'", "Constants.expoConfig?.version || '1.0.0'"),
              ],
              'src/screens/SettingsScreen.tsx': [
                  ('v0.9.7 • Bugünkü sıra ve Motor Hazır ücret koruması', 'v1.0.0 RC • İlk Release APK test süreci'),
                  ('v0.9.7 • Bugünkü Sıra ve Ücret Koruması', 'v1.0.0 RC • Release APK Adayı'),
                  ('backup/v0.9.6-before-v0.9.7-20260714', 'backup/v0.9.7-before-v1.0-20260714'),
                  ('Kod ve veritabanıyla v0.9.6', 'Kod yedeğiyle v0.9.7'),
                  ('Expo Go + Android bundle + pilot checklist', 'GitHub Release APK + fiziksel cihaz testleri'),
                  ('Auto & Vehicles • finansal hizmet değildir', 'APK testinde • AAB henüz yayınlanmadı'),
              ],
              'docs/TERMUX_INSTALL.md': [
                  ('DraBornGarage v0.9.7', 'DraBornGarage v1.0.0 RC'),
                  ('EXPECTED_VERSION="0.9.7"', 'EXPECTED_VERSION="1.0.0"'),
              ],
          }

          for filename, pairs in replacements.items():
              path = Path(filename)
              text = path.read_text()
              for old, new in pairs:
                  if old not in text:
                      raise SystemExit(f'Expected text not found in {filename}: {old}')
                  text = text.replace(old, new)
              path.write_text(text)

          readme = Path('README.md')
          text = readme.read_text()
          old = '''## Güncel sürüm

**v0.9.7 — Bugünkü Sıra ve Motor Hazır Ücret Koruması**

v0.9.7; Usta Panelindeki Bugünkü Atölye Sırasını yalnız bugünün kayıtlarıyla sınırlar ve tahsil edilecek son net ücret girilmeden Motor Hazır aşamasına geçilmesini engeller.

## v0.9.7 ile tamamlananlar
'''
          new = '''## Güncel sürüm

**v1.0.0 RC — İlk GitHub Release APK Adayı**

v1.0.0 RC; v0.1–v0.9.7 arasında tamamlanan mobil özellikleri ilk kurulabilir GitHub Release APK çıktısında birleştirir. APK fiziksel cihaz testlerinden geçtikten sonra kalıcı Android imzası ve Google Play AAB aşamasına alınacaktır.

## v1.0 Release APK hazırlığı

- GitHub üzerinde bağımsız Release APK workflow'u
- TypeScript, Expo Doctor, Expo config ve Android lint kontrolleri
- Temiz Expo prebuild ile native Android projesi üretimi
- Release APK derleme ve imza doğrulaması
- SHA-256 checksum ve GitHub artifact çıktısı
- Fiziksel cihaz test planı
- v0.9.7 geri dönüş yedeği

## v0.9.7 ile tamamlananlar
'''
          if old not in text:
              raise SystemExit('README release block not found')
          readme.write_text(text.replace(old, new))
          PY

      - name: Synchronize package lock
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Commit prepared v1.0 files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json app.json eas.json README.md docs/TERMUX_INSTALL.md src/notifications/NotificationCenterScreen.tsx src/notifications/NotificationContext.tsx src/screens/SettingsScreen.tsx
          git commit -m "chore(v1.0): prepare first release APK candidate"
          git push origin HEAD:feature/v1.0-release-apk
