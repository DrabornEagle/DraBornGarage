name: Install DraBornGarage Artwork

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/install_welcome_artwork_once.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: install-draborngarage-artwork
  cancel-in-progress: false

jobs:
  install-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Kaynak kodu al
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Kullanıcının gönderdiği görselleri birebir indir
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assets

          download_drive_file() {
            local id="$1"
            local output="$2"
            curl --fail --location --retry 3 --retry-delay 2 \
              "https://drive.usercontent.google.com/download?id=${id}&export=download&confirm=t" \
              --output "$output"
          }

          download_drive_file "1XaQNV7YCpFC1issHexEte5b6olT0upHL" "assets/draborngarage-icon.png"
          download_drive_file "1Q567k-YzGOpfVAQIpp7masO0MmZ5cH_3" "assets/draborngarage-welcome.png"

      - name: Görsellerin piksel ve dosya bütünlüğünü doğrula
        run: |
          python - <<'PY'
          from pathlib import Path
          import struct

          expected = {
              Path('assets/draborngarage-icon.png'): (1536, 1536),
              Path('assets/draborngarage-welcome.png'): (864, 1536),
          }

          for path, dimensions in expected.items():
              data = path.read_bytes()
              if data[:8] != b'\x89PNG\r\n\x1a\n':
                  raise SystemExit(f'{path}: indirilen dosya PNG değil')
              width, height = struct.unpack('>II', data[16:24])
              if (width, height) != dimensions:
                  raise SystemExit(f'{path}: beklenen {dimensions}, bulunan {(width, height)}')
              if len(data) < 100_000:
                  raise SystemExit(f'{path}: dosya beklenenden küçük, indirme bozuk olabilir')
              print(f'{path}: {width}x{height}, {len(data)} bayt')
          PY

      - name: Bağımlılıkları kur
        run: npm ci --no-audit --no-fund

      - name: TypeScript ve Android Expo paket kontrolü
        run: npm run test:release

      - name: Tek kullanımlık workflow dosyasını temizle
        run: rm -f .github/workflows/install_welcome_artwork_once.yml

      - name: Görselleri main dalına yükle
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "DraBornGarage v1.0.3: özel uygulama ikonu ve karşılama ekranı"
          git push origin main
