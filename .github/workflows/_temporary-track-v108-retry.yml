name: Temporary Track v1.0.8 Retry

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-track-v108-retry.yml

permissions:
  actions: read
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait and collect
        shell: bash
        run: |
          set -euo pipefail
          sleep 8
          hotfix_id="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow _temporary-v108-runtime-hotfix.yml --limit 1 --json databaseId --jq '.[0].databaseId')"
          while [ "$(gh run view "$hotfix_id" --repo "$GITHUB_REPOSITORY" --json status --jq .status)" != completed ]; do sleep 12; done
          gh run view "$hotfix_id" --repo "$GITHUB_REPOSITORY" --json databaseId,status,conclusion,url,jobs > hotfix.json
          if [ "$(jq -r .conclusion hotfix.json)" = success ]; then
            sleep 10
            release_id="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow release-apk.yml --limit 1 --json databaseId --jq '.[0].databaseId')"
            while [ "$(gh run view "$release_id" --repo "$GITHUB_REPOSITORY" --json status --jq .status)" != completed ]; do sleep 20; done
            gh run view "$release_id" --repo "$GITHUB_REPOSITORY" --json databaseId,status,conclusion,url,jobs > release.json
            gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${release_id}/artifacts" > artifacts.json
            jq -n --slurpfile h hotfix.json --slurpfile r release.json --slurpfile a artifacts.json '{hotfix:$h[0],release:$r[0],artifacts:$a[0].artifacts}' > final.json
          else
            jq -n --slurpfile h hotfix.json '{hotfix:$h[0],release:null,artifacts:[]}' > final.json
          fi
      - name: Publish result
        if: always()
        shell: bash
        run: |
          [ -s final.json ] || jq -n '{error:"retry tracker failed"}' > final.json
          path=.github/v108-retry-status.json
          existing="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=main" --jq .sha 2>/dev/null || true)"
          content="$(base64 -w0 final.json)"
          args=(--method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" -f message='ci: publish v1.0.8 retry status' -f content="$content" -f branch=main)
          [ -z "$existing" ] || args+=(-f sha="$existing")
          gh api "${args[@]}" >/dev/null
          self=.github/workflows/_temporary-track-v108-retry.yml
          self_sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${self}?ref=main" --jq .sha 2>/dev/null || true)"
          [ -z "$self_sha" ] || gh api --method DELETE "repos/${GITHUB_REPOSITORY}/contents/${self}" -f message='ci: remove temporary v1.0.8 retry tracker' -f sha="$self_sha" -f branch=main >/dev/null
