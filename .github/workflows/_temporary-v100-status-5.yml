name: Temporary v1.0.0 Status 5

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-v100-status-5.yml

permissions:
  actions: read
  contents: write

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Capture latest validation run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .runtime
          gh run list --repo "$GITHUB_REPOSITORY" --workflow "Temporary Run v1.0.0 Final Candidate Patch" --limit 5 --json databaseId,status,conclusion,headBranch,headSha,url,createdAt > .runtime/v100-validation-status-5.json
      - name: Persist status
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/_temporary-v100-status-5.yml
          git add .runtime/v100-validation-status-5.json
          git commit -m 'chore: publish fifth v1.0.0 validation status'
          git pull --rebase origin main
          git push origin HEAD:main
