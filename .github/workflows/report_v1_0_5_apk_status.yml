name: Report DraBornGarage v1.0.5 APK Status

on:
  workflow_run:
    workflows:
      - DraBornGarage Release APK
    types:
      - completed

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Write APK status
        shell: bash
        run: |
          set -euo pipefail
          jq -n \
            --arg status '${{ github.event.workflow_run.status }}' \
            --arg conclusion '${{ github.event.workflow_run.conclusion }}' \
            --arg url '${{ github.event.workflow_run.html_url }}' \
            --argjson run_id '${{ github.event.workflow_run.id }}' \
            --arg head_sha '${{ github.event.workflow_run.head_sha }}' \
            '{status:$status,conclusion:$conclusion,url:$url,run_id:$run_id,head_sha:$head_sha}' > status.json
          base64 -w0 status.json > status.b64
          SHA="$(gh api "repos/${GITHUB_REPOSITORY}/contents/.github/v1.0.5-apk-status.json?ref=main" --jq .sha 2>/dev/null || true)"
          if [ -n "$SHA" ]; then
            jq -n --arg message 'ci: update v1.0.5 APK status' --arg branch main --arg sha "$SHA" --rawfile content status.b64 '{message:$message,branch:$branch,sha:$sha,content:$content}' > payload.json
          else
            jq -n --arg message 'ci: record v1.0.5 APK status' --arg branch main --rawfile content status.b64 '{message:$message,branch:$branch,content:$content}' > payload.json
          fi
          gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/.github/v1.0.5-apk-status.json" --input payload.json >/dev/null
