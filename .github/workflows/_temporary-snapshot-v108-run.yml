name: Temporary Snapshot v1.0.8 Run
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-snapshot-v108-run.yml
permissions:
  actions: read
  contents: write
jobs:
  snapshot:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Snapshot latest release APK
        run: |
          gh run list --repo "$GITHUB_REPOSITORY" --workflow release-apk.yml --limit 3 --json databaseId,status,conclusion,url,createdAt,headSha > run.json
          path=.github/v108-current-run.json
          existing="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=main" --jq .sha 2>/dev/null || true)"
          content="$(base64 -w0 run.json)"
          args=(--method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" -f message='ci: snapshot current v1.0.8 APK run' -f content="$content" -f branch=main)
          [ -z "$existing" ] || args+=(-f sha="$existing")
          gh api "${args[@]}" >/dev/null
          self=.github/workflows/_temporary-snapshot-v108-run.yml
          sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${self}?ref=main" --jq .sha)"
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/contents/${self}" -f message='ci: remove temporary v1.0.8 run snapshot' -f sha="$sha" -f branch=main >/dev/null
