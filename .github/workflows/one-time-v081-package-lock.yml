name: One-time v0.8.1 Package Lock

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/one-time-v081-package-lock.yml

permissions:
  contents: write

jobs:
  update-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Update package lock
        run: npm install --package-lock-only --no-audit --no-fund
      - name: Commit package lock
        run: |
          git config user.name "DraBornGarage CI"
          git config user.email "actions@users.noreply.github.com"
          git add package-lock.json
          git diff --cached --quiet || git commit -m "chore: update package lock for v0.8.1"
          git push origin main
