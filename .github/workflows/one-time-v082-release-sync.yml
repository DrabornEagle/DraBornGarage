name: One-time v0.8.2 Release Sync

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/one-time-v082-release-sync.yml

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Synchronize release files
        run: |
          node <<'NODE'
          const fs = require('fs');
          function replace(path, from, to) {
            let text = fs.readFileSync(path, 'utf8');
            if (!text.includes(from)) throw new Error(`Marker missing in ${path}: ${from}`);
            text = text.replace(from, to);
            fs.writeFileSync(path, text);
          }
          replace(
            'src/screens/SettingsScreen.tsx',
            'value="v0.8.0 • Bildirimler ve Hatırlatmalar"',
            'value="v0.8.2 • Ayrı Admin Paneli"'
          );
          replace(
            'src/screens/SettingsScreen.tsx',
            'value="backup/v0.7.0-before-v0.8.0"',
            'value="backup/v0.8.1-before-v0.8.2"'
          );
          replace(
            'src/screens/SettingsScreen.tsx',
            'label="Veritabanı geri alma" value="rollback_v0_8_0_to_v0_7_0.sql"',
            'label="Geri alma" value="Kod yedeğiyle v0.8.1"'
          );
          replace(
            'README.md',
            '**v0.8.0 — Bildirimler ve Hatırlatmalar**',
            '**v0.8.2 — Ayrı Admin Paneli ve Expo Go Uyumluluğu**'
          );
          replace(
            'README.md',
            '**Kurulan sürüm:** `v0.8.0`',
            '**Kurulan sürüm:** `v0.8.2`'
          );
          replace(
            'README.md',
            '**Yedeklenen sürüm:** `v0.7.0`',
            '**Yedeklenen sürüm:** `v0.8.1`'
          );
          replace(
            'README.md',
            '**Kod yedeği:** `backup/v0.7.0-before-v0.8.0`',
            '**Kod yedeği:** `backup/v0.8.1-before-v0.8.2`'
          );
          NODE
          npm install --package-lock-only --no-audit --no-fund
      - name: Commit synchronized files
        run: |
          git config user.name "DraBornGarage CI"
          git config user.email "actions@users.noreply.github.com"
          git add package-lock.json src/screens/SettingsScreen.tsx README.md
          git diff --cached --quiet || git commit -m "chore: synchronize v0.8.2 release metadata"
          git push origin main
