name: Temporary Report Recent Runs

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-report-recent-runs.yml

permissions:
  actions: read
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Collect recent runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run list --repo "$GITHUB_REPOSITORY" --limit 12 --json databaseId,name,displayTitle,status,conclusion,url,createdAt,headSha > recent-runs.json
      - name: Persist and remove reporter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          path=.github/recent-runs.json
          sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=main" --jq .sha 2>/dev/null || true)"
          content="$(base64 -w0 recent-runs.json)"
          if [ -n "$sha" ]; then
            gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" -f message='ci: update recent workflow runs' -f content="$content" -f sha="$sha" -f branch=main >/dev/null
          else
            gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" -f message='ci: add recent workflow runs' -f content="$content" -f branch=main >/dev/null
          fi
          self=.github/workflows/_temporary-report-recent-runs.yml
          self_sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${self}?ref=main" --jq .sha)"
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/contents/${self}" -f message='ci: remove temporary run reporter' -f sha="$self_sha" -f branch=main >/dev/null
