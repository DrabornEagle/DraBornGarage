name: Temporary Report Latest APK

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/_temporary-report-latest-apk.yml

permissions:
  actions: read
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Collect latest APK run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run list --repo "$GITHUB_REPOSITORY" --workflow release-apk.yml --limit 1 --json databaseId,status,conclusion,url,headSha,createdAt > run.json
          run_id="$(jq -r '.[0].databaseId // empty' run.json)"
          gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --json jobs > jobs.json
          jq -s '{run:.[0][0],jobs:.[1].jobs}' run.json jobs.json > latest-apk.json
      - name: Persist and remove reporter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          path=.github/latest-apk.json
          sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=main" --jq .sha 2>/dev/null || true)"
          content="$(base64 -w0 latest-apk.json)"
          if [ -n "$sha" ]; then
            gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" -f message='ci: update latest APK build status' -f content="$content" -f sha="$sha" -f branch=main >/dev/null
          else
            gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" -f message='ci: add latest APK build status' -f content="$content" -f branch=main >/dev/null
          fi
          self=.github/workflows/_temporary-report-latest-apk.yml
          self_sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${self}?ref=main" --jq .sha)"
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/contents/${self}" -f message='ci: remove temporary APK status reporter' -f sha="$self_sha" -f branch=main >/dev/null
